function parseLetterItems(str){
  const cleaned = String(str||'').replace(/\s+/g,' ').trim();
  if(!cleaned) return {};
  const re = /([A-Z])\.\s*/g;
  let m;
  const parts = [];
  while((m=re.exec(cleaned))){
    // 用下一选项「A./B. 起始下标」作为切片终点，不能用 lastIndex（已在 “B.” 之后），否则会带上 “ B.” 等尾巴
    parts.push({letter:m[1], valueStart:re.lastIndex, keyIndex:m.index});
  }
  if(parts.length===0) return {};
  const map = {};
  for(let i=0;i<parts.length;i++){
    const letter = parts[i].letter;
    const start = parts[i].valueStart;
    const end = (i+1<parts.length)?parts[i+1].keyIndex:cleaned.length;
    map[letter] = cleaned.slice(start, end).trim();
  }
  return map;
}

/** 中文默写：从整行截取「书卷+章:节」作题干，全文作 expected（剥离 Word 隐形格式符，避免「希伯来书‬8」类断节） */
function extractZhDictationRef(rawLine){
  let t = String(rawLine||'')
    .replace(/^\d+\.?\s*/, '')
    .replace(/[\u200b-\u200f\u202a-\u202e\u2060-\u206f\ufeff\ufe00-\ufe0f]/g, '')
    .trim();
  let m = t.match(/^([\u4e00-\u9fff]+?)(\d+)\s*[:：]\s*(\d+)(?:[-–](\d+))?/);
  if(!m) m = t.match(/^([\u4e00-\u9fff]+)\D*(\d+)\s*[:：]\s*(\d+)(?:[-–](\d+))?/);
  if(!m){
    const cut = t.match(/^([\u4e00-\u9fff]+\d+:\d+(?:[-–]\d+)?)/);
    return { ref: cut ? cut[1] : t.split(/[，。；\s“"「]/)[0].slice(0, 28), expected: t };
  }
  const ref = m[1].trim() + m[2] + ':' + m[3] + (m[4] ? '-' + m[4] : '');
  return { ref, expected: t };
}

/** 英/印默写题干：从标准答案行首截取书卷与章节，与 exam-locale.js 逻辑一致 */
function extractLatinDictRefFromExpected(block){
  const s = String(block||'').replace(/^\d+\.\s*/, '').trim();
  const m = s.match(/^((?:[A-Z][a-z]+)(?:\s+[A-Z][a-z]+)*\s+\d+:\d+(?:-\d+)?)\b/);
  return m ? m[1] : '';
}

function buildExamQuestionsFromText(text){
  // docx 转纯文本时可能会残留一部分 Word XML 标签（如 <w:t> / <w:tab>），
  // 这些会干扰解析；这里先统一剥离标签，保留中间的可见文本。
  const cleanedText = String(text||'').replace(/<[^>]+>/g,'');
  const lines = cleanedText.split(/\r\n|\n|\r/).map(l=>l.trim()).filter(Boolean);
  const questions = [];
  let section = null; // 'ot' | 'nt' | null
  const pushQ = q => questions.push({...q, section});
  let qid = 1;
  const idxMapSingle = {A:0,B:1,C:2,D:3};
  let i = 0;
  while(i < lines.length){
    const line = lines[i];

    if(line.startsWith('旧约部分')){ section = 'ot'; i++; continue; }
    if(line.startsWith('新约部分')){ section = 'nt'; i++; continue; }

    // Fill in blanks
    if(line.startsWith('一、填空题')){
      const m = line.match(/每空([0-9.]+)分/);
      const perBlank = m?parseFloat(m[1]):0.5;
      i++;
      while(i < lines.length && !lines[i].startsWith('二、')){
        const l = lines[i];
        if(l.includes('<w:')){ i++; continue; }
        const braceMatches = [...l.matchAll(/\{([^}]+)\}/g)];
        if(braceMatches.length){
          const answers = braceMatches.map(x=>x[1]);
          const prompt = l.replace(/\{[^}]+\}/g,'____');
          const per = (l.match(/每空\s*([0-9.]+)分/)||[])[1]?parseFloat((l.match(/每空\s*([0-9.]+)分/)||[])[1]):perBlank;
          pushQ({id:qid++, type:'fill', prompt, answers, blanks:answers.length, score:answers.length*per});
          i++;
          continue;
        }
        if(l.includes('分别是')){
          const per = (l.match(/每空\s*([0-9.]+)分/)||[])[1]?parseFloat((l.match(/每空\s*([0-9.]+)分/)||[])[1]):perBlank;
          const next = lines[i+1]||'';
          if(next.includes('、')){
            const answers = next.split('、').map(s=>s.trim()).filter(Boolean);
            pushQ({id:qid++, type:'fill', prompt:l+'（请填写）', answers, blanks:answers.length, score:answers.length*per});
            i += 2;
            continue;
          }
        }
        i++;
      }
      continue;
    }

    // Single choice / choice
    if(line.startsWith('二、单选题') || line.startsWith('二、选择题')){
      i++;
      while(i < lines.length && !lines[i].startsWith('三、')){
        const l = lines[i];
        if(!/^\d+\./.test(l)){ i++; continue; }

        let ans = null;
        const mParen = l.match(/（([A-D])）/);
        if(mParen) ans = mParen[1];
        else {
          const mEnd = l.match(/\s([A-D])\s*$/);
          if(mEnd) ans = mEnd[1];
        }
        if(!ans){ i++; continue; }

        let prompt = '';
        let options = ['','','',''];

        // embedded options on the same line
        if(l.includes('A.') && l.includes('B.') && l.includes('C.') && l.includes('D.')){
          const startA = l.indexOf('A.');
          prompt = l.slice(0,startA).replace(/^\d+\.\s*/,'').replace(/（[A-D]）/g,'').trim();
          const optMap = parseLetterItems(l.slice(startA));
          options = ['A','B','C','D'].map(L=>optMap[L] || '');
        } else {
          prompt = l.replace(/^\d+\.\s*/,'').replace(/（[A-D]）/g,'').replace(/\s+[A-D]\s*$/,'').trim();
          let j = i+1;
          let optStr = '';
          while(j < lines.length && !/^\d+\./.test(lines[j]) && !lines[j].startsWith('三、')){
            if(/[A-D]\./.test(lines[j])) optStr += (optStr?' ':'') + lines[j];
            j++;
          }
          const optMap = parseLetterItems(optStr);
          options = ['A','B','C','D'].map(L=>optMap[L] || '');
          i = j-1;
        }

        // 题干仅有一句经文（全角括号）时补全提问，避免卷面像「只有半句话」
        if(/^（[^）]+）$/.test(prompt)){
          prompt = '以下经文出自哪一卷书？' + prompt;
        }

        pushQ({
          id:qid++,
          type:'single',
          prompt,
          options,
          answer_index:idxMapSingle[ans],
          score:0.5
        });
        i++;
      }
      continue;
    }

    // Matching (only in old part)
    if(line.startsWith('三、连线题')){
      const prompt = (lines[i+1]||'').trim();
      i++;
      const left_items = [];
      const left_correct_letters = [];
      const right_map = {};
      while(i < lines.length && !lines[i].startsWith('四、判断题')){
        const l = lines[i];
        const mLeft = l.match(/^（([A-Z])）\d+\.\s*(.+)$/);
        if(mLeft){
          left_correct_letters.push(mLeft[1]);
          left_items.push(mLeft[2].trim());
          i++;
          continue;
        }
        const mRight = l.match(/^([A-Z])\.\s*(.+)$/);
        if(mRight){
          right_map[mRight[1]] = mRight[2].trim();
          i++;
          continue;
        }
        i++;
      }
      const right_letters = Object.keys(right_map).sort();
      const right_items = right_letters.map(L=>right_map[L]);
      const right_index = {};
      right_letters.forEach((L,idx)=>right_index[L]=idx);
      const answer_map = left_correct_letters.map(L=>right_index[L]);
      pushQ({
        id:qid++,
        type:'match',
        prompt,
        left_items,
        right_items,
        answer_map,
        score:0.5*left_items.length
      });
      continue;
    }

    // True/False
    if(line.startsWith('四、判断题') || line.startsWith('三、判断题')){
      i++;
      while(i < lines.length && !lines[i].startsWith('五、排序题') && !lines[i].startsWith('四、排序题')){
        const l = lines[i];
        if(!/^\d+\./.test(l)){ i++; continue; }
        if(!l.includes('√') && !l.includes('×')){ i++; continue; }
        let stmt;
        let truth;
        // 新约常见：…题干。（ √ ） 或 （ × ）——符号在句末括号内
        const parenTf = l.match(/\s*（\s*([√×])\s*）\s*$/);
        if(parenTf){
          truth = parenTf[1]==='√';
          stmt = l.slice(0, parenTf.index).replace(/^\d+\.\s*/, '').trim();
        }else{
          // 旧约：____×____题干 或 ____√___题干（符号在题干前）
          truth = l.includes('√');
          const pos = l.indexOf(truth?'√':'×');
          stmt = l.slice(pos+1).trim();
          stmt = stmt.replace(/^[_\s　]+/,'');
        }
        if(!stmt){ i++; continue; }
        pushQ({
          id:qid++,
          type:'truefalse',
          prompt:stmt,
          answer_bool:truth,
          score:0.5
        });
        i++;
      }
      continue;
    }

    // Sorting (sequence input)
    if(line.includes('排序题')){
      i++;
      while(i < lines.length && !lines[i].startsWith('六、默写题') && !lines[i].startsWith('五、默写题')){
        const l = lines[i];
        if(!/^\d+\./.test(l) || !l.includes('排序')){ i++; continue; }
        const seq = (l.match(/排序\s+([A-Z]+)/)||[])[1] || '';
        const prompt = l.replace(/^\d+\.\s*/,'').replace(/排序\s+[A-Z]+/,'').trim();

        let j = i+1;
        let optStr = '';
        while(j < lines.length && !/^\d+\./.test(lines[j]) && !lines[j].startsWith('六、默写题') && !lines[j].startsWith('五、默写题')){
          optStr += (optStr?' ':'') + lines[j];
          j++;
        }
        const itemMap = parseLetterItems(optStr);
        const letters = Object.keys(itemMap).sort();
        const items = letters.map(k=>({key:k,text:itemMap[k]}));

        pushQ({
          id:qid++,
          type:'order',
          prompt,
          items,
          correct_seq: seq,
          score:1
        });
        i = j;
      }
      continue;
    }

    // Dictation
    if(line.includes('默写题')){
      i++;
      while(i < lines.length && !lines[i].startsWith('新约部分')){
        const l = lines[i];
        if(/^\d+\.?/.test(l)){
          const numMatch = l.match(/^(\d+)\.?\s*/);
          const start = numMatch ? numMatch[0].length : 0;
          let text = l.slice(start).trim();
          let j = i+1;
          while(j < lines.length && !/^\d+\.?\s*/.test(lines[j]) && !lines[j].startsWith('新约部分') && !lines[j].startsWith('旧约部分')){
            text += ' ' + lines[j].trim();
            j++;
          }
          const { ref, expected } = extractZhDictationRef(text);
          pushQ({
            id:qid++,
            type:'dictation',
            prompt:'请默写：'+ref,
            expected,
            score:2
          });
          i = j;
          continue;
        }
        i++;
      }
      continue;
    }

    i++;
  }
  return questions;
}

// 覆盖：优先从项目目录读取你转换出来的完整 doc 文本，避免上面内嵌字符串被截断；并合并英文/印尼文试卷文本
let __examQuestionsLoadedFromFile = false;

/** Chrome 等对 file:// 页面的本地 fetch 常会一直挂起（不 resolve），导致整页卡在加载圈 */
function isFileProtocol(){
  return typeof location !== 'undefined' && location.protocol === 'file:';
}

async function fetchWithTimeout(url, ms=8000){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  try{
    return await fetch(url,{signal:c.signal});
  }finally{
    clearTimeout(t);
  }
}

async function attachExamLocales(qs){
  if(typeof EXAM_LOCALE==='undefined' || !qs || !qs.length) return qs;
  const enUrls = ['./docx_plain_en.txt','/docx_plain_en.txt','docx_plain_en.txt'];
  const idUrls = ['./docx_plain_id.txt','/docx_plain_id.txt','docx_plain_id.txt'];
  let enText=null, idText=null;
  if(!isFileProtocol()){
    for(const url of enUrls){
      try{
        const res=await fetchWithTimeout(url);
        if(res.ok){ const t=await res.text(); if(t&&t.trim()){ enText=t; break; } }
      }catch(_){}
    }
  }
  if(!enText && globalThis.__BUNDLED_EXAM_TEXT_EN) enText = globalThis.__BUNDLED_EXAM_TEXT_EN;
  if(!isFileProtocol()){
    for(const url of idUrls){
      try{
        const res=await fetchWithTimeout(url);
        if(res.ok){ const t=await res.text(); if(t&&t.trim()){ idText=t; break; } }
      }catch(_){}
    }
  }
  if(!idText && globalThis.__BUNDLED_EXAM_TEXT_ID) idText = globalThis.__BUNDLED_EXAM_TEXT_ID;
  if(!enText && !idText){
    globalThis.__EXAM_EN_PARSED = [];
    globalThis.__EXAM_ID_PARSED = [];
    return qs;
  }
  const enList = enText ? EXAM_LOCALE.buildExamLocaleList(enText,'en') : [];
  const idList = idText ? EXAM_LOCALE.buildExamLocaleList(idText,'id') : [];
  globalThis.__EXAM_EN_PARSED = enList;
  globalThis.__EXAM_ID_PARSED = idList;
  return EXAM_LOCALE.mergeLocaleIntoQuestions(qs, enList, idList);
}

let __examEnsurePromise = null;
async function ensureExamQuestionsLoaded(){
  if(__examQuestionsLoadedFromFile) return;
  if(__examEnsurePromise) return __examEnsurePromise;
  __examEnsurePromise = (async()=>{
    try{
      if(!isFileProtocol()){
        try{
          const urls = ['./docx_plain2.txt','/docx_plain2.txt','docx_plain2.txt'];
          for(const url of urls){
            try{
              const res = await fetchWithTimeout(url);
              if(!res.ok) throw new Error('fetch failed: '+url);
              const txt = await res.text();
              if(txt && txt.trim().length>0){
                let qs = buildExamQuestionsFromText(txt);
                const qsNt = (qs||[]).filter(q=>q.section==='nt').length;
                const embNt = (EXAM_Qs||[]).filter(q=>q.section==='nt').length;
                if(qs && qs.length>0 && !(qsNt===0 && embNt>0)){
                  qs = await attachExamLocales(qs);
                  EXAM_Qs = qs;
                  A.examQuestions = EXAM_Qs;
                  __examQuestionsLoadedFromFile = true;
                  return;
                }
              }
            }catch(_){}
          }
        }catch(_){}
      }
      EXAM_Qs = await attachExamLocales(EXAM_Qs);
      A.examQuestions = EXAM_Qs;
      __examQuestionsLoadedFromFile = true;
    }catch(e){
      console.warn('ensureExamQuestionsLoaded', e);
      A.examQuestions = EXAM_Qs;
      __examQuestionsLoadedFromFile = true;
    }finally{
      __examEnsurePromise = null;
    }
  })();
  return __examEnsurePromise;
}

function formatExamEssayForDisplay(raw){
  const s = String(raw || '').trim();
  if(!s) return '';
  const mOtNew = s.match(/旧约总分[：:]\s*([\d.]+)\s*\/\s*([\d.]+)/);
  const mNtNew = s.match(/新约总分[：:]\s*([\d.]+)\s*\/\s*([\d.]+)/);
  const mSwNew = s.match(/切换屏幕次数[：:]\s*(\d+)\s*次/) || s.match(/切屏次数[：:]\s*(\d+)\s*次/);
  if(mOtNew && mNtNew && mSwNew){
    return `旧约总分：${mOtNew[1]} / ${mOtNew[2]}\n新约总分：${mNtNew[1]} / ${mNtNew[2]}\n切换屏幕次数：${mSwNew[1]} 次`;
  }
  const mOtOld = s.match(/旧约累计[：:]\s*([\d.]+)\s*\/\s*([\d.]+)/);
  const mNtOld = s.match(/新约累计[：:]\s*([\d.]+)\s*\/\s*([\d.]+)/);
  const mSwOld = s.match(/切换窗口\/切屏次数[：:]\s*(\d+)\s*次/) || s.match(/切屏次数[：:]\s*(\d+)\s*次/);
  if(mOtOld && mNtOld){
    const sw = mSwOld ? mSwOld[1] : '0';
    return `旧约总分：${mOtOld[1]} / ${mOtOld[2]}\n新约总分：${mNtOld[1]} / ${mNtOld[2]}\n切换屏幕次数：${sw} 次`;
  }
  return `旧约总分：— / —\n新约总分：— / —\n切换屏幕次数：— 次`;
}

/** 从 profiles.interview_langs 文本解析可面试语言（与 TEACHERS_SEED 中「中文、英文」等一致） */
function parseInterviewLangFlags(text){
  const raw = String(text||'');
  const s = raw.toLowerCase();
  const flags = { zh:false, en:false, id:false };
  if(/中文|汉语|chinese|mandarin/.test(raw)||/中文|汉语|chinese/.test(s)) flags.zh = true;
  if(/英文|英语|english/.test(raw)||/\benglish\b/.test(s)) flags.en = true;
  if(/印尼|indonesia|indonesian|bahasa/.test(raw)||/\bindonesia\b/.test(s)) flags.id = true;
  if(!flags.zh && !flags.en && !flags.id) flags.zh = true;
  return flags;
}

function resolveTeacherProfileForSlot(slot, profileById, allProfiles){
  if(!slot) return null;
  const tid = slot.teacher_id;
  if(tid!=null && String(tid).trim()!==''){
    const p = profileById.get(String(tid));
    if(p) return p;
  }
  const tn = String(slot.teacher_name||'').trim();
  if(!tn || !allProfiles?.length) return null;
  return allProfiles.find(pr=>{
    const d = String(pr.display_name||'').trim();
    return d && (tn.includes(d) || d.includes(tn));
  }) || null;
}

/** 申请人笔试语言 zh|en|id 与教师能力匹配 */
function slotSupportsApplicantExamLang(slot, needLang, profileById, allProfiles){
  const p = resolveTeacherProfileForSlot(slot, profileById, allProfiles);
  if(!p) return needLang==='zh';
  const f = parseInterviewLangFlags(p.interview_langs);
  if(needLang==='en') return f.en;
  if(needLang==='id') return f.id;
  return f.zh;
}

/** 同语言下教师展示优先级（数字越小越靠前） */
function teacherPriorityRank(slot, needLang, profileById, allProfiles){
  const p = resolveTeacherProfileForSlot(slot, profileById, allProfiles);
  const name = p ? String(p.display_name||'') : String(slot.teacher_name||'');
  if(needLang==='zh'){
    if(/利未/i.test(name) || /levi/i.test(name)) return 0;
    if(/文博/i.test(name) || /will/i.test(name)) return 1;
    return 50;
  }
  if(needLang==='en'){
    if(/nathan|nathen|元勋/i.test(name)) return 0;
    if(/heaven/i.test(name)) return 1;
    return 50;
  }
  if(needLang==='id'){
    if(/yohanes/i.test(name)) return 0;
    return 50;
  }
  return 50;
}

function sortSlotsForApplicantBooking(slots, needLang, profileById, allProfiles){
  const arr = (slots||[]).slice();
  arr.sort((a,b)=>{
    const ra = teacherPriorityRank(a, needLang, profileById, allProfiles);
    const rb = teacherPriorityRank(b, needLang, profileById, allProfiles);
    if(ra!==rb) return ra - rb;
    const dc = String(a.slot_date||'').localeCompare(String(b.slot_date||''));
    if(dc!==0) return dc;
    return String(a.slot_time||'').localeCompare(String(b.slot_time||''));
  });
  return arr;
}

const EXAM_OPEN_DAYS_WIB = [1,3,6]; // Mon/Wed/Sat (0=Sun)
const EXAM_WIB_START = '09:00';
const EXAM_WIB_END   = '11:30';
const EXAM_ZOOM_ID = '847 5014 4631';
const EXAM_ZOOM_PW = '156903';

function pad2(n){return String(n).padStart(2,'0');}
function parseHHMM(t){
  const m=String(t||'').match(/^(\d{2}):(\d{2})$/);
  if(!m) return null;
  return {hh:+m[1], mm:+m[2]};
}
function formatDateYMD(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
// Compute next exam start (WIB, UTC+7) as a UTC Date.
function nextExamStartUtc(){
  const now = new Date();
  // "now" in UTC minutes
  const nowUtcMs = now.getTime();
  const startParts = parseHHMM(EXAM_WIB_START) || {hh:9,mm:0};

  // iterate next 14 days, choose first day that matches and is in the future
  for(let add=0; add<14; add++){
    // candidate date in WIB by shifting UTC then taking Y/M/D in WIB
    const candUtc = new Date(nowUtcMs + add*86400000);
    // derive WIB date components by adding 7h then using UTC getters
    const wibMs = candUtc.getTime() + 7*3600000;
    const wib = new Date(wibMs);
    const y=wib.getUTCFullYear(), m=wib.getUTCMonth(), d=wib.getUTCDate();
    const day = wib.getUTCDay();
    if(!EXAM_OPEN_DAYS_WIB.includes(day)) continue;

    // build WIB start time, convert to UTC by subtracting 7h
    const startUtc = new Date(Date.UTC(y,m,d,startParts.hh,startParts.mm,0) - 7*3600000);
    if(startUtc.getTime() > nowUtcMs) return startUtc;
  }
  return null;
}

function getExamWindowUtc(){
  // 考试窗口固定：WIB 周一/周三/周六 09:00-11:30（150 分钟）
  const nowMs = Date.now();
  const startParts = parseHHMM(EXAM_WIB_START) || {hh:9,mm:0};
  const intervalMs = 150*60*1000;

  let bestFuture = null;
  for(let delta=-7; delta<=14; delta++){
    const candUtcMs = nowMs + delta*86400000;
    // derive WIB date components by adding 7h then using UTC getters
    const wibMs = candUtcMs + 7*3600000;
    const wib = new Date(wibMs);
    const y = wib.getUTCFullYear();
    const m = wib.getUTCMonth();
    const d = wib.getUTCDate();
    const day = wib.getUTCDay();
    if(!EXAM_OPEN_DAYS_WIB.includes(day)) continue;

    const startUtc = new Date(Date.UTC(y,m,d,startParts.hh,startParts.mm,0) - 7*3600000);
    const endUtc   = new Date(startUtc.getTime() + intervalMs);

    if(nowMs >= startUtc.getTime() && nowMs <= endUtc.getTime()){
      return {startUtc,endUtc,inWindow:true};
    }
    if(nowMs < startUtc.getTime()){
      if(!bestFuture || startUtc.getTime() < bestFuture.startUtc.getTime()){
        bestFuture = {startUtc,endUtc,inWindow:false};
      }
    }
  }
  return bestFuture; // may be null if something unexpected
}

async function loadPublicSlots(){
  const now = Date.now();
  const needLang = (A.applicant?.exam_lang || A.examLang || 'zh');
  const [{data: slotRows}, {data: bookedAps}, {data: tprof}] = await Promise.all([
    sb.from('interview_slots').select('*').order('slot_date').order('slot_time'),
    sb.from('applicants').select('interview_slot_id').not('interview_slot_id', 'is', null),
    sb.from('profiles').select('id,display_name,interview_langs').eq('role','teacher'),
  ]);
  const teacherList = tprof||[];
  const profileById = new Map(teacherList.map(p=>[String(p.id),p]));
  const takenByApplicant = new Set(
    (bookedAps || [])
      .map(r => r.interview_slot_id)
      .filter(Boolean)
      .map(x => String(x)),
  );
  const toMs = s=>{
    if(!s?.slot_date || !s?.slot_time) return null;
    const m = String(s.slot_date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    const t = String(s.slot_time).match(/^(\d{2}):(\d{2})/);
    if(!m||!t) return null;
    const y=+m[1], mo=+m[2]-1, d=+m[3];
    const hh=+t[1], mm=+t[2];
    return new Date(y,mo,d,hh,mm,0).getTime();
  };
  let free = (slotRows || []).filter(s=>{
    const ms = toMs(s);
    if(!ms || ms <= now) return false;
    if(!isInterviewSlotRowVacant(s)) return false;
    if(takenByApplicant.has(String(s.id))) return false;
    if(!slotSupportsApplicantExamLang(s, needLang, profileById, teacherList)) return false;
    return true;
  });
  free = sortSlotsForApplicantBooking(free, needLang, profileById, teacherList);
  if(A.role==='applicant') A.teacherProfiles = teacherList;
  A.applicantFreeSlots = free;
}

/** 教师端：按日期区间批量添加 interview_slots */
async function teacherAddSlotRange(dateInputId, startInputId, endInputId, intervalSelectId){
  const date=document.getElementById(dateInputId)?.value;
  const start=document.getElementById(startInputId)?.value;
  const end=document.getElementById(endInputId)?.value;
  const interval=parseInt(document.getElementById(intervalSelectId)?.value||'30',10);
  if(!date||!start||!end){toast('请填写日期与开始/结束时间',false);return;}
  const toMin = t=>{
    const [h,m]=String(t).split(':').map(Number);
    return h*60+m;
  };
  const pad2 = n=>String(n).padStart(2,'0');
  const startMin=toMin(start);
  const endMin=toMin(end);
  if(!(interval===20||interval===30)) {toast('请选择 20 或 30 分钟间隔',false);return;}
  if(endMin<=startMin){toast('结束时间必须晚于开始时间',false);return;}
  const times=[];
  for(let m=startMin; m+interval<=endMin; m+=interval){
    const hh=Math.floor(m/60), mm=m%60;
    times.push(`${pad2(hh)}:${pad2(mm)}`);
  }
  if(times.length===0){toast('时间段内没有可生成的时间点',false);return;}
  const now=Date.now();
  const msOf = t=>{
    const dm = String(date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!dm) return null;
    const tt = String(t).match(/^(\d{2}):(\d{2})$/);
    if(!tt) return null;
    const y=+dm[1], mo=+dm[2]-1, d=+dm[3];
    const hh=+tt[1], mm=+tt[2];
    return new Date(y,mo,d,hh,mm,0).getTime();
  };
  const futureTimes=times.filter(t=>{const ms=msOf(t); return ms && ms>now;});
  if(futureTimes.length===0){toast('该时间段内没有未来可用时间点',false);return;}
  const {data:existing} = await sb.from('interview_slots')
    .select('slot_time')
    .eq('slot_date',date)
    .in('slot_time',futureTimes);
  const existSet=new Set((existing||[]).map(r=>r.slot_time));
  const payload=futureTimes.filter(t=>!existSet.has(t)).map(t=>({
    slot_date:date,
    slot_time:t,
    is_booked:false,
    teacher_id:A.user.id,
    teacher_name:A.profile?.display_name || null
  }));
  if(payload.length===0){toast('这些时间点已存在，无需重复添加',true);return;}
  const {error}=await sb.from('interview_slots').insert(payload);
  if(!error){
    toast(`已添加 ${payload.length} 个时间点`,true);
    await loadAdminData();
    render();
  } else toast('添加失败',false);
}

function longestCommonSubsequenceLen(a, b){
  const m=a.length, n=b.length;
  if(!m||!n) return 0;
  const dp = Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
    }
  }
  return dp[m][n];
}

function longestCommonSubstringLen(a, b){
  const m=a.length, n=b.length;
  if(!m||!n) return 0;
  let best=0;
  let row=new Array(n+1).fill(0);
  for(let i=1;i<=m;i++){
    let prevDiag=0;
    for(let j=1;j<=n;j++){
      const tmp=row[j];
      if(a[i-1]===b[j-1]){
        row[j]=prevDiag+1;
        if(row[j]>best) best=row[j];
      } else row[j]=0;
      prevDiag=tmp;
    }
  }
  return best;
}

/** 默写题：按「经文重合度」阶梯给分（每题满分通常为 2）。短句摘抄也能拿到部分分。 */
function scoreDictationByCoverage(uNorm, eNorm, maxScore){
  const round05 = x=>Math.round(x*20)/20;
  const u = uNorm, e = eNorm;
  if(!u||!e||!maxScore) return {points:0, ratio:0};
  if(u===e) return {points:round05(maxScore), ratio:1};
  if(e.length>=12 && e.includes(u) && u.length>=6) return {points:round05(maxScore), ratio:1};
  if(u.length>=12 && u.includes(e)) return {points:round05(maxScore), ratio:1};
  const sub = longestCommonSubsequenceLen(u,e)/e.length;
  const subStr = longestCommonSubstringLen(u,e)/e.length;
  let ratio = Math.min(1, Math.max(sub, subStr));
  const uSet=new Set(u.split(''));
  let inter=0;
  e.split('').forEach(ch=>{ if(uSet.has(ch)) inter++; });
  const bagRatio = e.length ? inter/e.length : 0;
  if(bagRatio>=0.88) ratio = Math.max(ratio, 0.92);
  let frac;
  if(ratio>=0.92) frac=1;
  else if(ratio>=0.78) frac=0.82;
  else if(ratio>=0.60) frac=0.65;
  else if(ratio>=0.42) frac=0.48;
  else if(ratio>=0.26) frac=0.32;
  else if(ratio>=0.14) frac=0.21;
  else if(ratio>=0.08) frac=0.15;
  else if(ratio>=0.04) frac=0.10;
  else if(ratio>0) frac=0.05;
  else frac=0;
  return {points:round05(maxScore*frac), ratio};
}

async function submitExam(){
  stopTimer();
  const qs=(A.examQuestions&&A.examQuestions.length)?A.examQuestions:EXAM_Qs;
  const EA=A.examAnswers||{};
  const EL = A.examLang || 'zh';
  const norm = s=>String(s||'').trim().replace(/\s+/g,'');
  const normOrder = s=>String(s||'').toUpperCase().replace(/[^A-Z]/g,'');
  function normalizeDict(s, lang){
    const t = String(s||'').trim();
    if(!lang || lang==='zh'){
      return t.replace(/\s+/g,'').replace(/[，。！？、；：“”"']/g,'');
    }
    return t.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9\u00c0-\u024f]/g,'');
  }

  let score=0;
  let otEarned=0, ntEarned=0;
  let otMax=0, ntMax=0;

  for(const q of qs){
    const qid=q.id;
    const maxQ = q.score||0;
    const sec = q.section;
    let earned=0;

    if(q.type==='fill'){
      const user = Array.isArray(EA[qid])?EA[qid]:[];
      const expected = (EL==='en' && q.answers_en && q.answers_en.length) ? q.answers_en
        : (EL==='id' && q.answers_id && q.answers_id.length) ? q.answers_id
        : (q.answers||[]);
      const per = expected.length ? (q.score/expected.length) : 0;
      let correct=0;
      for(let bi=0;bi<expected.length;bi++){
        if(norm(user[bi])===norm(expected[bi])) correct++;
      }
      earned = correct * per;
      score += earned;
    } else if(q.type==='single'){
      if(EA[qid]===q.answer_index) earned = q.score;
      score += earned;
    } else if(q.type==='truefalse'){
      if(EA[qid]===q.answer_bool) earned = q.score;
      score += earned;
    } else if(q.type==='match'){
      const user = Array.isArray(EA[qid])?EA[qid]:[];
      const expected = q.answer_map||[];
      const per = expected.length ? (q.score/expected.length) : 0;
      let correct=0;
      for(let li=0;li<expected.length;li++){
        if(user[li]===expected[li]) correct++;
      }
      earned = correct * per;
      score += earned;
    } else if(q.type==='order'){
      const userSeq = normOrder(EA[qid]||'');
      const expSeq = normOrder(q.correct_seq||'');
      if(userSeq===expSeq) earned = q.score;
      score += earned;
    } else if(q.type==='dictation'){
      const expRaw = (EL==='en' && q.expected_en) ? q.expected_en
        : (EL==='id' && q.expected_id) ? q.expected_id
        : (q.expected||'');
      const u = normalizeDict(EA[qid]||'', EL);
      const e = normalizeDict(expRaw, EL);
      if(!u||!e){
        earned=0;
      } else {
        const r = scoreDictationByCoverage(u,e,q.score);
        earned = r.points;
      }
      score += earned;
    }

    if(sec==='ot'){ otEarned+=earned; otMax+=maxQ; }
    else if(sec==='nt'){ ntEarned+=earned; ntMax+=maxQ; }
  }

  // 保险：把可能因题目解析/配分差异导致的“原始得分”线性缩放到满分 100
  const maxPossible = qs.reduce((s,q)=>s+(q.score||0),0);
  const scoreScaled = maxPossible ? Math.round((score/maxPossible)*100) : score;

  const fmt2 = n=>Number(n).toFixed(2);
  // 成绩备注仅保留分项与监考信息（默写原文与机评细节见 exam_answers JSON）
  const examEssayWithRemark = [
    `旧约总分：${fmt2(otEarned)} / ${fmt2(otMax)}`,
    `新约总分：${fmt2(ntEarned)} / ${fmt2(ntMax)}`,
    `切换屏幕次数：${A.proctorFlags||0} 次`,
  ].join('\n');

  const {error} = await sb.from('applicants').update({
    exam_score:scoreScaled,
    exam_essay:examEssayWithRemark,
    exam_answers:EA,
    exam_completed_at:new Date().toISOString(),
    stage:'interview',
    exam_lang: EL,
  }).eq('id',A.applicant.id);
  if(!error){
    A.applicant.exam_score=scoreScaled;
    A.applicant.exam_essay=examEssayWithRemark;
    A.applicant.exam_lang = EL;
    A.applicant.stage='interview';
    A.examSubmitted=true;
    toast('答卷已提交，成绩：'+scoreScaled+' 分');
    await loadPublicSlots();
  } else toast('提交失败',false);
  render();
}

async function confirmInterview(){
  if(!A.ivSelected) return;
  if(!A.applicant?.id){
    toast('登录状态异常，请重新登录后再预约', false);
    return;
  }
  if(!A.ivSelected.id){
    toast('请重新选择时段', false);
    return;
  }
  // 防止用户在时间已经过去后仍然能点到“确认预约”
  const toMs = s=>{
    if(!s?.slot_date || !s?.slot_time) return null;
    const m = String(s.slot_date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    const t = String(s.slot_time).match(/^(\d{2}):(\d{2})/);
    if(!m||!t) return null;
    const y=+m[1], mo=+m[2]-1, d=+m[3];
    const hh=+t[1], mm=+t[2];
    return new Date(y,mo,d,hh,mm,0).getTime();
  };
  const ms = toMs(A.ivSelected);
  if(ms && ms <= Date.now()){
    toast('该面试时间已过期，请刷新选择新的时间段',false);
    return;
  }
  const aid = String(A.applicant.id);
  const {data: dupHold, error: dupErr} = await sb.from('applicants')
    .select('id')
    .eq('interview_slot_id', A.ivSelected.id)
    .not('id', 'eq', aid)
    .limit(1);
  if(dupErr){
    toast('无法校验是否与他人冲突：'+(dupErr.message||'')+'（请检查 applicants 表的 SELECT 策略）', false);
    return;
  }
  if(dupHold && dupHold.length > 0){
    toast('该时段已被其他同学预约，请刷新后另选', false);
    await loadPublicSlots();
    A.ivSelected = null;
    render();
    return;
  }
  const { data: rowFresh, error: snapErr } = await sb.from('interview_slots')
    .select('id,applicant_id,is_booked')
    .eq('id', A.ivSelected.id)
    .maybeSingle();
  if(snapErr){
    toast('无法校验时段：'+(snapErr.message||'请稍后再试'), false);
    return;
  }
  if(!rowFresh || !isInterviewSlotRowVacant(rowFresh)){
    toast('该时段已被其他同学预约，请刷新后另选', false);
    await loadPublicSlots();
    A.ivSelected = null;
    render();
    return;
  }
  // 仅当该时段仍空闲时写入，防止两人同时点确认抢同一槽位（需 Supabase RLS 允许 anon 对空闲行 UPDATE）
  const {data: bookedRows, error: e1} = await sb.from('interview_slots')
    .update({is_booked:true, applicant_id:A.applicant.id})
    .eq('id', A.ivSelected.id)
    .is('applicant_id', null)
    .select('id');
  if(e1){
    toast('预约失败：'+(e1.message||'')+'（若含 policy / RLS，请管理员在 Supabase 执行仓库内 migrations 中的面试预约策略）', false);
    await loadPublicSlots();
    A.ivSelected = null;
    render();
    return;
  }
  if(!bookedRows || bookedRows.length===0){
    toast('未能锁定该时段（可能刚被他人预约，或数据库未允许匿名用户写入 interview_slots）。请刷新重试；管理员请检查 RLS。', false);
    await loadPublicSlots();
    A.ivSelected = null;
    render();
    return;
  }
  const {error:e2} = await sb.from('applicants').update({interview_slot_id:A.ivSelected.id}).eq('id',A.applicant.id);
  if(e2){
    await sb.from('interview_slots').update({is_booked:false, applicant_id:null}).eq('id', A.ivSelected.id);
    toast('预约失败，请重试', false);
    render();
    return;
  }
  A.ivBooked=true;
  A.applicant.interview_slot_id=A.ivSelected.id;
  A.applicantBookedInterviewSlot = A.ivSelected;
  toast('面试预约成功！');
  try{
    await sb.from('notification_log').insert([
      {applicant_id:A.applicant.id,type:'iv_scheduled',recipient:'applicant',content:`面试时间：${A.ivSelected.slot_date} ${A.ivSelected.slot_time}`},
      {applicant_id:A.applicant.id,type:'teacher_notified',recipient:A.ivSelected.teacher_name,content:`申请人：${fullName(A.applicant)}`},
    ]);
  }catch(_){}
  render();
}

  A.applicantBookedInterviewSlot=null;
  if(data.interview_slot_id){
    const {data: bsl} = await sb.from('interview_slots').select('*').eq('id', data.interview_slot_id).maybeSingle();
    if(bsl) A.applicantBookedInterviewSlot = bsl;
  }

  if(data.stage==='interview' && !data.interview_slot_id){
    await loadPublicSlots();
  }

  // 轮询申请人状态变化：当后台把阶段推进到 exam 时自动进入笔试准备页面
  if(applicantStagePoller){clearInterval(applicantStagePoller);applicantStagePoller=null;}
  applicantStagePoller=setInterval(async()=>{
    if(A.role!=='applicant' || !A.applicant?.id) return;
    try{
      const {data:latest}=await sb.from('applicants').select('*').eq('id',A.applicant.id).maybeSingle();
      if(latest && latest.stage && latest.stage!==A.applicant.stage){
        A.applicant=latest;
        A.applicantBookedInterviewSlot=null;
        if(latest.interview_slot_id){
          const {data: bsl} = await sb.from('interview_slots').select('*').eq('id', latest.interview_slot_id).maybeSingle();
          if(bsl) A.applicantBookedInterviewSlot = bsl;
        }
        // 重置笔试状态，避免从旧阶段残留
        A.examStarted=false;
        A.examSubmitted=false;
        A.examAnswers={};
        A.essayText='';
        A.examLang = latest.exam_lang || A.examLang || 'zh';
        if(latest.stage==='interview' && !latest.interview_slot_id){
          await loadPublicSlots();
        }
        render();
      }
    }catch(_){}
  },6000);
  render();
}

async function loginStaff(email,password){
  if(!sb){toast('未连接数据库，请检查网络后刷新',false);return;}
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){toast('邮箱或密码错误',false);return;}
  A.user=data.user;
  const {data:prof}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
  A.profile=prof;

  render();

function renderSteps(cur){
  const idx=STAGE_IDX[cur]||0;
  const applicantMono = A.role==='applicant' && (A.examLang==='en' || A.examLang==='id');
  const stepLabel = (s)=>{
    if(!applicantMono) return s.label;
    if(A.examLang==='en'){
      const parts = String(s.label||'').split(' · ');
      return parts.length > 1 ? parts[parts.length - 1].trim() : s.label;
    }
    const idMap = {apply:'Lamaran', exam:'Ujian', interview:'Wawancara', result:'Hasil', materials:'Berkas', complete:'Selesai'};
    return idMap[s.id] || s.label;
  };
  return `<div class="steps">${STAGES.map((s,i)=>{
    const cls=i<idx?'done':i===idx?'active':'locked';
    const lc=i<idx?'c-indigo4':i===idx?'c-indigo6':'c-gray4';
    const conn=i<STAGES.length-1?`<div class="step-conn ${i<idx?'done':'locked'}"></div>`:'';
    return `<div class="col" style="align-items:center"><div class="step-dot ${cls}">${i<idx?'✓':s.icon}</div><div class="step-label ${lc}">${esc(stepLabel(s))}</div></div>${conn}`;
  }).join('')}</div>`;
}

function renderExamDoing(){
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  if(A.role!=='applicant' || !isExamAllowedNow(A.applicant)){
    const win=getExamWindowUtc();
    const jakarta = win ? fmtRangeInTZ(win.startUtc, win.endUtc, 'Asia/Jakarta') : null;
    const beijing = win ? fmtRangeInTZ(win.startUtc, win.endUtc, 'Asia/Shanghai') : null;
    return `<div class="maxw-lg mx-auto px4" style="padding:28px 16px 64px">
      <div class="t48 mb3">⛔</div>
      <div class="t22 fw7 c-gray8 mb2">当前不可答题 · Exam closed</div>
      <div class="t13 c-gray5 mb4 lh16">只有在印尼时间周一/周三/周六上午 <strong>${EXAM_WIB_START}–${EXAM_WIB_END}</strong> 才可以进入答题。<br><span class="t12 c-gray4">Available Mon/Wed/Sat mornings WIB ${EXAM_WIB_START}–${EXAM_WIB_END} only.</span></div>
      <div class="card p4 tl mb4">
        <div class="fw7 c-gray8 t13 mb2">下一次开放 · Next window</div>
        <div class="t12 c-gray7 lh16">
          ${jakarta?`印尼时间 WIB：<strong>${esc(jakarta)}</strong><br>`:''}
          ${beijing?`北京时间 CST：<strong>${esc(beijing)}</strong><br>`:''}
        </div>
      </div>
      <div class="t12 c-gray5">请返回“笔试准备”页查看提醒。 · Return to the exam briefing page.</div>
    </div>`;
  }
  const qs=(A.examQuestions&&A.examQuestions.length)?A.examQuestions:(EXAM_Qs&&EXAM_Qs.length?EXAM_Qs:[]);
  const EA=A.examAnswers||{};
  const EL=A.examLang||'zh';
  const normOrder = s=>String(s||'').toUpperCase().replace(/[^A-Z]/g,'');

  function locQ(qi){
    if(EL==='en' && globalThis.__EXAM_EN_PARSED && globalThis.__EXAM_EN_PARSED[qi]) return globalThis.__EXAM_EN_PARSED[qi];
    if(EL==='id' && globalThis.__EXAM_ID_PARSED && globalThis.__EXAM_ID_PARSED[qi]) return globalThis.__EXAM_ID_PARSED[qi];
    return null;
  }
  function qPrompt(q, qi){
    if(q.type==='dictation'){
      const exp = EL==='en' && q.expected_en ? q.expected_en
        : EL==='id' && q.expected_id ? q.expected_id
        : (q.expected||'');
      if(EL==='zh'){
        const { ref } = extractZhDictationRef(exp);
        return '请默写：' + (ref || String(q.prompt||'').replace(/^请默写[：:]\s*/,'').trim() || '经文');
      }
      if(EL==='en'){
        const er = extractLatinDictRefFromExpected(exp);
        return er ? ('Write from memory: '+er) : (q.prompt_en||'');
      }
      if(EL==='id'){
        const ir = extractLatinDictRefFromExpected(exp);
        return ir ? ('Tuliskan dari hafalan: '+ir) : (q.prompt_id||'');
      }
      return q.prompt||'';
    }
    const L = locQ(qi);
    if(L && L.type===q.type && L.prompt) return L.prompt;
    if(EL==='en' && q.prompt_en) return q.prompt_en;
    if(EL==='id' && q.prompt_id) return q.prompt_id;
    if(EL==='en'){
      return 'This question could not be loaded in English. Ensure exam-plain-bundled.js is present and refresh the page, or open the site over http(s) so docx_plain_en.txt can load.';
    }
    if(EL==='id'){
      return 'Soal bahasa Indonesia tidak dapat dimuat. Pastikan exam-plain-bundled.js ada dan muat ulang halaman, atau buka situs lewat http(s) agar docx_plain_id.txt dapat diunduh.';
    }
    return q.prompt||'';
  }
  function qOptions(q, qi){
    const L = locQ(qi);
    if(L && L.type==='single' && Array.isArray(L.options) && L.options.some(x=>String(x||'').trim())) return L.options;
    if(EL==='en' && q.options_en && q.options_en.length) return q.options_en;
    if(EL==='id' && q.options_id && q.options_id.length) return q.options_id;
    if(EL==='en' || EL==='id') return [];
    return q.options||[];
  }
  function qLeftItems(q, qi){
    const L = locQ(qi);
    if(L && L.type==='match' && L.left_items && q.left_items && L.left_items.length===q.left_items.length) return L.left_items;
    if(EL==='en' && q.left_items_en && q.left_items && q.left_items_en.length===q.left_items.length) return q.left_items_en;
    if(EL==='id' && q.left_items_id && q.left_items && q.left_items_id.length===q.left_items.length) return q.left_items_id;
    return q.left_items||[];
  }
  function qRightItems(q, qi){
    const L = locQ(qi);
    if(L && L.type==='match' && L.right_items && q.right_items && L.right_items.length===q.right_items.length) return L.right_items;
    if(EL==='en' && q.right_items_en && q.right_items && q.right_items_en.length===q.right_items.length) return q.right_items_en;
    if(EL==='id' && q.right_items_id && q.right_items && q.right_items_id.length===q.right_items.length) return q.right_items_id;
    return q.right_items||[];
  }
  function qOrderItems(q, qi){
    const L = locQ(qi);
    if(L && L.type==='order' && L.items && L.items.length) return L.items;
    if(EL==='en' && q.items_en && q.items_en.length) return q.items_en;
    if(EL==='id' && q.items_id && q.items_id.length) return q.items_id;
    return q.items||[];
  }
  function fillBlanksCount(q){
    if(EL==='en' && q.answers_en && q.answers_en.length) return q.answers_en.length;
    if(EL==='id' && q.answers_id && q.answers_id.length) return q.answers_id.length;
    return q.blanks ?? (q.answers||[]).length;
  }

  const examUi = EL==='en' ? {
    fillHint:(n)=>`Fill in ${n} blank${n>1?'s':''}.`,
    fillPh:(i)=>`Blank ${i+1}`,
    match:'Match each numbered item with the correct option.',
    order:'Enter the letter order (e.g. CABD).',
    orderPh:'e.g. CABD',
    dictPh:'Type the passage from memory.',
    tfT:'True',
    tfF:'False',
    submit:'Submit',
    remain:'Time left',
  } : EL==='id' ? {
    fillHint:(n)=>`Isi ${n} bagian yang kosong.`,
    fillPh:(i)=>`Kosong ${i+1}`,
    match:'Pasangkan setiap nomor dengan jawaban yang tepat.',
    order:'Tuliskan urutan huruf (mis. CABD).',
    orderPh:'mis. CABD',
    dictPh:'Tuliskan ayat dari ingatan Anda.',
    tfT:'Benar',
    tfF:'Salah',
    submit:'Kirim jawaban',
    remain:'Sisa waktu',
  } : {
    fillHint:(n)=>`请填写（${n} 空） · Fill in (${n} blank${n>1?'s':''})`,
    fillPh:(i)=>`空${i+1} · B${i+1}`,
    match:'请完成配对 · Match each item',
    order:'请输入排序字母顺序 · Enter letter order (e.g. CABD)',
    orderPh:'例如 · e.g. CABD',
    dictPh:'请在此输入文本… · Type your answer here…',
    tfT:'√ 对 · True',
    tfF:'× 错 · False',
    submit:'提交答卷 · Submit',
    remain:'剩余 · Left',
  };

  function renderOne(q,qi){
    const qid=q.id;
    const top = `<div class="row g2 mb4">
      <div class="shrink0" style="width:24px;height:24px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:2px">${qi+1}</div>
      <p class="c-gray8 fw5 t13 lh16 flex1">${esc(qPrompt(q, qi))}</p>
    </div>`;

    if(q.type==='fill'){
      const blanks=fillBlanksCount(q);
      const cur=Array.isArray(EA[qid])?EA[qid]:[];
      return `<div class="card p5 mb3">
        ${top}
        <div class="col g2" style="padding-left:32px">
          <div class="t13 c-gray8 mb1" style="color:#111827">${examUi.fillHint(blanks)}</div>
          <div class="row wrap g2">
            ${Array.from({length:blanks}).map((_,bi)=>{
              const val=cur[bi]||'';
              return `<input class="inp" style="min-width:140px;flex:1" data-kind="fill" data-qid="${qid}" data-blank="${bi}" placeholder="${esc(examUi.fillPh(bi))}" value="${esc(val)}">`;
            }).join('')}
          </div>
        </div>
      </div>`;
    }

    if(q.type==='single'){
      const opts=qOptions(q, qi);
      const optMissing = EL==='en'
        ? '<p class="t13" style="color:#b45309">Answer choices failed to load. Refresh the page or use http(s) hosting.</p>'
        : EL==='id'
          ? '<p class="t13" style="color:#b45309">Pilihan jawaban tidak dimuat. Muat ulang halaman atau gunakan hosting http(s).</p>'
          : '';
      return `<div class="card p5 mb3">
        ${top}
        <div class="col g2" style="padding-left:32px">
          ${!opts.length ? optMissing : opts.map((opt,oi)=>{
            const checked=EA[qid]===oi;
            return `<label class="radio-opt${checked?' checked':''}">
              <input type="radio" data-kind="single" data-qid="${qid}" name="q-single-${qid}" value="${oi}" ${checked?'checked':''}>
              <span class="t14 c-gray8" style="color:#111827">${String.fromCharCode(65+oi)}. ${esc(opt)}</span>
            </label>`;
          }).join('')}
        </div>
      </div>`;
    }

    if(q.type==='truefalse'){
      const checkedTrue=EA[qid]===true;
      const checkedFalse=EA[qid]===false;
      return `<div class="card p5 mb3">
        ${top}
        <div class="col g2" style="padding-left:32px">
          <label class="radio-opt${checkedTrue?' checked':''}">
            <input type="radio" data-kind="truefalse" data-qid="${qid}" name="q-tf-${qid}" value="1" ${checkedTrue?'checked':''}>
            <span class="t14 c-gray8" style="color:#111827">${esc(examUi.tfT)}</span>
          </label>
          <label class="radio-opt${checkedFalse?' checked':''}">
            <input type="radio" data-kind="truefalse" data-qid="${qid}" name="q-tf-${qid}" value="0" ${checkedFalse?'checked':''}>
            <span class="t14 c-gray8" style="color:#111827">${esc(examUi.tfF)}</span>
          </label>
        </div>
      </div>`;
    }

    if(q.type==='match'){
      const cur=Array.isArray(EA[qid])?EA[qid]:[];
      const L=qLeftItems(q, qi), R=qRightItems(q, qi);
      return `<div class="card p5 mb3">
        ${top}
        <div class="col g2" style="padding-left:32px">
          <div class="t13 c-gray8 mb1" style="color:#111827">${esc(examUi.match)}</div>
          ${L.map((li,leftIdx)=>{
            const sel=cur[leftIdx];
            return `<div class="row g2 mb2">
              <div class="t13 c-gray8 shrink0" style="width:170px;color:#111827">${leftIdx+1}. ${esc(li)}</div>
              <select class="sel" data-kind="match" data-qid="${qid}" data-left="${leftIdx}">
                ${R.map((ri,rightIdx)=>{
                  const optSel = sel===rightIdx;
                  return `<option value="${rightIdx}" ${optSel?'selected':''}>${esc(ri)}</option>`;
                }).join('')}
              </select>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }

    if(q.type==='order'){
      const cur=EA[qid]||'';
      const oItems=qOrderItems(q, qi);
      return `<div class="card p5 mb3">
        ${top}
        <div class="col g2" style="padding-left:32px">
          <div class="t13 c-gray8 mb1" style="color:#111827">${esc(examUi.order)}</div>
          <input class="inp" style="max-width:320px" data-kind="order" data-qid="${qid}" value="${esc(cur)}" placeholder="${esc(examUi.orderPh)}">
          <div class="col g2 mt2 t13 c-gray8" style="color:#111827">${oItems.map(it=>`<div class="lh16">${esc(it.key)}. ${esc(it.text)}</div>`).join('')}</div>
        </div>
      </div>`;
    }

    if(q.type==='dictation'){
      const cur=EA[qid]||'';
      return `<div class="card p5 mb3">
        ${top}
        <div class="col g2" style="padding-left:32px">
          <textarea class="textarea" rows="5" data-kind="dictation" data-qid="${qid}" placeholder="${esc(examUi.dictPh)}">${esc(cur)}</textarea>
        </div>
      </div>`;
    }

    // fallback
    const unsup = EL==='en'
      ? 'Unsupported question type: '+(q.type||'unknown')
      : EL==='id'
        ? 'Jenis soal tidak didukung: '+(q.type||'unknown')
        : '不支持的题型 · Unsupported：'+(q.type||'unknown');
    return `<div class="card p5 mb3">${top}<div class="t12 c-gray4">${esc(unsup)}</div></div>`;
  }

  const pf = A.proctorFlags||0;
  const switchLabel = EL==='en'
    ? `${pf} tab/window switch${pf===1?'':'es'}`
    : EL==='id'
      ? `Pergantian jendela/tab: ${pf} kali`
      : `切屏 ${pf} 次 · ${pf===1?'1 switch':'switches'}`;

  return `<div class="maxw-2xl mx-auto px4" style="padding-bottom:64px">
    <div id="timer-wrap" class="row g3 r12 p3 mb4" style="position:sticky;top:64px;z-index:10;background:#eef2ff;border:1px solid #e0e7ff">
      <span>⏱</span>
      <div class="timer-bar-outer"><div id="timer-bar" class="timer-bar-inner" style="width:0%;background:linear-gradient(90deg,#4f46e5,#818cf8)"></div></div>
      <span id="timer-disp" class="mono fw7 t13 c-indigo6">${fmt(A.examTime)}</span>
      <span class="t12 c-gray4">${esc(examUi.remain)}</span>
      <span class="ml-auto tag" style="background:#fee2e2;color:#dc2626">${esc(switchLabel)}</span>
    </div>
    <div class="col g4">
      ${qs.map((q,qi)=>renderOne(q,qi)).join('')}
    </div>
    <div class="tc mt8"><button class="btn btn-primary" id="btn-submit-exam">${esc(examUi.submit)}</button></div>
  </div>`;
}

function renderIvBooking(){
  const slots=A.applicantFreeSlots||[];
  const grouped={};
  slots.forEach(s=>{if(!grouped[s.slot_date])grouped[s.slot_date]=[];grouped[s.slot_date].push(s);});
  const el = A.applicant?.exam_lang || A.examLang || 'zh';
  const langHint = el==='en'
    ? apLine('当前为英文笔试，仅显示具备英文面试能力的老师时段（优先 Nathan / Heaven）。','English exam: only slots from English-capable teachers (Nathan / Heaven first).','Ujian EN: hanya slot guru EN.')
    : el==='id'
      ? apLine('当前为印尼语笔试，仅显示具备印尼语面试能力的老师时段（优先 Yohanes）。','Indonesian exam: Indonesian-capable teachers only (Yohanes first).','Ujian ID: hanya slot guru bahasa Indonesia.')
      : apLine('当前为中文笔试，仅显示具备中文面试能力的老师时段（优先 Levi / Will）。','Chinese exam: Chinese-capable teachers only (Levi / Will first).','Ujian ZH: hanya slot guru bahasa Tionghoa.');

  const toMin = t=>{
    const m=String(t||'').match(/^(\d{2}):(\d{2})/);
    if(!m) return null;
    return (+m[1])*60+(+m[2]);
  };
  const inferInterval = (ss)=>{
    const times = ss
      .map(x=>toMin(x.slot_time))
      .filter(v=>v!=null)
      .sort((a,b)=>a-b);
    if(times.length<2) return 30;
    const diffs=[];
    for(let i=1;i<times.length;i++){
      const d=times[i]-times[i-1];
      if(d>0 && d<=60) diffs.push(d);
    }
    const freq = {};
    diffs.forEach(d=>freq[d]=(freq[d]||0)+1);
    // 优先选择 20/30，如果存在
    if(freq[20]||freq[30]){
      return (freq[20]>=freq[30])?20:30;
    }
    // 否则取最接近 20/30 的
    const all = Object.keys(freq).map(Number);
    if(!all.length) return 30;
    const target = all.reduce((best,d)=>Math.abs(d-30)<Math.abs(best-30)?d:best,all[0]);
    // 再校正到 20/30
    return (Math.abs(target-20)<=Math.abs(target-30))?20:30;
  };
  const buildClusters = (ss, interval)=>{
    const sorted = ss
      .slice()
      .sort((a,b)=>(a.slot_time||'').localeCompare(b.slot_time||''));
    const clusters=[];
    let cur=[];
    for(let i=0;i<sorted.length;i++){
      if(cur.length===0){
        cur=[sorted[i]];
        continue;
      }
      const prevMin = toMin(cur[cur.length-1].slot_time);
      const curMin = toMin(sorted[i].slot_time);
      if(prevMin!=null && curMin!=null && (curMin-prevMin)===interval){
        cur.push(sorted[i]);
      }else{
        clusters.push(cur);
        cur=[sorted[i]];
      }
    }
    if(cur.length) clusters.push(cur);
    // 按“尽量连续 + 尽量靠前”：先按长度降序，再按起始时间升序
    clusters.sort((a,b)=>{
      if(b.length!==a.length) return b.length-a.length;
      const am=toMin(a[0].slot_time), bm=toMin(b[0].slot_time);
      return (am||0)-(bm||0);
    });
    return clusters;
  };

  return `<div class="maxw-xl mx-auto px4" style="padding:16px 16px 64px">
    <div class="t20 fw7 c-gray8 mb1">${esc(apLine('预约面试时间','Book interview','Jadwal wawancara'))}</div>
    <div class="b1 bc-indigo100 bg-indigo50 r10 p3 mb4 t12 c-indigo6 lh16">${esc(langHint)}</div>
    <div class="row g2 mb5" style="align-items:center">
      <div class="t13 c-gray5">${esc(apLine('为避免空档，系统会优先推荐连续可预约的时间点；不方便再选备选。','We highlight continuous slots first; pick another if needed.','Kami menonjolkan slot berurutan; pilih lain jika perlu.'))}</div>
      <button class="btn btn-ghost btn-sm ml-auto" id="btn-refresh-slots">${esc(apLine('刷新','Refresh','Muat ulang'))}</button>
    </div>
    ${slots.length===0?`<div class="card p5 tc c-gray4 t13">${esc(apLine('暂无可用时间段，请等待管理员开放。','No open slots yet — please wait for the admin.','Belum ada slot — tunggu admin membuka jadwal.'))}</div>`:''}
    <div class="col g3">
    ${Object.entries(grouped).sort(([da],[db])=>String(da).localeCompare(String(db))).map(([date,ss])=>{
      const interval=inferInterval(ss);
      const clusters=buildClusters(ss, interval);
      const primary=clusters[0]?.[0] || null;
      const secondary=clusters[1]?.[0] || null;
      return `<div class="card p4">
        <div class="fw6 c-gray7 t13 mb3">${esc(date)}</div>
        <div class="row wrap g2">
          ${ss
            .slice()
            .sort((a,b)=>{
              const aKey = (primary && a.id===primary.id)?0:(secondary && a.id===secondary.id)?1:2;
              const bKey = (primary && b.id===primary.id)?0:(secondary && b.id===secondary.id)?1:2;
              if(aKey!==bKey) return aKey-bKey;
              return (a.slot_time||'').localeCompare(b.slot_time||'');
            })
            .map(s=>{
              const isP = primary && s.id===primary.id;
              const isS = secondary && s.id===secondary.id;
              const label = isP ? apLine(' 推荐1',' P1',' P1') : isS ? apLine(' 推荐2',' P2',' P2') : '';
              const style = isP ? 'border-color:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.25);' :
                             isS ? 'border-color:#4f46e5;box-shadow:0 0 0 2px rgba(79,70,229,.2);' : '';
              return `<button class="slot-btn${A.ivSelected?.id===s.id?' active':''}" style="${style}" data-action="pick-slot" data-slotid="${s.id}">${esc(s.slot_time.slice(0,5))}${esc(label)}</button>`;
            }).join('')}
        </div>
      </div>`;
    }).join('')}
    </div>
    ${A.ivSelected?`<div class="b1 bc-indigo200 bg-indigo50 r10 p3 mt4 t13 fw6 c-indigo6">${esc(apLine('已选择：','Selected:','Dipilih:'))} ${esc(A.ivSelected.slot_date)} ${esc(A.ivSelected.slot_time?.slice(0,5)||'')}</div>`:''}
    <button class="btn btn-full mt4 ${A.ivSelected?'btn-primary':'btn-ghost'}" id="btn-confirm-iv" ${A.ivSelected?'':'disabled'}>${esc(apLine('确认预约','Confirm','Konfirmasi'))}</button>
  </div>`;
}

function renderAdmin(){

  const avLetter=(A.profile?.display_name||A.user?.email||'?')[0];
  const tabs=[
    {id:'pipeline',label:'申请人看板',icon:'📊'},
    {id:'exams',label:'笔试成绩',icon:'📝'},
    {id:'schedule',label:'面试排班',icon:'📅'},

      ${ap.admin_notes||ap.wechat_notes?`<div class="fw7 c-gray6 t11 mb2" style="text-transform:uppercase;letter-spacing:.5px">管理备注</div>
      <div class="card p4 mb4 bg-amber50 b1 bc-amber200">

      ${rec?`<div class="fw7 c-gray6 t11 mb2" style="text-transform:uppercase;letter-spacing:.5px">面试记录</div>
      <div class="card p4 mb4">
        <div class="row g2 mb2"><span class="fw6 c-gray7">${esc(rec.recorded_by_name)}</span><span class="t11 c-gray4">${esc(rec.interview_date?.slice(0,10)||'')}</span>

        </div>

      <div class="b1 bc-indigo200 bg-indigo50 r12 p4">

        ${!ivSl?'<div class="t11 c-gray4 mt1">（未匹配到时段表中的 Zoom 时使用默认会议号 · Default if slot has no Zoom）</div>':''}
      </div>

      <div class="row g2 mt5">
        ${isAd && STAGE_IDX[ap.stage] < STAGE_IDX['complete'] ? `<button class="btn btn-primary btn-full" data-action="advance-ap" data-apid="${ap.id}">推进至下一阶段</button>` : ''}
        <button class="btn btn-outline btn-full" data-action="write-record" data-apid="${ap.id}" ${STAGE_IDX[ap.stage] < STAGE_IDX['interview']?'disabled':''}>填写面试记录</button>

      ${isAd?`<div class="row g2 mt3">
        <button class="btn btn-danger btn-full" data-action="reject-ap" data-apid="${ap.id}">标记拒绝</button>
        <button class="btn btn-ghost btn-full" data-action="delete-ap" data-apid="${ap.id}">删除账号</button>

      <div class="row g2 mt3">
        <button class="btn btn-outline btn-full" data-action="edit-ap-info" data-apid="${ap.id}">添加/编辑申请人信息</button>
      </div>`:''}

  </div>`;
}

// ══════════════════════════════════════════════════════════════
// MAIN RENDER + EVENTS
// ══════════════════════════════════════════════════════════════
function render(){
  stopTimer();
  const root=document.getElementById('root');
  if(!A.role) root.innerHTML=renderLogin();
  else if(A.role==='applicant') root.innerHTML=renderApplicant();
  else if(A.role==='teacher'||A.role==='admin') root.innerHTML=renderAdmin();
  bind();
  if(A.role==='applicant'&&A.applicant?.stage==='exam'&&A.examStarted&&!A.examSubmitted) startTimer();
  syncInterviewSlotPoll();
}

function bind(){
  const root=document.getElementById('root');

  // ── Login ──
  document.getElementById('btn-login-applicant')?.addEventListener('click',()=>{A.loginMode='applicant';render();});
  document.getElementById('btn-login-staff')?.addEventListener('click',()=>{A.loginMode='staff';render();});
  document.getElementById('btn-back-login')?.addEventListener('click',()=>{A.loginMode=null;render();});
  document.getElementById('btn-ap-login')?.addEventListener('click',async()=>{
    const name=document.getElementById('ap-name')?.value;
    const last4=document.getElementById('ap-phone4')?.value;
    if(!name||!last4){toast(apLine('请填写姓名和手机后四位','Please enter your name and last 4 digits of your phone','Isi nama dan 4 digit terakhir nomor HP'),false);return;}
    await loginApplicant(name,last4);
  });
  document.getElementById('btn-staff-login')?.addEventListener('click',async()=>{
    const email=document.getElementById('staff-email')?.value;
    const pw=document.getElementById('staff-pw')?.value;
    if(!email||!pw){toast('请填写邮箱和密码',false);return;}
    await loginStaff(email,pw);
  });
  document.getElementById('btn-logout')?.addEventListener('click',logout);

  // ── Exam ──
  root.querySelectorAll('[data-action=set-exam-lang]').forEach(el=>{
    el.addEventListener('click',()=>{
      A.examLang = el.dataset.lang || 'zh';
      render();
    });
  });
  root.querySelectorAll('[data-action=set-app-lang]').forEach(el=>{
    el.addEventListener('click',()=>{
      A.examLang = el.dataset.lang || 'zh';
      render();
    });
  });
  document.getElementById('btn-start-exam')?.addEventListener('click',()=>{
    const ap = A.applicant;
    const win = getExamWindowUtc();
    const allowedNow = isExamAllowedNow(ap);
    if(!allowedNow){
      toast('当前非笔试开放时间，暂不可答题',false);
      render();
      return;
    }
    if(!win || !win.endUtc){
      toast('无法获取考试时间窗口',false);
      return;
    }
    const remainSec = isExamExemptApplicant(ap) ? (A.examTotalTime||9000) : Math.max(0, Math.floor((win.endUtc.getTime() - Date.now())/1000));
    if(remainSec<=0){
      toast('该开放时间已结束，请刷新后选择下一次',false);
      render();
      return;
    }
    A.examStarted=true;
    A.examSubmitted=false;
    A.examAnswers={};
    A.essayText='';
    A.proctorFlags=0;
    A.examTime=remainSec;

    // Basic proctoring: detect tab switch / blur / visibility change
    try{
      if(!window.__proctorInstalled){
        window.__proctorInstalled=true;
        const flag = ()=>{
          if(A.role!=='applicant' || A.applicant?.stage!=='exam' || !A.examStarted || A.examSubmitted) return;
          A.proctorFlags=(A.proctorFlags||0)+1;
          toast('检测到切屏/切换窗口（已记录 '+A.proctorFlags+' 次）',false);
          render();
        };
        document.addEventListener('visibilitychange',()=>{
          if(document.visibilityState==='hidden') flag();
        });
        window.addEventListener('blur',()=>flag());
      }
    }catch(_){}
    render();
  });
  document.getElementById('btn-submit-exam')?.addEventListener('click',()=>submitExam());
  document.getElementById('btn-go-interview')?.addEventListener('click',async()=>{await loadPublicSlots();render();});
  document.getElementById('btn-refresh-slots')?.addEventListener('click',async()=>{await loadPublicSlots();render();});

  // Exam inputs
  root.querySelectorAll('input[data-kind="single"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const qid=+el.dataset.qid;
      A.examAnswers[qid]=+el.value;
    });
  });
  root.querySelectorAll('input[data-kind="truefalse"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const qid=+el.dataset.qid;
      A.examAnswers[qid]=el.value==='1';
    });
  });
  root.querySelectorAll('input[data-kind="fill"]').forEach(el=>{
    el.addEventListener('input',e=>{
      const qid=+el.dataset.qid;
      const bi=+el.dataset.blank;
      if(!Array.isArray(A.examAnswers[qid])) A.examAnswers[qid]=[];
      A.examAnswers[qid][bi]=el.value;
    });
  });
  root.querySelectorAll('select[data-kind="match"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const qid=+el.dataset.qid;
      const li=+el.dataset.left;
      const ri=parseInt(el.value,10);
      if(!Array.isArray(A.examAnswers[qid])) A.examAnswers[qid]=[];
      A.examAnswers[qid][li]=ri;
    });
  });
  root.querySelectorAll('input[data-kind="order"]').forEach(el=>{
    el.addEventListener('input',e=>{
      const qid=+el.dataset.qid;
      A.examAnswers[qid]=String(el.value||'').toUpperCase().replace(/[^A-Z]/g,'');
    });
  });
  root.querySelectorAll('textarea[data-kind="dictation"]').forEach(el=>{
    el.addEventListener('input',e=>{
      const qid=+el.dataset.qid;
      A.examAnswers[qid]=el.value;
    });
  });

  // ── Interview booking ──
  document.getElementById('btn-confirm-iv')?.addEventListener('click',()=>confirmInterview());

  // ── Materials ──
  root.querySelectorAll('[data-action=toggle-mat]').forEach(el=>{
    el.addEventListener('click',()=>{const mid=el.dataset.mid;A.uploads[mid]=!A.uploads[mid];render();});
  });

  // ── Slot pick (applicant) ──
  root.querySelectorAll('[data-action=pick-slot]').forEach(el=>{
    el.addEventListener('click',()=>{
      const slotid=el.dataset.slotid;
      A.ivSelected=(A.applicantFreeSlots||[]).find(s=>String(s.id)===String(slotid))||null;
      render();
    });
  });

  // ── Admin tab ──
  root.querySelectorAll('[data-admin-tab]').forEach(el=>{
    el.addEventListener('click',()=>{A.adminTab=el.dataset.adminTab;A.selectedApId=null;render();});
  });
  // ── Select / close applicant ──
  root.querySelectorAll('[data-action=select-ap]').forEach(el=>{
    el.addEventListener('click',()=>{A.selectedApId=el.dataset.apid;render();});
  });
  root.querySelectorAll('[data-action=close-modal]').forEach(el=>{
    el.addEventListener('click',()=>{A.selectedApId=null;render();});
  });

  // ── Briefing ──
  root.querySelectorAll('[data-action=view-briefing]').forEach(el=>{
    el.addEventListener('click',()=>{A.briefingId=el.dataset.apid;A.selectedApId=null;render();});
  });
  root.querySelectorAll('[data-action=close-briefing]').forEach(el=>{
    el.addEventListener('click',()=>{A.briefingId=null;render();});
  });

  // ── Manual score entry ──
  root.querySelectorAll('[data-action=save-manual-score]').forEach(el=>{
    el.addEventListener('click',async()=>{
      if(A.role!=='admin'){toast('仅管理员可录入成绩',false);return;}
      const apid=el.dataset.apid;
      const scoreVal=document.getElementById('manual-score-'+apid)?.value;
      const score=parseInt(scoreVal);
      if(isNaN(score)||score<0||score>100){toast('请输入0-100之间的成绩',false);return;}
      const {error}=await sb.from('applicants').update({exam_score:score}).eq('id',apid);
      if(!error){
        const ap=A.allApplicants.find(a=>a.id===apid);
        if(ap)ap.exam_score=score;
        toast('成绩已录入：'+score+' 分');render();
      } else toast('录入失败：'+(error?.message||''),false);
    });
  });

  // ── Add applicant modal ──
  root.querySelectorAll('[data-action=show-add-ap-modal]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(A.role!=='admin') return;
      A.showAddApModal=true;render();
    });
  });
  root.querySelectorAll('[data-action=close-add-ap-modal]').forEach(el=>{
    el.addEventListener('click',()=>{A.showAddApModal=false;render();});
  });
  document.getElementById('btn-save-add-ap')?.addEventListener('click',async()=>{
    if(A.role!=='admin') return;
    const name=(document.getElementById('add-ap-name')?.value||'').trim();
    const phone=(document.getElementById('add-ap-phone')?.value||'').trim();
    const email=(document.getElementById('add-ap-email')?.value||'').trim();
    // 注意：当前 Supabase 的 `applicants` 表可能没有 `program` 列
    // 所以这里不把它写入数据库，避免插入失败
    const stage=document.getElementById('add-ap-stage')?.value||'apply';
    if(!name){toast('请输入姓名',false);return;}
    const phoneDigits=(phone||'').replace(/\D/g,'');
    const last4=phoneDigits.length>=4?phoneDigits.slice(-4):phoneDigits;
    if(!last4||last4.length!==4){
      toast('请填写手机号后四位（或完整手机号）',false);
      return;
    }
    // 注意：登录与查询使用的是 full_name + phone_last4
    // 但在你的数据库中，phone_last4 很可能也是 GENERATED（自动生成）列
    // 因此这里只写入 phone，让后端自动生成 phone_last4
    const {data,error}=await sb.from('applicants').insert([{
      // `full_name` 在数据库里可能是 GENERATED（自动生成）列
      // 因此这里不要手动写入 full_name，改为写 first_name/last_name
      first_name:name,
      last_name:'',
      phone:phone||null,
      email:email||null,
      stage
    }]).select().single();
    if(!error&&data){A.allApplicants.unshift(data);A.showAddApModal=false;toast('已添加：'+name);render();}
    else toast('添加失败：'+(error?.message||'未知错误'),false);
  });

  // ── Edit applicant info modal ──
  root.querySelectorAll('[data-action=edit-ap-info]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      if(A.role!=='admin') return;
      const apid=el.dataset.apid;
      A.showEditApInfoModal=true;
      A.editApInfoId=apid;
      render();
    });
  });
  root.querySelectorAll('[data-action=close-edit-ap-info]').forEach(el=>{
    el.addEventListener('click',()=>{A.showEditApInfoModal=false;A.editApInfoId=null;render();});
  });
  document.getElementById('btn-save-ap-info')?.addEventListener('click',async()=>{
    if(A.role!=='admin') return;
    const apid=document.getElementById('btn-save-ap-info')?.dataset?.apid;
    if(!apid) return;
    const gender=document.getElementById('edit-ap-gender')?.value || '';
    const hometown=document.getElementById('edit-ap-hometown')?.value || '';
    const education=document.getElementById('edit-ap-education')?.value || '';
    const church_name=document.getElementById('edit-ap-church')?.value || '';
    const denomination=document.getElementById('edit-ap-denom')?.value || '';
    const language_proficiency=document.getElementById('edit-ap-language')?.value || '';
    const marital_status=document.getElementById('edit-ap-marital')?.value || '';
    const conversion_time_raw=document.getElementById('edit-ap-conversion-time')?.value || '';
    const conversion_testimony=document.getElementById('edit-ap-conv-testimony')?.value || '';
    const ministry_experience=document.getElementById('edit-ap-ministry')?.value || '';
    const admin_notes=document.getElementById('edit-ap-admin-notes')?.value || '';
    const wechat_notes=document.getElementById('edit-ap-wechat-notes')?.value || '';

    const payload={
      gender: gender||null,
      hometown: hometown||null,
      education: education||null,
      church_name: church_name||null,
      denomination: denomination||null,
      language_proficiency: language_proficiency||null,
      marital_status: marital_status||null,
      conversion_time: conversion_time_raw ? new Date(conversion_time_raw).toISOString() : null,
      conversion_testimony: conversion_testimony||null,
      ministry_experience: ministry_experience||null,
      admin_notes: admin_notes||null,
      wechat_notes: wechat_notes||null,
    };

    const {error}=await sb.from('applicants').update(payload).eq('id',apid);
    if(!error){
      toast('档案信息已保存');
      A.showEditApInfoModal=false;
      A.editApInfoId=null;
      await loadAdminData();
      render();
    } else {
      toast('保存失败：'+(error?.message||'未知错误'),false);
    }
  });

  // ── Delete applicant ──
  root.querySelectorAll('[data-action=delete-ap]').forEach(el=>{
    el.addEventListener('click',async e=>{
      e.stopPropagation();
      if(A.role!=='admin') return;
      const apid=el.dataset.apid;
      const ap=A.allApplicants.find(a=>a.id===apid);
      if(!confirm('确认删除「'+(ap?fullName(ap):'该申请人')+'」？此操作不可撤销。'))return;
      const {error}=await sb.from('applicants').delete().eq('id',apid);
      if(!error){
        A.allApplicants=A.allApplicants.filter(a=>a.id!==apid);
        if(A.selectedApId===apid)A.selectedApId=null;
        if(A.briefingId===apid)A.briefingId=null;
        toast('已删除');
        render();
      } else toast('删除失败',false);
    });
  });

  // ── Record form ──
  root.querySelectorAll('[data-action=write-record]').forEach(el=>{
    el.addEventListener('click',()=>{A.selectedApId=el.dataset.apid;A.showRecordForm=true;A.briefingId=null;render();});
  });
  root.querySelectorAll('[data-action=close-record-form]').forEach(el=>{
    el.addEventListener('click',()=>{A.showRecordForm=false;render();});
  });
  document.getElementById('btn-save-record')?.addEventListener('click',async()=>{
    const content=document.getElementById('rec-content')?.value;
    const spiritual=document.getElementById('rec-spiritual')?.value;
    const rec=document.querySelector('input[name=rec-recommendation]:checked')?.value;
    const note=document.getElementById('rec-note')?.value;
    const dateVal=document.getElementById('rec-date')?.value;
    const name=A.profile?.display_name||'管理员';
    const {error}=await sb.from('interview_records').insert([{
      applicant_id:A.selectedApId,recorded_by_id:A.user?.id,recorded_by_name:name,
      content,spiritual_assessment:spiritual,recommendation:rec,recommendation_note:note,
      interview_date:dateVal?new Date(dateVal).toISOString():new Date().toISOString()
    }]);
    if(!error){toast('面试记录已保存');A.showRecordForm=false;await loadAdminData();render();}
    else toast('保存失败',false);
  });

  // ── Advance / Reject ──
  root.querySelectorAll('[data-action=advance-ap]').forEach(el=>{
    el.addEventListener('click',async()=>{
      if(A.role!=='admin') return;
      const ap=A.allApplicants.find(a=>a.id===el.dataset.apid);
      if(!ap)return;
      const idx=STAGE_IDX[ap.stage]||0;
      if(idx>=STAGES.length-1)return;
      const nextStage=STAGES[idx+1].id;
      const {error}=await sb.from('applicants').update({stage:nextStage}).eq('id',ap.id);
      if(!error){ap.stage=nextStage;A.selectedApId=null;toast('已推进至：'+STAGES[idx+1].label);render();}
      else toast('操作失败',false);
    });
  });
  root.querySelectorAll('[data-action=reject-ap]').forEach(el=>{
    el.addEventListener('click',async()=>{
      if(A.role!=='admin') return;
      if(!confirm('确认拒绝此申请人？'))return;
      const {error}=await sb.from('applicants').update({stage:'rejected'}).eq('id',el.dataset.apid);
      if(!error){A.allApplicants=A.allApplicants.map(a=>a.id===el.dataset.apid?{...a,stage:'rejected'}:a);A.selectedApId=null;toast('已标记拒绝');render();}
    });
  });

  // ── Admin: add slot ──
  document.getElementById('btn-add-admin-slot')?.addEventListener('click',async()=>{
    if(A.role!=='admin'){toast('仅管理员可在此添加公共排班',false);return;}
    const date=document.getElementById('a-slot-date')?.value;
    const start=document.getElementById('a-slot-start')?.value;
    const end=document.getElementById('a-slot-end')?.value;
    const interval=parseInt(document.getElementById('a-slot-interval')?.value||'30',10);
    const teacherId=(document.getElementById('a-slot-teacher-id')?.value||'').trim();
    if(!teacherId){toast('请选择负责老师',false);return;}
    const tp=(A.teacherProfiles||[]).find(x=>String(x.id)===String(teacherId));
    if(!date||!start||!end){toast('请填写日期与开始/结束时间',false);return;}
    const toMin = t=>{
      const [h,m]=String(t).split(':').map(Number);
      return h*60+m;
    };
    const pad2 = n=>String(n).padStart(2,'0');
    const startMin=toMin(start);
    const endMin=toMin(end);
    if(!(interval===20||interval===30)) {toast('请选择 20 或 30 分钟间隔',false);return;}
    if(endMin<=startMin){toast('结束时间必须晚于开始时间',false);return;}

    const times=[];
    for(let m=startMin; m+interval<=endMin; m+=interval){
      const hh=Math.floor(m/60), mm=m%60;
      times.push(`${pad2(hh)}:${pad2(mm)}`);
    }
    if(times.length===0){toast('时间段内没有可生成的时间点',false);return;}

    // 过滤掉已经过去的时间点，避免申请者无法选择但后台还能插入
    const now=Date.now();
    const msOf = t=>{
      const m = String(date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(!m) return null;
      const tt = String(t).match(/^(\d{2}):(\d{2})$/);
      if(!tt) return null;
      const y=+m[1], mo=+m[2]-1, d=+m[3];
      const hh=+tt[1], mm=+tt[2];
      return new Date(y,mo,d,hh,mm,0).getTime();
    };
    const futureTimes=times.filter(t=>{const ms=msOf(t); return ms && ms>now;});
    if(futureTimes.length===0){toast('该时间段内没有未来可用时间点',false);return;}

    // 跳过已存在的时间点，避免插入重复
    const {data:existing} = await sb.from('interview_slots')
      .select('slot_time')
      .eq('slot_date',date)
      .in('slot_time',futureTimes);
    const existSet=new Set((existing||[]).map(r=>r.slot_time));
    const payload=futureTimes.filter(t=>!existSet.has(t)).map(t=>({
      slot_date:date,
      slot_time:t,
      is_booked:false,
      teacher_id:teacherId,
      teacher_name:tp?.display_name||null
    }));
    if(payload.length===0){toast('这些时间点已存在，无需重复添加',true);return;}

    const {error}=await sb.from('interview_slots').insert(payload);
    if(!error){
      toast(`已添加 ${payload.length} 个时间点`,true);
      await loadAdminData();
      render();
    } else toast('添加失败',false);
  });
  root.querySelectorAll('[data-action=del-slot]').forEach(el=>{
    el.addEventListener('click',async()=>{
      if(A.role!=='admin'){toast('仅管理员可删除排班上的时段',false);return;}
      const {error}=await sb.from('interview_slots').delete().eq('id',el.dataset.slotid);
      if(!error){A.allSlots=A.allSlots.filter(s=>s.id!==el.dataset.slotid);toast('已删除');render();}
    });
  });

  // ── 我的：改密 + 本人面试时段 ──
  document.getElementById('btn-me-add-slots')?.addEventListener('click',async()=>{
    await teacherAddSlotRange('me-slot-date','me-slot-start','me-slot-end','me-slot-interval');
  });
  document.getElementById('btn-me-change-pw')?.addEventListener('click',async()=>{
    const p1=(document.getElementById('me-pw-new')?.value||'').trim();
    const p2=(document.getElementById('me-pw-new2')?.value||'').trim();
    if(p1.length<6){toast('新密码至少 6 位',false);return;}
    if(p1!==p2){toast('两次输入的密码不一致',false);return;}
    const {error}=await sb.auth.updateUser({password:p1});
    if(error){toast('修改失败：'+(error.message||''),false);return;}
    toast('密码已更新');
    const el1=document.getElementById('me-pw-new');
    const el2=document.getElementById('me-pw-new2');
    if(el1) el1.value='';
    if(el2) el2.value='';
  });
  root.querySelectorAll('[data-action=del-my-slot]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const sid=el.dataset.slotid;
      const row=A.allSlots.find(s=>String(s.id)===String(sid));
      if(!row || String(row.teacher_id)!==String(A.user?.id)){
        toast('只能删除归属您本人的空闲时段',false);
        return;
      }
      if(!isInterviewSlotRowVacant(row)){
        toast('已有人预约的时段不可删除',false);
        return;
      }
      const {error}=await sb.from('interview_slots').delete().eq('id',sid);
      if(!error){
        A.allSlots=A.allSlots.filter(s=>String(s.id)!==String(sid));
        toast('已删除');
        render();
      } else toast('删除失败',false);
    });
  });
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init(){
  if(!sb){
    document.getElementById('root').innerHTML='<div class="p6" style="max-width:520px;margin:48px auto;line-height:1.65;font-family:system-ui,sans-serif"><h1 class="t18 fw7 c-gray8 mb3">无法加载 Supabase 客户端</h1><p class="t13 c-gray6 mb2">未找到全局 <code>supabase</code>。请确认已部署 <code>vendor/supabase.js</code>，且与 <code>index.html</code> 中引用路径一致。</p><p class="t13 c-gray6 mb2">若曾用外网 CDN，请重新部署当前仓库（含 <code>vendor/</code> 目录）。</p></div>';
    return;
  }
  // 先用内嵌中文题库出首屏；ensureExamQuestionsLoaded 内含大量同步解析，若在 render 之前 await 会导致整页长时间停在初始转圈
  A.examQuestions = (EXAM_Qs && EXAM_Qs.length) ? EXAM_Qs : [];
  // Check existing session（避免 API 长时间无响应导致整页一直转圈）
  let session=null;
  try{
    const out=await Promise.race([
      sb.auth.getSession(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('getSession 超时')),15000)),
    ]);
    session=out?.data?.session??null;
  }catch(e){
    console.warn(e);
  }
  if(session){
    A.user=session.user;
    let prof=null;
    try{
      const pr=await Promise.race([
        sb.from('profiles').select('*').eq('id',session.user.id).single(),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('profiles 超时')),15000)),
      ]);
      if(pr&&!pr.error) prof=pr.data;
    }catch(e){ console.warn(e); }
    if(prof){
      A.profile=prof;A.role=prof.role;
      if(A.role==='admin'||A.role==='teacher'){
        try{
          await Promise.race([
            loadAdminData(),
            new Promise((_,rej)=>setTimeout(()=>rej(new Error('loadAdminData 超时')),20000)),
          ]);
        }catch(e){ console.warn(e); }
      }
    }
  }
  render();
  ensureExamQuestionsLoaded()
    .then(()=>{ render(); })
    .catch(e=>console.warn('题库后台加载', e));
}

init().catch(err=>{
  console.error(err);
  try{
    A.role=null;
    A.user=null;
    A.profile=null;
    render();
  }catch(_){}
  const msg=err&&err.message?String(err.message):String(err);
  toast('页面加载异常，已显示登录页。若持续如此，请按 F12 查看控制台错误。'+msg.slice(0,120), false);
});
</script>
