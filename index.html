function renderPipeline(){
  const isAd=A.role==='admin';
  const canAddAp=isAd||A.role==='teacher';
  const cardHtml=(ap)=>`<div class="kanban-card" style="position:relative" data-action="select-ap" data-apid="${ap.id}">
            ${ap.sheet_import_unseen?`<span title="报名表新导入" style="position:absolute;top:8px;left:8px;width:8px;height:8px;background:#ef4444;border-radius:50%;box-shadow:0 0 0 2px #fff;z-index:1"></span>`:''}
            ${isAd?`<button class="btn btn-danger btn-xs" style="position:absolute;top:6px;right:6px;padding:2px 6px;font-size:11px" data-action="delete-ap" data-apid="${ap.id}">🗑</button>`:''}
            <div class="row g2 mb2">${mkAv(initials(ap),'sm')}<div><div class="fw6 c-gray8 t13 row g1 wrap" style="align-items:center">${esc(fullName(ap))}${ap.mat_survey_alert?mkTag('#fef3c7','#92400e','需留意'):''}</div>${ap.exam_score!=null?mkTag('#eef2ff','#4f46e5',ap.exam_score+' 分'):''}</div></div>
            <div class="t11 c-gray5 mb1">${esc(examLangLabelShort(getApplicantExamLang(ap)))}</div>
            ${ap.phone?`<div class="t11 c-gray4">📞 ${esc(ap.phone)}</div>`:''}
            ${ap.interview_slot_id&&ap.stage!=='complete'?`<div class="t11 mt1" style="color:#4f46e5;font-weight:600">📅 ${esc(formatInterviewSlotLine(ap))}</div>`:''}
          </div>`;
  const emptyHtml=`<div style="font-size:11px;color:#d1d5db;text-align:center;padding:16px 0;border:2px dashed #f3f4f6;border-radius:12px">暂无</div>`;
  return `<div>
    ${canAddAp?`<div class="row g2 mb4">
      <button class="btn btn-primary btn-sm" data-action="show-add-ap-modal">➕ 手动添加申请人</button>
    </div>`:''}
    <div class="kanban">
    ${STAGES.map(sg=>{
      const aps=A.allApplicants.filter(a=>a.stage===sg.id);
      const colClass=sg.id==='interview'?'kanban-col kanban-col-interview':'kanban-col';
      let inner='';
      if(sg.id==='interview'){
        const by={zh:[],en:[],id:[]};
        aps.forEach(ap=>{const L=getApplicantExamLang(ap);(by[L]||by.zh).push(ap);});
        ['zh','en','id'].forEach(L=>{
          (by[L]||[]).sort((a,b)=>{
            const d = applicantInterviewSlotTs(a) - applicantInterviewSlotTs(b);
            return d !== 0 ? d : String(fullName(a)).localeCompare(String(fullName(b)), 'zh');
          });
        });
        inner=['zh','en','id'].map(L=>{
          const list=by[L]||[];
          return `<div class="lang-subgroup">
            <div class="lang-subgroup-h">${esc(examLangPipelineGroupTitle(L))}</div>
            <div class="col g2">${list.map(cardHtml).join('')}${list.length===0?emptyHtml:''}</div>
          </div>`;
        }).join('');
      } else {
        inner=`<div class="col g2">${aps.map(cardHtml).join('')}${aps.length===0?emptyHtml:''}</div>`;
      }
      return `<div class="${colClass}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
          <span>${sg.icon}</span><span class="fw6 c-gray7 t13">${sg.label}</span>
          <span class="ml-auto tag" style="background:#f3f4f6;color:#6b7280">${aps.length}</span>
        </div>
        ${inner}
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

function render(){
  stopTimer();
  const root=document.getElementById('root');
  if(!A.role) root.innerHTML=renderLogin();
  else if(A.role==='applicant') root.innerHTML=renderApplicant();
  else if(A.role==='teacher'||A.role==='admin') root.innerHTML=renderAdmin();
  bind();
  const rh=document.getElementById('root-html');
  if(rh){
    if(A.role==='applicant') rh.setAttribute('lang',A.appLang==='id'?'id':A.appLang==='en'?'en':'zh-CN');
    else rh.setAttribute('lang','zh-CN');
  }
  if(A.role==='applicant'&&A.applicant?.stage==='exam'&&A.examStarted&&!A.examSubmitted) startTimer();
  syncInterviewSlotPoll();
}

function bind(){
  const root=document.getElementById('root');

  // ── Login ──
  document.getElementById('btn-login-applicant')?.addEventListener('click',()=>{A.loginMode='applicant';render();});

  // ── Exam ──
  root.querySelectorAll('[data-action=set-exam-lang]').forEach(el=>{
    el.addEventListener('click',()=>{
      A.examLang = el.dataset.lang || 'zh';
      persistApplicantExamLang(A.examLang);
      if(A.role==='applicant'&&A.applicant?.id){
        persistApplicantBrowserSession(A.applicant,A.applicant.full_name,A.applicant.phone_last4);
      }
      scheduleApplicantExamDraftSave();
      render();
    });
  });
  root.querySelectorAll('[data-action=set-app-lang]').forEach(el=>{
    el.addEventListener('click',()=>{
      A.appLang = el.dataset.lang || 'zh';
      persistApplicantAppLang(A.appLang);
      if(A.role==='applicant'&&A.applicant?.id){
        persistApplicantBrowserSession(A.applicant,A.applicant.full_name,A.applicant.phone_last4);
      }
      render();
    });
  });
  document.getElementById('btn-enter-exam-from-apply')?.addEventListener('click',()=>{ applicantPromoteToExam(); });
  document.getElementById('btn-start-exam')?.addEventListener('click',()=>{
    const ap = A.applicant;
    const win = getExamWindowUtc();
    const allowedNow = isExamAllowedNow(ap);
    if(!allowedNow){
      toast(apLine('当前非笔试开放时间，暂不可答题','The exam window is not open yet.','Jendela ujian belum dibuka.'),false);
      render();
      return;
    }
    if(!win || !win.endUtc){
      toast(apLine('无法获取考试时间窗口','Cannot load exam schedule.','Tidak bisa memuat jadwal ujian.'),false);
      return;
    }
    const remainSec = isExamExemptApplicant(ap) ? (A.examTotalTime||9000) : Math.max(0, Math.floor((win.endUtc.getTime() - Date.now())/1000));
    if(remainSec<=0){
      toast(apLine('该开放时间已结束，请刷新后选择下一次','This window has ended — refresh for the next one.','Jendela ini berakhir — muat ulang.'),false);
      render();
      return;
    }
    A.examStarted=true;
    A.examSubmitted=false;
    A.examAnswers={};
    A.essayText='';
    A.proctorFlags=0;
    A.examTime=remainSec;
    saveApplicantExamDraft();

    // Basic proctoring: detect tab switch / blur / visibility change
    try{
      if(!window.__proctorInstalled){
        window.__proctorInstalled=true;
        const flag = ()=>{
          if(A.role!=='applicant' || A.applicant?.stage!=='exam' || !A.examStarted || A.examSubmitted) return;
          A.proctorFlags=(A.proctorFlags||0)+1;
          saveApplicantExamDraft();
          toast(apLine('检测到切屏/切换窗口（已记录 '+A.proctorFlags+' 次）','Tab/window switch detected ('+A.proctorFlags+').','Pindah jendela/tab tercatat ('+A.proctorFlags+').'),false);
          render();
        };
        document.addEventListener('visibilitychange',()=>{
          if(document.visibilityState==='hidden') flag();
        });
        window.addEventListener('blur',()=>flag());
      }
    }catch(_){}
    render();
  });
  document.getElementById('btn-submit-exam')?.addEventListener('click',()=>submitExam());
  document.getElementById('btn-go-interview')?.addEventListener('click',async()=>{await loadPublicSlots();render();});
  document.getElementById('btn-refresh-slots')?.addEventListener('click',async()=>{await loadPublicSlots();render();});

  // Exam inputs
  root.querySelectorAll('input[data-kind="single"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const qid=+el.dataset.qid;
      A.examAnswers[qid]=+el.value;
      scheduleApplicantExamDraftSave();
    });
  });
  root.querySelectorAll('input[data-kind="truefalse"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const qid=+el.dataset.qid;
      A.examAnswers[qid]=el.value==='1';
      scheduleApplicantExamDraftSave();
    });
  });
  root.querySelectorAll('input[data-kind="fill"]').forEach(el=>{
    el.addEventListener('input',e=>{
      const qid=+el.dataset.qid;
      const bi=+el.dataset.blank;
      if(!Array.isArray(A.examAnswers[qid])) A.examAnswers[qid]=[];
      A.examAnswers[qid][bi]=el.value;
      scheduleApplicantExamDraftSave();
    });
  });
  root.querySelectorAll('select[data-kind="match"]').forEach(el=>{
    el.addEventListener('change',e=>{
      const qid=+el.dataset.qid;
      const li=+el.dataset.left;
      const ri=parseInt(el.value,10);
      if(!Array.isArray(A.examAnswers[qid])) A.examAnswers[qid]=[];
      A.examAnswers[qid][li]=ri;
      scheduleApplicantExamDraftSave();
    });
  });
  root.querySelectorAll('input[data-kind="order"]').forEach(el=>{
    el.addEventListener('input',e=>{

      scheduleApplicantExamDraftSave();

    el.addEventListener('input',e=>{

      A.examAnswers[qid]=el.value;

    });

  // ── Materials（电子表 + 财务证明 + 勾选） ──
  document.getElementById('btn-save-mat-sch')?.addEventListener('click',async()=>{

    const readOpt=async(el,prevData,prevFn)=>{
      const f=el?.files?.[0];
      if(!f) return {data:prevData,fn:prevFn};
      if(f.size>2.6*1024*1024){toast(apLine('单个文件请小于 2.5MB','Each file max 2.5MB','Maks 2.5MB'),false);throw new Error('size');}
      const data=await readFileAsBase64(f);
      return {data,fn:f.name};
    };
    let data=prev.financial_proof_data||prev.income_proof_data||A.applicant.mat_financial_proof_data;
    let fn=String(prev.financial_proof_filename||prev.income_proof_filename||A.applicant.mat_financial_proof_filename||'');
    let sigD=prev.applicant_signature_data,sigN=String(prev.applicant_signature_filename||'');
    let pasD=prev.pastor_letter_upload_data,pasN=String(prev.pastor_letter_upload_filename||'');
    let spD=prev.sponsor_proof_data,spN=String(prev.sponsor_proof_filename||'');
    try{
      const rFin=await readOpt(document.getElementById('mat-fin-file'),data,fn);
      data=rFin.data;fn=rFin.fn;
      const rSig=await readOpt(document.getElementById('mat-sig-file'),sigD,sigN);
      sigD=rSig.data;sigN=rSig.fn;
      const rPas=await readOpt(document.getElementById('mat-pastor-letter-file'),pasD,pasN);
      pasD=rPas.data;pasN=rPas.fn;
      const rSp=await readOpt(document.getElementById('mat-sponsor-file'),spD,spN);
      spD=rSp.data;spN=rSp.fn;
    }catch(e){if(e.message!=='size')toast(apLine('读取文件失败','Read failed','Gagal baca'),false);return;}
    const g=document.querySelector('input[name="mat-sch-guarantee"]:checked')?.value||'deposit';
    const sch={...prev,
      family_support:(document.getElementById('mat-sch-fund-family')?.value||'').trim(),
      church_support:(document.getElementById('mat-sch-fund-church')?.value||'').trim(),
      other_sources:(document.getElementById('mat-sch-fund-other')?.value||'').trim(),
      total_self_funded:(document.getElementById('mat-sch-fund-total')?.value||'').trim(),
      funding_family:(document.getElementById('mat-sch-fund-family')?.value||'').trim(),
      funding_church:(document.getElementById('mat-sch-fund-church')?.value||'').trim(),
      funding_other:(document.getElementById('mat-sch-fund-other')?.value||'').trim(),
      funding_total:(document.getElementById('mat-sch-fund-total')?.value||'').trim(),
      requested_amount:(document.getElementById('mat-sch-amount-req')?.value||'').trim(),
      amount_requested:(document.getElementById('mat-sch-amount-req')?.value||'').trim(),
      guarantee_type:g,
      agree_terms:document.getElementById('mat-sch-agree-terms')?.checked?'yes':'no',
      applicant_sign_date:(document.getElementById('mat-sch-sign-date')?.value||'').trim(),
      financial_proof_data:data,
      income_proof_data:data,
      financial_proof_filename:fn||null,
      income_proof_filename:fn||null,
      applicant_signature_data:sigD,
      applicant_signature_filename:sigN||null,
      pastor_letter_upload_data:pasD,
      pastor_letter_upload_filename:pasN||null,
      sponsor_proof_data:spD,
      sponsor_proof_filename:spN||null,
      _saved_at:new Date().toISOString()
    };
    const {error}=await sb.from('applicants').update({scholarship_form_json:sch}).eq('id',A.applicant.id);
    if(!error){
      Object.assign(A.applicant,{scholarship_form_json:sch});
      toast(apLine('奖助学金申请表已保存','Scholarship form saved','Tersimpan'));
      render();
    }
    else toast(apLine('保存失败','Save failed','Gagal simpan')+(error.message?': '+error.message:''),false);
  });
  document.getElementById('btn-save-mat-sv')?.addEventListener('click',async()=>{

    const prev=parseApplicantJsonCol(A.applicant.enrollment_survey_json,{});
    const rootSv=document.getElementById('mat-enrollment-survey-root');
    const sur=collectEnrollmentSurveyFromDom(prev,rootSv||document);
    const needHabit=String(sur.smoke_hist)==='yes'||String(sur.alcohol_hist)==='yes'||String(sur.drug_hist)==='yes';
    if(needHabit&&!String(sur.habit_substance_explain||'').trim()){
      const L=getApplicantUiLang(A.applicant);
      const msg=L==='en'?'Brief explanation is required because you answered Yes to smoking, alcohol, or drug history.':L==='id'?'Wajib mengisi penjelasan singkat jika riwayat rokok/alkohol/narkoba = Ya.':'吸烟史、饮酒史或吸毒史任一项为「有」时，请填写简要说明。';
      toast(msg,false);
      return;
    }
    const al=computeSurveyAlertFromSurveyJson(sur);
    const {error}=await sb.from('applicants').update({enrollment_survey_json:sur,mat_survey_alert:al.alert,mat_survey_alert_reason:al.reason||null}).eq('id',A.applicant.id);
    if(!error){Object.assign(A.applicant,{enrollment_survey_json:sur,mat_survey_alert:al.alert,mat_survey_alert_reason:al.reason||null});toast(apLine('入学调查表已保存','Survey saved','Tersimpan'));render();}
    else toast(apLine('保存失败','Save failed','Gagal')+(error.message?': '+error.message:''),false);
  });
  root.querySelectorAll('input[name="mat-sch-guarantee"]').forEach(r=>{
    r.addEventListener('change',()=>{
      const w=document.getElementById('mat-pastor-upload-wrap');
      if(w) w.style.display=r.value==='pastor_letter'?'block':'none';
    });
  });
  document.getElementById('btn-save-visa-files')?.addEventListener('click',async()=>{
    if(A.role!=='applicant'||!A.applicant?.id||!sb) return;
    if(A.applicant.stage!=='visa'){toast(apLine('当前不在签证环节','Not in visa stage','Bukan tahap visa'),false);return;}
    const prev=parseVisaFiles(A.applicant);
    const readMerge=async(el,kind,prevData,prevFn)=>{
      const f=el?.files?.[0];
      if(!f) return {data:prevData,fn:prevFn};
      const v=validateVisaPickFile(f,kind);
      if(!v.ok){toast(v.msg,false);throw new Error('bad');}
      const data=await readFileAsBase64(f);
      return {data,fn:f.name};
    };
    let pD=prev.passport_data,pN=String(prev.passport_filename||'');
    let phD=prev.photo_data,phN=String(prev.photo_filename||'');
    let cD=prev.cv_data,cN=String(prev.cv_filename||'');
    try{
      const r1=await readMerge(document.getElementById('visa-file-passport'),'passport',pD,pN);
      pD=r1.data;pN=r1.fn;
      const r2=await readMerge(document.getElementById('visa-file-photo'),'photo',phD,phN);
      phD=r2.data;phN=r2.fn;
      const r3=await readMerge(document.getElementById('visa-file-cv'),'cv',cD,cN);
      cD=r3.data;cN=r3.fn;
    }catch(e){if(e.message!=='bad')toast(apLine('读取文件失败','Read failed','Gagal baca'),false);return;}
    const vf={
      passport_data:pD,passport_filename:pN||null,
      photo_data:phD,photo_filename:phN||null,
      cv_data:cD,cv_filename:cN||null,
      _saved_at:new Date().toISOString()
    };
    const spec=visaMaterialsSpecOk(vf);
    const {error}=await sb.from('applicants').update({visa_files_json:vf}).eq('id',A.applicant.id);
    if(!error){
      Object.assign(A.applicant,{visa_files_json:vf});
      if(spec.ok) toast(apLine('签证材料已保存，三份已齐','Visa files saved (all 3)','Berkas visa lengkap'));
      else toast(apLine('已保存。尚未交齐：','Saved. Still missing: ','Tersimpan. Kurang: ')+spec.issues.join('、'));
      render();
    }
    else toast(apLine('保存失败','Save failed','Gagal')+(error.message?': '+error.message:''),false);
  });
  document.getElementById('btn-materials-submit-review')?.addEventListener('click',async()=>{
    if(A.role!=='applicant'||!A.applicant?.id||!sb) return;
    if(A.applicant.materials_submitted_at){toast(apLine('已提交过，请等待教务审核','Already submitted','Sudah dikirim'),false);return;}
    const miss=materialsMissingCount(A.applicant);
    if(miss>0){toast(apLine('尚有 '+miss+' 项必填未完成',''+miss+' item(s) missing',miss+' wajib'),false);return;}
    const {error}=await sb.from('applicants').update({materials_submitted_at:new Date().toISOString()}).eq('id',A.applicant.id);
    if(!error){A.applicant.materials_submitted_at=new Date().toISOString();toast(apLine('已提交审核，请等待奖学金批复','Submitted; pending scholarship review','Terkirim'));render();}
    else toast(apLine('提交失败','Submit failed','Gagal'),false);
  });
  document.getElementById('btn-materials-next-stage')?.addEventListener('click',()=>applicantAdvanceFromMaterialsToVisaOrComplete());
  document.getElementById('btn-result-to-materials')?.addEventListener('click',()=>applicantAdvanceFromResultToMaterials());
  document.getElementById('btn-applicant-complete-after-visa')?.addEventListener('click',async()=>{

    if(!confirm(apLine('确认进入「完成」环节？之后可查看来印尼攻略与联络方式。','Proceed to the final step for travel info and contacts?','Lanjut ke tahap terakhir untuk panduan perjalanan?'))) return;
    const {data:updRows,error}=await sb.from('applicants').update({stage:'complete'}).eq('id',ap.id).eq('stage','visa').select('id');
    if(error){
      toast(apLine('操作失败','Failed','Gagal')+(error.message?': '+error.message:''),false);
      return;
    }
    if(!updRows||!updRows.length){
      toast(apLine('未能推进阶段，请刷新后重试。','Could not advance. Refresh and try again.','Gagal — muat ulang.'),false);
      try{
        const {data:f}=await sb.from('applicants').select('stage').eq('id',ap.id).maybeSingle();
        if(f&&f.stage) A.applicant.stage=f.stage;
      }catch(_){}
      render();
      return;
    }
    A.applicant.stage='complete';
    toast(apLine('已进入完成环节','Now on the final step','Masuk tahap selesai'));
    render();
  });
  root.querySelectorAll('.btn-save-sch-amt').forEach(btn=>{

  root.querySelectorAll('[data-action=pick-slot]').forEach(el=>{
    el.addEventListener('click',()=>{

  document.getElementById('btn-add-admin-slot')?.addEventListener('click',async()=>{
    if(A.role!=='admin'){toast('仅管理员可在此添加公共排班',false);return;}
    const date=document.getElementById('a-slot-date')?.value;
    const start=document.getElementById('a-slot-start')?.value;
    const end=document.getElementById('a-slot-end')?.value;
    const interval=parseInt(document.getElementById('a-slot-interval')?.value||'30',10);
    const teacherId=(document.getElementById('a-slot-teacher-id')?.value||'').trim();
    if(!teacherId){toast('请选择负责老师',false);return;}
    const tp=(A.teacherProfiles||[]).find(x=>String(x.id)===String(teacherId));
    if(!date||!start||!end){toast('请填写日期与开始/结束时间',false);return;}
    const toMin = t=>{
      const [h,m]=String(t).split(':').map(Number);
      return h*60+m;
    };
    const pad2 = n=>String(n).padStart(2,'0');
    const startMin=toMin(start);
    const endMin=toMin(end);
    if(!(interval===20||interval===30)) {toast('请选择 20 或 30 分钟间隔',false);return;}
    if(endMin<=startMin){toast('结束时间必须晚于开始时间',false);return;}

    const times=[];
    for(let m=startMin; m+interval<=endMin; m+=interval){
      const hh=Math.floor(m/60), mm=m%60;
      times.push(`${pad2(hh)}:${pad2(mm)}`);
    }
    if(times.length===0){toast('时间段内没有可生成的时间点',false);return;}

    // 过滤掉已经过去的时间点，避免申请者无法选择但后台还能插入
    const now=Date.now();
    const msOf = t=>{
      const m = String(date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(!m) return null;
      const tt = String(t).match(/^(\d{2}):(\d{2})$/);
      if(!tt) return null;
      const y=+m[1], mo=+m[2]-1, d=+m[3];
      const hh=+tt[1], mm=+tt[2];
      return new Date(y,mo,d,hh,mm,0).getTime();
    };
    const futureTimes=times.filter(t=>{const ms=msOf(t); return ms && ms>now;});
    if(futureTimes.length===0){toast('该时间段内没有未来可用时间点',false);return;}

    // 跳过已存在的时间点，避免插入重复
    const {data:existing} = await sb.from('interview_slots')
      .select('slot_time')
      .eq('slot_date',date)
      .in('slot_time',futureTimes);
    const existSet=new Set((existing||[]).map(r=>r.slot_time));
    const payload=futureTimes.filter(t=>!existSet.has(t)).map(t=>({
      slot_date:date,
      slot_time:t,
      is_booked:false,
      teacher_id:teacherId,
      teacher_name:tp?.display_name||null
    }));
    if(payload.length===0){toast('这些时间点已存在，无需重复添加',true);return;}

    const {error}=await sb.from('interview_slots').insert(payload);
    if(!error){
      toast(`已添加 ${payload.length} 个时间点`,true);
      await loadAdminData();
      render();
    } else toast('添加失败',false);
  });

    const p2=(document.getElementById('me-pw-new2')?.value||'').trim();
    if(p1.length<6){toast('新密码至少 6 位',false);return;}
    if(p1!==p2){toast('两次输入的密码不一致',false);return;}
    const {error}=await sb.auth.updateUser({password:p1});
    if(error){toast('修改失败：'+(error.message||''),false);return;}
    toast('密码已更新');
    const el1=document.getElementById('me-pw-new');
    const el2=document.getElementById('me-pw-new2');
    if(el1) el1.value='';
    if(el2) el2.value='';
  });
  root.querySelectorAll('[data-action=del-my-slot]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const sid=el.dataset.slotid;
      const row=A.allSlots.find(s=>String(s.id)===String(sid));
      if(!row || String(row.teacher_id)!==String(A.user?.id)){
        toast('只能删除归属您本人的空闲时段',false);
        return;
      }
      if(!isInterviewSlotRowVacant(row)){
        toast('已有人预约的时段不可删除',false);
        return;
      }
      const {error}=await sb.from('interview_slots').delete().eq('id',sid);
      if(!error){
        A.allSlots=A.allSlots.filter(s=>String(s.id)!==String(sid));
        toast('已删除');
        render();
      } else toast('删除失败',false);
    });
  });

  wireEnrollmentSurveyConditionals(document.getElementById('mat-enrollment-survey-root'));
  wireEnrollmentSurveyConditionals(document.getElementById('brief-enrollment-survey-root'));
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init(){
  if(!sb){
    document.getElementById('root').innerHTML='<div class="p6" style="max-width:520px;margin:48px auto;line-height:1.65;font-family:system-ui,sans-serif"><h1 class="t18 fw7 c-gray8 mb3">无法加载 Supabase 客户端</h1><p class="t13 c-gray6 mb2">未找到全局 <code>supabase</code>。请确认已部署 <code>vendor/supabase.js</code>，且与 <code>index.html</code> 中引用路径一致。</p><p class="t13 c-gray6 mb2">若曾用外网 CDN，请重新部署当前仓库（含 <code>vendor/</code> 目录）。</p></div>';
    return;
  }
  // 先用内嵌中文题库；ensureExamQuestionsLoaded 会再合并多语言
  A.examQuestions = (EXAM_Qs && EXAM_Qs.length) ? EXAM_Qs : [];
  try{
    let session=null;
    try{
      const out=await Promise.race([
        sb.auth.getSession(),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('getSession 超时')),15000)),
      ]);
      session=out&&out.data&&out.data.session?out.data.session:null;
    }catch(e){
      console.warn(e);
    }
    try{
      const snap=await sb.auth.getSession();
      session=snap?.data?.session??null;
    }catch(_){}
    if(A.role==='applicant'&&A.applicant){
      /* 用户已在等待 getSession 期间完成申请人登录，勿用职员会话覆盖 */
    }else if(session){
      A.user=session.user;
      let prof=null;
      try{
        const pr=await Promise.race([
          sb.from('profiles').select('*').eq('id',session.user.id).single(),
          new Promise((_,rej)=>setTimeout(()=>rej(new Error('profiles 超时')),15000)),
        ]);
        if(pr&&!pr.error) prof=pr.data;
      }catch(e){ console.warn(e); }
      if(prof){
        A.profile=prof;A.role=prof.role;
        if(A.role==='admin'||A.role==='teacher'){
          A.adminDataLoading=true;
          try{ render(); }catch(e){ console.warn(e); }
          try{
            await Promise.race([
              loadAdminData(),
              new Promise((_,rej)=>setTimeout(()=>rej(new Error('loadAdminData 超时')),20000)),
            ]);
          }catch(e){ console.warn(e); }
          A.adminDataLoading=false;
        }
      }
    }else{
      try{
        await tryRestoreApplicantFromBrowser();
      }catch(e){ console.warn('tryRestoreApplicantFromBrowser', e); }
    }
  }catch(e){
    console.warn('init 数据恢复', e);
  }
  try{
    render();
  }catch(e){
    console.error('会话恢复后 render 失败', e);
    A.role=null;A.user=null;A.profile=null;A.applicant=null;
    try{ render(); }catch(e2){
      document.getElementById('root').innerHTML='<div class="p6 tc c-gray6" style="margin-top:48px;font-family:system-ui">页面渲染出错，请刷新或按 F12 查看控制台。</div>';
    }
  }
  const staffSession=A.role==='admin'||A.role==='teacher';
  if(!staffSession){
    ensureExamQuestionsLoaded()
      .then(()=>{ try{ render(); }catch(e){ console.warn('render after exam load', e); } })
      .catch(e=>console.warn('题库后台加载', e));
  }
}

init().catch(err=>{
  console.error(err);
  try{
    A.role=null;
    A.user=null;
    A.profile=null;
    A.applicant=null;
    render();
  }catch(_){}
  const msg=err&&err.message?String(err.message):String(err);
  toast('页面加载异常，已显示登录页。若持续如此，请按 F12 查看控制台错误。'+msg.slice(0,120), false);
});
</script>
