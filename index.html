<!DOCTYPE html>
<html lang="zh-CN" id="root-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MMS招生系统 · MMS Admissions</title>
<script src="vendor/supabase.js"></script>
<script src="vendor/jszip.min.js"></script>
<script src="exam-locale.js"></script>
<script src="exam-plain-bundled.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#f4f5ff;color:#1e1e2e;font-size:14px}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#c5c8e0;border-radius:3px}

/* Layout */
.row{display:flex;align-items:center}.col{display:flex;flex-direction:column}.wrap{flex-wrap:wrap}.center{justify-content:center;align-items:center}
.g1{gap:4px}.g2{gap:8px}.g3{gap:12px}.g4{gap:16px}.g6{gap:24px}
.ml-auto{margin-left:auto}.flex1{flex:1}.shrink0{flex-shrink:0}.ovx{overflow-x:auto}.ovy{overflow-y:auto}

/* Spacing */
.p2{padding:8px}.p3{padding:12px}.p4{padding:16px}.p5{padding:20px}.p6{padding:24px}
.px3{padding-left:12px;padding-right:12px}.px4{padding-left:16px;padding-right:16px}.px6{padding-left:24px;padding-right:24px}
.py2{padding-top:8px;padding-bottom:8px}.py3{padding-top:12px;padding-bottom:12px}.py4{padding-top:16px;padding-bottom:16px}
.py6{padding-top:24px;padding-bottom:24px}.py10{padding-top:40px;padding-bottom:40px}.py12{padding-top:48px;padding-bottom:48px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mt5{margin-top:20px}.mt6{margin-top:24px}.mt8{margin-top:32px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}.mb5{margin-bottom:20px}.mb6{margin-bottom:24px}

/* Typography */
.t11{font-size:11px}.t12{font-size:12px}.t13{font-size:13px}.t14{font-size:14px}.t15{font-size:15px}.t16{font-size:16px}.t18{font-size:18px}.t20{font-size:20px}.t22{font-size:22px}.t24{font-size:24px}.t28{font-size:28px}.t48{font-size:48px}
.fw5{font-weight:500}.fw6{font-weight:600}.fw7{font-weight:700}.fw8{font-weight:800}
.tc{text-align:center}.tl{text-align:left}.nowrap{white-space:nowrap}.lh16{line-height:1.6}.lh18{line-height:1.8}
.mono{font-family:ui-monospace,'SF Mono','Fira Mono',monospace}
.flex-none{flex:none}
.c-gray4{color:#9ca3af}.c-gray5{color:#6b7280}.c-gray6{color:#4b5563}.c-gray7{color:#374151}.c-gray8{color:#1f2937}
.c-indigo4{color:#818cf8}.c-indigo6{color:#4f46e5}.c-green6{color:#16a34a}.c-green7{color:#15803d}.c-amber6{color:#d97706}.c-amber7{color:#b45309}.c-red6{color:#dc2626}.c-violet7{color:#6d28d9}.c-white{color:#fff}

/* Colors */
.bg-white{background:#fff}.bg-gray50{background:#f9fafb}.bg-gray100{background:#f3f4f6}
.bg-indigo50{background:#eef2ff}.bg-indigo100{background:#e0e7ff}
.bg-green50{background:#f0fdf4}.bg-green100{background:#dcfce7}
.bg-amber50{background:#fffbeb}.bg-red50{background:#fef2f2}
.bg-violet50{background:#f5f3ff}.bg-teal50{background:#f0fdfa}
.bg-login{background:linear-gradient(135deg,#e0e7ff,#f8f9ff 50%,#ede9fe)}
.bg-app{background:linear-gradient(135deg,#eef2ff,#fff 50%,#f5f3ff)}

/* Border */
.b1{border:1px solid}.b2{border:2px solid}.bb1{border-bottom:1px solid}
.bc-gray100{border-color:#f3f4f6}.bc-gray200{border-color:#e5e7eb}.bc-indigo100{border-color:#e0e7ff}
.bc-indigo200{border-color:#c7d2fe}.bc-green200{border-color:#bbf7d0}.bc-amber200{border-color:#fde68a}
.bc-red200{border-color:#fecaca}.bc-teal200{border-color:#99f6e4}

/* Radius / Shadow */
.r8{border-radius:8px}.r10{border-radius:10px}.r12{border-radius:12px}.r14{border-radius:14px}.r16{border-radius:16px}.r20{border-radius:20px}.rfull{border-radius:9999px}
.sh1{box-shadow:0 1px 3px rgba(0,0,0,.05)}.sh2{box-shadow:0 4px 10px rgba(0,0,0,.08)}.sh-xl{box-shadow:0 24px 48px rgba(0,0,0,.14)}

/* Sizing */
.w100{width:100%}.maxw-sm{max-width:380px}.maxw-md{max-width:440px}.maxw-lg{max-width:520px}.maxw-xl{max-width:580px}.maxw-2xl{max-width:700px}.mx-auto{margin-left:auto;margin-right:auto}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.av-sm{width:28px;height:28px;font-size:12px}.av-md{width:32px;height:32px;font-size:13px}.av-xl{width:44px;height:44px;font-size:16px}
.av-indigo{background:#eef2ff;color:#4f46e5}.av-violet{background:#ede9fe;color:#6d28d9}.av-teal{background:#ccfbf1;color:#0f766e}

/* Tag */
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500}

/* Inputs */
.inp{border:1px solid #e5e7eb;border-radius:10px;padding:8px 12px;width:100%;outline:none;transition:border-color .15s;background:#fff}
.inp:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.15)}
.sel{border:1px solid #e5e7eb;border-radius:10px;padding:8px 12px;width:100%;outline:none;background:#fff}
.textarea{border:1px solid #e5e7eb;border-radius:10px;padding:12px;width:100%;outline:none;line-height:1.6;resize:vertical;background:#fff}
.textarea:focus{border-color:#818cf8}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;padding:10px 20px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#4338ca;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#fef2f2;color:#dc2626}.btn-danger:hover{background:#fee2e2}
.btn-ghost{background:transparent;color:#6b7280;border:1px solid #e5e7eb}.btn-ghost:hover{background:#f9fafb}
.btn-outline{background:transparent;color:#4f46e5;border:1px solid #c7d2fe}.btn-outline:hover{background:#eef2ff}
.btn-sm{padding:5px 12px;border-radius:8px;font-size:12px}
.btn-xs{padding:3px 9px;border-radius:7px;font-size:11px;font-weight:600}
.btn-full{width:100%}.btn:disabled{background:#f3f4f6;color:#9ca3af;cursor:not-allowed;transform:none;box-shadow:none}

/* Header */
.header{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid #f3f4f6;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}

/* Steps */
.steps{display:flex;align-items:center;justify-content:center;padding:20px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.step-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid;transition:all .3s;flex-shrink:0}
.step-dot.done{background:#4f46e5;border-color:#4f46e5;color:#fff}
.step-dot.active{background:#fff;border-color:#4f46e5;color:#4f46e5;box-shadow:0 0 0 4px rgba(99,102,241,.12)}
.step-dot.locked{background:#f3f4f6;border-color:#d1d5db;color:#9ca3af}
.step-label{font-size:11px;font-weight:600;margin-top:4px;white-space:nowrap}
.step-conn{height:2px;width:40px;margin:0 4px;margin-bottom:16px;flex-shrink:0}
.step-conn.done{background:linear-gradient(90deg,#4f46e5,#818cf8)}.step-conn.locked{background:#e5e7eb}

/* Tabs */
.tabbar{display:flex;gap:4px;padding:10px 24px;border-bottom:1px solid #e5e7eb;background:#fff;overflow-x:auto}
.tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;border:none;background:transparent;color:#6b7280}
.tab:hover{background:#f3f4f6}.tab.active{background:#4f46e5;color:#fff}

/* Cards */
.card{background:#fff;border-radius:14px;border:1px solid #f3f4f6;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media (max-width:700px){.grid-2{grid-template-columns:1fr}}
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;min-height:400px}
.kanban-col{flex-shrink:0;width:196px;max-width:min(196px,88vw)}
.kanban-col-interview{flex-shrink:0;width:300px;max-width:min(300px,92vw)}
.lang-subgroup{padding-top:10px;margin-top:10px;border-top:1px solid #eef2ff}
.lang-subgroup:first-child{padding-top:0;margin-top:0;border-top:none}
.lang-subgroup-h{font-size:11px;font-weight:700;color:#6b7280;margin-bottom:8px;letter-spacing:.04em}
.exam-lang-section{margin-bottom:28px}
.exam-lang-section-h{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e5e7eb}
.exam-lang-section-h span{font-size:14px;font-weight:700;color:#374151}
.exam-lang-section-h .tag{font-size:11px}
.week-cal-wrap{overflow-x:visible;border:1px solid #d4e4ed;border-radius:16px;background:#f7f4ef;max-width:100%}
.week-cal-columns{width:100%;min-width:0;user-select:none;background:#fefdfb;border-radius:14px;overflow:hidden;border:1px solid #e8e4dc}
.week-cal-columns-hdr{display:grid;grid-template-columns:28px repeat(6,minmax(0,1fr));border-bottom:1px solid #e5e7eb;background:#faf8f5}
.week-cal-hdr-corner{border-right:1px solid #e5e7eb}
.week-cal-columns-hdr-cell{font-size:11px;font-weight:700;color:#334155;text-align:center;padding:8px 2px 6px;line-height:1.2;border-right:1px solid #e5e7eb}
.week-cal-columns-hdr-cell:last-child{border-right:none}
.week-cal-columns-body{display:grid;grid-template-columns:28px repeat(6,minmax(0,1fr))}
.week-cal-gutter{position:relative;height:min(52vh,520px);min-height:380px;border-right:1px solid #e5e7eb;background:#faf8f5}
.week-cal-day-col{position:relative;height:min(52vh,520px);min-height:380px;border-right:1px solid #e8e4dc;background:#fefdfb;min-width:0}
.week-cal-day-col:last-child{border-right:none}
.week-cal-gutter-tick{position:absolute;right:1px;transform:translateY(-50%);font-size:8px;font-weight:700;color:#64748b;line-height:1;white-space:nowrap}
.week-cal-gutter-tick--end{transform:translateY(-100%);padding-bottom:2px}
.week-cal-col-pref{position:absolute;left:2px;right:2px;box-sizing:border-box;background:#bbf7d0;border:none;border-radius:0;z-index:1;display:flex;align-items:flex-start;justify-content:center;padding:6px 4px;overflow:hidden;pointer-events:none}
.week-cal-col-pref-txt{font-size:9px;font-weight:800;color:#14532d;line-height:1.2;text-align:center;word-break:break-word}
.week-cal-col-busy{position:absolute;left:2px;right:2px;box-sizing:border-box;background:#c6dbe7;border:none;border-radius:0;z-index:2;display:flex;align-items:flex-start;justify-content:center;padding:6px 4px;overflow:hidden;pointer-events:none}
.week-cal-col-pe{position:absolute;left:2px;right:2px;box-sizing:border-box;background:#bfead1;border:none;border-radius:0;z-index:2;display:flex;align-items:flex-start;justify-content:center;padding:6px 4px;overflow:hidden;pointer-events:none}
.week-cal-col-pioneer{position:absolute;left:2px;right:2px;box-sizing:border-box;background:#fff3bf;border:none;border-radius:0;z-index:2;display:flex;align-items:flex-start;justify-content:center;padding:6px 4px;overflow:hidden;pointer-events:none}
.week-cal-col-block-txt{font-size:10px;font-weight:800;color:#0f172a;line-height:1.25;text-align:center;word-break:break-word}
.week-cal-col-free{position:absolute;left:2px;right:2px;box-sizing:border-box;background:#bae6fd;border:none;border-radius:0;z-index:3;display:flex;align-items:center;justify-content:center;padding:3px;font-size:8px;font-weight:800;color:#0369a1;text-align:center;line-height:1.15;pointer-events:none}
.week-cal-col-iv{position:absolute;left:2px;right:2px;box-sizing:border-box;background:#6366f1;color:#fff;border:none;border-radius:0;font-size:9px;font-weight:800;padding:4px 5px;z-index:4;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.15;overflow:hidden;word-break:break-word;pointer-events:none}
.week-cal-legend{display:flex;flex-wrap:wrap;gap:12px 16px;margin-top:12px;font-size:12px;color:#475569;font-weight:500;line-height:1.4}
.week-cal-legend i{display:inline-block;width:14px;height:14px;border:none;border-radius:0;margin-right:6px;vertical-align:-3px;flex-shrink:0}
.kanban-card{background:#fff;border-radius:12px;border:1px solid #f3f4f6;padding:12px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:all .15s}
.kanban-card:hover{border-color:#c7d2fe;box-shadow:0 4px 10px rgba(79,70,229,.1);transform:translateY(-1px)}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:11px 16px;font-size:11px;font-weight:600;color:#6b7280;background:#f9fafb;border-bottom:1px solid #f3f4f6}
.tbl td{padding:11px 16px;border-bottom:1px solid #f9fafb}.tbl tr:hover td{background:#fafbff}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px 24px 0}
.stat-card{background:#fff;border-radius:14px;border:1px solid #f3f4f6;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-sm{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:400px;box-shadow:0 24px 50px rgba(0,0,0,.2)}
.modal-lg{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 50px rgba(0,0,0,.2)}

/* Login */
.login-card{background:#fff;border-radius:22px;padding:32px;box-shadow:0 20px 40px rgba(0,0,0,.1);width:100%;max-width:420px}
.login-btn{width:100%;display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;border:2px solid #e0e7ff;background:#fff;cursor:pointer;transition:all .2s;margin-bottom:10px;text-align:left}
.login-btn:hover{border-color:#818cf8;background:#fafbff;transform:translateY(-1px)}
.login-icon{width:44px;height:44px;background:#eef2ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* Slot btn */
.slot-btn{padding:7px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #e5e7eb;background:#f9fafb;color:#374151;transition:all .15s}
.slot-btn:hover{border-color:#c7d2fe;background:#eef2ff}.slot-btn.active{background:#4f46e5;border-color:#4f46e5;color:#fff}

/* Mat item */
.mat-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;transition:all .15s}
.mat-item:hover{border-color:#c7d2fe}.mat-item.done{background:#f0fdf4;border-color:#bbf7d0}
.mat-check{width:22px;height:22px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;transition:all .15s}
.mat-check.done{background:#22c55e;border-color:#22c55e}

/* Recommendation badge */
.rec-badge{padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600}

/* Timer */
.timer-bar-outer{flex:1;height:7px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.timer-bar-inner{height:100%;border-radius:999px;transition:width 1s linear}

/* Radio */
.radio-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;border:1px solid transparent;background:#f9fafb;transition:all .15s}
.radio-opt:hover{background:#eef2ff;border-color:#c7d2fe}.radio-opt.checked{background:#eef2ff;border-color:#a5b4fc}
.radio-opt input{accent-color:#4f46e5}

/* Loading spinner */
.spinner{width:32px;height:32px;border:3px solid #e0e7ff;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1f2937;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Notif preview */
.notif-preview{background:rgba(0,0,0,.03);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7;color:#374151;margin-top:8px;border-left:3px solid #c7d2fe;white-space:pre-line}

/* Briefing */
.section-title{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f3f4f6}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f9fafb;font-size:13px}
.info-row:last-child{border-bottom:none}

@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.header,.tabbar,.px6{padding-left:14px;padding-right:14px}}

/* ══ 手机适配 Mobile responsive ══ */

/* 防止整页横向滚动（图2问题修复） */
html{overflow-x:hidden}

/* 防止 iOS 点击 input 时自动放大（font-size < 16px 会触发） */
@media(max-width:767px){
  input,textarea,select{font-size:16px}
}

/* 考试页面：全平台字体 17px，手机电脑统一，阅读舒适 */
#exam-main .card p{font-size:17px;line-height:1.7}
#exam-main .t13{font-size:17px;line-height:1.7}
#exam-main .radio-opt{font-size:17px;padding:12px 14px;gap:12px}
#exam-main .textarea{font-size:17px;min-height:120px;line-height:1.7}
#exam-main .card.p5{padding:20px 16px}
#timer-disp{font-size:17px !important}
#timer-wrap{font-size:15px}
/* 手机端卡片内边距稍紧凑 */
@media(max-width:480px){
  #exam-main .card.p5{padding:18px 14px}
}

/* 步骤导航栏：手机端紧凑化 */
@media(max-width:480px){
  .steps{padding:12px 6px}
  .step-dot{width:30px;height:30px;font-size:12px}
  .step-conn{width:16px;margin:0 2px}
  .step-label{font-size:10px;max-width:40px;text-align:center;white-space:normal;line-height:1.2}
}

/* 小屏幕：Header 防溢出 */
@media(max-width:400px){
  .header{padding:8px 12px;gap:6px}
  /* 品牌名截短区域：允许收缩 */
  .header .row:first-child span.fw7{font-size:12px}
  /* 用户名：极小屏可隐藏 */
  .header .row:last-child .t12{display:none}
}

/* 考试计时器：小屏允许换行 */
@media(max-width:420px){
  #timer-wrap{flex-wrap:wrap;row-gap:4px}
  #timer-wrap .timer-bar-outer{order:10;flex-basis:100%}
}

/* 答题卡：减少左侧缩进，防止小屏太挤 */
@media(max-width:480px){
  /* 填空/选项区域的 padding-left:32px 在小屏时减小 */
  .card [style*="padding-left:32px"]{padding-left:16px !important}
  /* 填空输入框：小屏竖排（!important 覆盖 inline style min-width:140px） */
  .card .row.wrap.g2 input.inp{min-width:0 !important;width:100%;flex-basis:100%}
  /* 卡片内边距适当缩小 */
  .card.p5{padding:14px 12px}
  /* 模态框适应小屏 */
  .modal-lg{padding:20px 14px;max-height:94vh;border-radius:16px}
  .modal-sm{padding:18px 14px;border-radius:16px}
  /* 统计卡片：小屏更紧凑 */
  .stat-card{padding:10px 6px}
  .stats{gap:8px;padding:10px 14px 0}
}

/* iOS 安全区域支持（底部 Home 条） */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  body{padding-bottom:env(safe-area-inset-bottom)}
  .header{padding-top:max(10px,env(safe-area-inset-top))}
}

const WEEK_CAL_START_MIN = 7*60;

function weekContainingDate(base=new Date()){
  const d=new Date(base);
  d.setHours(0,0,0,0);
  const dow=d.getDay();
  const sun=new Date(d);
  sun.setDate(d.getDate()-dow);
  const days=[];
  for(let i=0;i<7;i++){
    const x=new Date(sun);
    x.setDate(sun.getDate()+i);
    days.push(x);
  }
  return days;
}
/** 本周「周一～周六」共 6 天（不含周日），用于教师周历一屏展示 */
function weekMonToSatFromDate(base=new Date()){
  const d=new Date(base);
  d.setHours(0,0,0,0);
  const dow=d.getDay();
  const delta=dow===0 ? -6 : 1-dow;
  const mon=new Date(d);
  mon.setDate(d.getDate()+delta);
  const days=[];
  for(let i=0;i<6;i++){
    const x=new Date(mon);
    x.setDate(mon.getDate()+i);
    days.push(x);
  }
  return days;
}
function ymdFromDate(dt){
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;

function parseSlotLocalMs(dateStr, timeStr){
  const m=String(dateStr||'').match(/^(\d{4})-(\d{2})-(\d{2})$/);
  const t=String(timeStr||'').match(/^(\d{2}):(\d{2})/);
  if(!m||!t) return null;
  return new Date(+m[1],+m[2]-1,+m[3],+t[1],+t[2],0).getTime();
}
/** 排班列表排序：按本地日期时间升序（最近在前）；无法解析的排在该组末尾 */
function interviewSlotSortMs(row){
  const ms=parseSlotLocalMs(row&&row.slot_date, row&&row.slot_time);
  return ms==null?Number.MAX_SAFE_INTEGER:ms;
}
function calClipSeg(s,e){
  const cs=Math.max(s,WEEK_CAL_START_MIN), ce=Math.min(e,WEEK_CAL_END_MIN);
  if(ce<=cs) return null;
  return [cs,ce];
}
/** 周历列内绝对定位 style（相对 7:00–21:00） */
function calSegStyle(s,e){
  const c=calClipSeg(s,e);
  if(!c) return null;
  const [cs,ce]=c;
  const win=WEEK_CAL_END_MIN-WEEK_CAL_START_MIN;
  const top=((cs-WEEK_CAL_START_MIN)/win)*100;
  let h=((ce-cs)/win)*100;
  if(h<1.2) h=1.2;
  return `top:${top}%;height:${h}%;`;
}

function parseLetterItems(str){
  const cleaned = String(str||'').replace(/\s+/g,' ').trim();
  if(!cleaned) return {};
  const re = /([A-Z])\.\s*/g;
  let m;
  const parts = [];
  while((m=re.exec(cleaned))){
    // 用下一选项「A./B. 起始下标」作为切片终点，不能用 lastIndex（已在 “B.” 之后），否则会带上 “ B.” 等尾巴
    parts.push({letter:m[1], valueStart:re.lastIndex, keyIndex:m.index});
  }
  if(parts.length===0) return {};
  const map = {};
  for(let i=0;i<parts.length;i++){
    const letter = parts[i].letter;
    const start = parts[i].valueStart;
    const end = (i+1<parts.length)?parts[i+1].keyIndex:cleaned.length;
    map[letter] = cleaned.slice(start, end).trim();
  }
  return map;
}

/** 中文默写：从整行截取「书卷+章:节」作题干，全文作 expected（剥离 Word 隐形格式符，避免「希伯来书‬8」类断节） */
function extractZhDictationRef(rawLine){
  let t = String(rawLine||'')
    .replace(/^\d+\.?\s*/, '')
    .replace(/[\u200b-\u200f\u202a-\u202e\u2060-\u206f\ufeff\ufe00-\ufe0f]/g, '')
    .trim();
  let m = t.match(/^([\u4e00-\u9fff]+?)(\d+)\s*[:：]\s*(\d+)(?:[-–](\d+))?/);
  if(!m) m = t.match(/^([\u4e00-\u9fff]+)\D*(\d+)\s*[:：]\s*(\d+)(?:[-–](\d+))?/);
  if(!m){
    const cut = t.match(/^([\u4e00-\u9fff]+\d+:\d+(?:[-–]\d+)?)/);
    return { ref: cut ? cut[1] : t.split(/[，。；\s“"「]/)[0].slice(0, 28), expected: t };
  }
  const ref = m[1].trim() + m[2] + ':' + m[3] + (m[4] ? '-' + m[4] : '');
  return { ref, expected: t };
}

/** 英/印默写题干：从标准答案行首截取书卷与章节，与 exam-locale.js 逻辑一致 */
function extractLatinDictRefFromExpected(block){
  const s = String(block||'').replace(/^\d+\.\s*/, '').trim();
  const m = s.match(/^((?:[A-Z][a-z]+)(?:\s+[A-Z][a-z]+)*\s+\d+:\d+(?:-\d+)?)\b/);
  return m ? m[1] : '';
}

function buildExamQuestionsFromText(text){
  // docx 转纯文本时可能会残留一部分 Word XML 标签（如 <w:t> / <w:tab>），
  // 这些会干扰解析；这里先统一剥离标签，保留中间的可见文本。
  const cleanedText = String(text||'').replace(/<[^>]+>/g,'');
  const lines = cleanedText.split(/\r\n|\n|\r/).map(l=>l.trim()).filter(Boolean);
  const questions = [];
  let section = null; // 'ot' | 'nt' | null
  const pushQ = q => questions.push({...q, section});
  let qid = 1;
  const idxMapSingle = {A:0,B:1,C:2,D:3};
  let i = 0;
  while(i < lines.length){
    const line = lines[i];

    if(line.startsWith('旧约部分')){ section = 'ot'; i++; continue; }
    if(line.startsWith('新约部分')){ section = 'nt'; i++; continue; }

    // Fill in blanks
    if(line.startsWith('一、填空题')){
      const m = line.match(/每空([0-9.]+)分/);
      const perBlank = m?parseFloat(m[1]):0.5;
      i++;
      while(i < lines.length && !lines[i].startsWith('二、')){
        const l = lines[i];
        if(l.includes('<w:')){ i++; continue; }
        const braceMatches = [...l.matchAll(/\{([^}]+)\}/g)];
        if(braceMatches.length){
          const answers = braceMatches.map(x=>x[1]);
          const prompt = l.replace(/\{[^}]+\}/g,'____');
          const per = (l.match(/每空\s*([0-9.]+)分/)||[])[1]?parseFloat((l.match(/每空\s*([0-9.]+)分/)||[])[1]):perBlank;
          pushQ({id:qid++, type:'fill', prompt, answers, blanks:answers.length, score:answers.length*per});
          i++;
          continue;
        }
        if(l.includes('分别是')){
          const per = (l.match(/每空\s*([0-9.]+)分/)||[])[1]?parseFloat((l.match(/每空\s*([0-9.]+)分/)||[])[1]):perBlank;
          const next = lines[i+1]||'';
          if(next.includes('、')){
            const answers = next.split('、').map(s=>s.trim()).filter(Boolean);
            pushQ({id:qid++, type:'fill', prompt:l+'（请填写）', answers, blanks:answers.length, score:answers.length*per});
            i += 2;
            continue;
          }
        }
        i++;
      }
      continue;
    }

    // Single choice / choice
    if(line.startsWith('二、单选题') || line.startsWith('二、选择题')){
      i++;
      while(i < lines.length && !lines[i].startsWith('三、')){
        const l = lines[i];
        if(!/^\d+\./.test(l)){ i++; continue; }

        let ans = null;
        const mParen = l.match(/（([A-D])）/);
        if(mParen) ans = mParen[1];
        else {
          const mEnd = l.match(/\s([A-D])\s*$/);
          if(mEnd) ans = mEnd[1];
        }
        if(!ans){ i++; continue; }

        let prompt = '';
        let options = ['','','',''];

        // embedded options on the same line
        if(l.includes('A.') && l.includes('B.') && l.includes('C.') && l.includes('D.')){
          const startA = l.indexOf('A.');
          prompt = l.slice(0,startA).replace(/^\d+\.\s*/,'').replace(/（[A-D]）/g,'').trim();
          const optMap = parseLetterItems(l.slice(startA));
          options = ['A','B','C','D'].map(L=>optMap[L] || '');
        } else {
          prompt = l.replace(/^\d+\.\s*/,'').replace(/（[A-D]）/g,'').replace(/\s+[A-D]\s*$/,'').trim();
          let j = i+1;
          let optStr = '';
          while(j < lines.length && !/^\d+\./.test(lines[j]) && !lines[j].startsWith('三、')){
            if(/[A-D]\./.test(lines[j])) optStr += (optStr?' ':'') + lines[j];
            j++;
          }
          const optMap = parseLetterItems(optStr);
          options = ['A','B','C','D'].map(L=>optMap[L] || '');
          i = j-1;
        }

        // 题干仅有一句经文（全角括号）时补全提问，避免卷面像「只有半句话」
        if(/^（[^）]+）$/.test(prompt)){
          prompt = '以下经文出自哪一卷书？' + prompt;
        }

        pushQ({
          id:qid++,
          type:'single',
          prompt,
          options,
          answer_index:idxMapSingle[ans],
          score:0.5
        });
        i++;
      }
      continue;
    }

    // Matching (only in old part)
    if(line.startsWith('三、连线题')){
      const prompt = (lines[i+1]||'').trim();
      i++;
      const left_items = [];
      const left_correct_letters = [];
      const right_map = {};
      while(i < lines.length && !lines[i].startsWith('四、判断题')){
        const l = lines[i];
        const mLeft = l.match(/^（([A-Z])）\d+\.\s*(.+)$/);
        if(mLeft){
          left_correct_letters.push(mLeft[1]);
          left_items.push(mLeft[2].trim());
          i++;
          continue;
        }
        const mRight = l.match(/^([A-Z])\.\s*(.+)$/);
        if(mRight){
          right_map[mRight[1]] = mRight[2].trim();
          i++;
          continue;
        }
        i++;
      }
      const right_letters = Object.keys(right_map).sort();
      const right_items = right_letters.map(L=>right_map[L]);
      const right_index = {};
      right_letters.forEach((L,idx)=>right_index[L]=idx);
      const answer_map = left_correct_letters.map(L=>right_index[L]);
      pushQ({
        id:qid++,
        type:'match',
        prompt,
        left_items,
        right_items,
        answer_map,
        score:0.5*left_items.length
      });
      continue;
    }

    // True/False
    if(line.startsWith('四、判断题') || line.startsWith('三、判断题')){
      i++;
      while(i < lines.length && !lines[i].startsWith('五、排序题') && !lines[i].startsWith('四、排序题')){
        const l = lines[i];
        if(!/^\d+\./.test(l)){ i++; continue; }
        if(!l.includes('√') && !l.includes('×')){ i++; continue; }
        let stmt;
        let truth;
        // 新约常见：…题干。（ √ ） 或 （ × ）——符号在句末括号内
        const parenTf = l.match(/\s*（\s*([√×])\s*）\s*$/);
        if(parenTf){
          truth = parenTf[1]==='√';
          stmt = l.slice(0, parenTf.index).replace(/^\d+\.\s*/, '').trim();
        }else{
          // 旧约：____×____题干 或 ____√___题干（符号在题干前）
          truth = l.includes('√');
          const pos = l.indexOf(truth?'√':'×');
          stmt = l.slice(pos+1).trim();
          stmt = stmt.replace(/^[_\s　]+/,'');
        }
        if(!stmt){ i++; continue; }
        pushQ({
          id:qid++,
          type:'truefalse',
          prompt:stmt,
          answer_bool:truth,
          score:0.5
        });
        i++;
      }
      continue;
    }

    // Sorting (sequence input)
    if(line.includes('排序题')){
      i++;
      while(i < lines.length && !lines[i].startsWith('六、默写题') && !lines[i].startsWith('五、默写题')){
        const l = lines[i];
        if(!/^\d+\./.test(l) || !l.includes('排序')){ i++; continue; }
        const seq = (l.match(/排序\s+([A-Z]+)/)||[])[1] || '';
        const prompt = l.replace(/^\d+\.\s*/,'').replace(/排序\s+[A-Z]+/,'').trim();

        let j = i+1;
        let optStr = '';
        while(j < lines.length && !/^\d+\./.test(lines[j]) && !lines[j].startsWith('六、默写题') && !lines[j].startsWith('五、默写题')){
          optStr += (optStr?' ':'') + lines[j];
          j++;
        }
        const itemMap = parseLetterItems(optStr);
        const letters = Object.keys(itemMap).sort();
        const items = letters.map(k=>({key:k,text:itemMap[k]}));

        pushQ({
          id:qid++,
          type:'order',
          prompt,
          items,
          correct_seq: seq,
          score:1
        });
        i = j;
      }
      continue;
    }

    // Dictation
    if(line.includes('默写题')){
      i++;
      while(i < lines.length && !lines[i].startsWith('新约部分')){
        const l = lines[i];
        if(/^\d+\.?/.test(l)){
          const numMatch = l.match(/^(\d+)\.?\s*/);
          const start = numMatch ? numMatch[0].length : 0;
          let text = l.slice(start).trim();
          let j = i+1;
          while(j < lines.length && !/^\d+\.?\s*/.test(lines[j]) && !lines[j].startsWith('新约部分') && !lines[j].startsWith('旧约部分')){
            text += ' ' + lines[j].trim();
            j++;
          }
          const { ref, expected } = extractZhDictationRef(text);
          pushQ({
            id:qid++,
            type:'dictation',
            prompt:'请默写：'+ref,
            expected,
            score:2
          });
          i = j;
          continue;
        }
        i++;
      }
      continue;
    }

    i++;
  }
  return questions;
}

// 覆盖：优先从项目目录读取你转换出来的完整 doc 文本，避免上面内嵌字符串被截断；并合并英文/印尼文试卷文本
let __examQuestionsLoadedFromFile = false;

/** Chrome 等对 file:// 页面的本地 fetch 常会一直挂起（不 resolve），导致整页卡在加载圈 */
function isFileProtocol(){
  return typeof location !== 'undefined' && location.protocol === 'file:';
}

async function fetchWithTimeout(url, ms=8000){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  try{
    return await fetch(url,{signal:c.signal});
  }finally{
    clearTimeout(t);
  }
}

async function attachExamLocales(qs){
  if(typeof EXAM_LOCALE==='undefined' || !qs || !qs.length) return qs;
  const enUrls = ['./docx_plain_en.txt','/docx_plain_en.txt','docx_plain_en.txt'];
  const idUrls = ['./docx_plain_id.txt','/docx_plain_id.txt','docx_plain_id.txt'];
  let enText=null, idText=null;
  if(!isFileProtocol()){
    for(const url of enUrls){
      try{
        const res=await fetchWithTimeout(url);
        if(res.ok){ const t=await res.text(); if(t&&t.trim()){ enText=t; break; } }
      }catch(_){}
    }
  }
  if(!enText && globalThis.__BUNDLED_EXAM_TEXT_EN) enText = globalThis.__BUNDLED_EXAM_TEXT_EN;
  if(!isFileProtocol()){
    for(const url of idUrls){
      try{
        const res=await fetchWithTimeout(url);
        if(res.ok){ const t=await res.text(); if(t&&t.trim()){ idText=t; break; } }
      }catch(_){}
    }
  }
  if(!idText && globalThis.__BUNDLED_EXAM_TEXT_ID) idText = globalThis.__BUNDLED_EXAM_TEXT_ID;
  if(!enText && !idText){
    globalThis.__EXAM_EN_PARSED = [];
    globalThis.__EXAM_ID_PARSED = [];
    return qs;
  }
  const enList = enText ? EXAM_LOCALE.buildExamLocaleList(enText,'en') : [];
  const idList = idText ? EXAM_LOCALE.buildExamLocaleList(idText,'id') : [];
  globalThis.__EXAM_EN_PARSED = enList;
  globalThis.__EXAM_ID_PARSED = idList;
  return EXAM_LOCALE.mergeLocaleIntoQuestions(qs, enList, idList);
}

let __examEnsurePromise = null;
async function ensureExamQuestionsLoaded(){
  if(__examQuestionsLoadedFromFile) return;
  if(__examEnsurePromise) return __examEnsurePromise;
  __examEnsurePromise = (async()=>{
    try{
      if(!isFileProtocol()){
        try{
          const urls = ['./docx_plain2.txt','/docx_plain2.txt','docx_plain2.txt'];
          for(const url of urls){
            try{
              const res = await fetchWithTimeout(url);
              if(!res.ok) throw new Error('fetch failed: '+url);
              const txt = await res.text();
              if(txt && txt.trim().length>0){
                let qs = buildExamQuestionsFromText(txt);
                const qsNt = (qs||[]).filter(q=>q.section==='nt').length;
                const embNt = (EXAM_Qs||[]).filter(q=>q.section==='nt').length;
                if(qs && qs.length>0 && !(qsNt===0 && embNt>0)){
                  qs = await attachExamLocales(qs);
                  EXAM_Qs = qs;
                  A.examQuestions = EXAM_Qs;
                  __examQuestionsLoadedFromFile = true;
                  return;
                }
              }
            }catch(_){}
          }
        }catch(_){}
      }
      EXAM_Qs = await attachExamLocales(EXAM_Qs);
      A.examQuestions = EXAM_Qs;
      __examQuestionsLoadedFromFile = true;
    }catch(e){
      console.warn('ensureExamQuestionsLoaded', e);
      A.examQuestions = EXAM_Qs;
      __examQuestionsLoadedFromFile = true;
    }finally{
      __examEnsurePromise = null;
    }
  })();
  return __examEnsurePromise;
}

/** 管理端展示笔试备注：新格式仅三项；旧版冗长备注从正则提取同样三项，避免泄露默写原文 */
function formatExamEssayForDisplay(raw){
  const s = String(raw || '').trim();
  if(!s) return '';
  const mOtNew = s.match(/旧约总分[：:]\s*([\d.]+)\s*\/\s*([\d.]+)/);
  const mNtNew = s.match(/新约总分[：:]\s*([\d.]+)\s*\/\s*([\d.]+)/);
  const mSwNew = s.match(/切换屏幕次数[：:]\s*(\d+)\s*次/) || s.match(/切屏次数[：:]\s*(\d+)\s*次/);
  if(mOtNew && mNtNew && mSwNew){
    return `旧约总分：${mOtNew[1]} / ${mOtNew[2]}\n新约总分：${mNtNew[1]} / ${mNtNew[2]}\n切换屏幕次数：${mSwNew[1]} 次`;
  }
  const mOtOld = s.match(/旧约累计[：:]\s*([\d.]+)\s*\/\s*([\d.]+)/);
  const mNtOld = s.match(/新约累计[：:]\s*([\d.]+)\s*\/\s*([\d.]+)/);
  const mSwOld = s.match(/切换窗口\/切屏次数[：:]\s*(\d+)\s*次/) || s.match(/切屏次数[：:]\s*(\d+)\s*次/);
  if(mOtOld && mNtOld){
    const sw = mSwOld ? mSwOld[1] : '0';
    return `旧约总分：${mOtOld[1]} / ${mOtOld[2]}\n新约总分：${mNtOld[1]} / ${mNtOld[2]}\n切换屏幕次数：${sw} 次`;
  }
  return `旧约总分：— / —\n新约总分：— / —\n切换屏幕次数：— 次`;
}

/** 面试时段在 interview_slots 行上是否仍可被预约（与列表过滤、写库条件一致） */
function isInterviewSlotRowVacant(s){
  if(!s) return false;
  if(s.is_booked === true || s.is_booked === 'true' || s.is_booked === 1) return false;
  const apid = s.applicant_id;
  if(apid == null) return true;
  return String(apid).trim() === '';
}

/** 从 profiles.interview_langs 文本解析可面试语言（与 TEACHERS_SEED 中「中文、英文」等一致） */
function parseInterviewLangFlags(text){
  const raw = String(text||'');
  const s = raw.toLowerCase();
  const flags = { zh:false, en:false, id:false };
  if(/中文|汉语|chinese|mandarin/.test(raw)||/中文|汉语|chinese/.test(s)) flags.zh = true;
  if(/英文|英语|english/.test(raw)||/\benglish\b/.test(s)) flags.en = true;
  if(/印尼|indonesia|indonesian|bahasa/.test(raw)||/\bindonesia\b/.test(s)) flags.id = true;
  if(!flags.zh && !flags.en && !flags.id) flags.zh = true;
  return flags;
}

function resolveTeacherProfileForSlot(slot, profileById, allProfiles){
  if(!slot) return null;
  const tid = slot.teacher_id;
  if(tid!=null && String(tid).trim()!==''){
    const p = profileById.get(String(tid));
    if(p) return p;
  }
  const tn = String(slot.teacher_name||'').trim();
  if(!tn || !allProfiles?.length) return null;
  return allProfiles.find(pr=>{
    const d = String(pr.display_name||'').trim();
    return d && (tn.includes(d) || d.includes(tn));
  }) || null;
}

/** 申请人笔试语言 zh|en|id 与教师能力匹配 */
function slotSupportsApplicantExamLang(slot, needLang, profileById, allProfiles){
  const p = resolveTeacherProfileForSlot(slot, profileById, allProfiles);
  if(!p) return needLang==='zh';
  const f = parseInterviewLangFlags(p.interview_langs);
  if(needLang==='en') return f.en;
  if(needLang==='id') return f.id;
  return f.zh;
}

/** 按笔试语言匹配教师姓名中的优先顺序（下标越小越靠前；未匹配=99） */
function teacherNameRank(name, patterns){
  const n = String(name||'');
  for(let i=0;i<patterns.length;i++){
    if(patterns[i].test(n)) return i;
  }
  return 99;
}
function teacherPriorityRank(slot, needLang, profileById, allProfiles){
  const p = resolveTeacherProfileForSlot(slot, profileById, allProfiles);
  const name = p ? String(p.display_name||'') : String(slot.teacher_name||'');
  // 英文面试：元勋 → 海文 → 文博 → 利未 → 邢永
  if(needLang==='en'){
    return teacherNameRank(name, [/元勋|nathan|nathen/i, /海文|heaven/i, /文博|will/i, /利未|levi/i, /邢永|yohanes/i]);
  }
  // 中文面试：利未 → 文博 → 海文 → 元勋 → 邢永
  if(needLang==='zh'){
    return teacherNameRank(name, [/利未|levi/i, /文博|will/i, /海文|heaven/i, /元勋|nathan|nathen/i, /邢永|yohanes/i]);
  }
  // 印尼语面试：邢永 → 利未（其余老师可配翻译，统一靠后）
  if(needLang==='id'){
    return teacherNameRank(name, [/邢永|yohanes/i, /利未|levi/i]);
  }
  return 99;
}

function sortSlotsForApplicantBooking(slots, needLang, profileById, allProfiles){
  const arr = (slots||[]).slice();
  arr.sort((a,b)=>{
    const ra = teacherPriorityRank(a, needLang, profileById, allProfiles);
    const rb = teacherPriorityRank(b, needLang, profileById, allProfiles);
    if(ra!==rb) return ra - rb;
    const dc = String(a.slot_date||'').localeCompare(String(b.slot_date||''));
    if(dc!==0) return dc;
    return String(a.slot_time||'').localeCompare(String(b.slot_time||''));
  });
  return arr;
}

/** 单日列：课表/可约底/空档/已约 各为整条绝对定位块 */
function buildTeacherDayColHtml(dt, openSlots, booked){
  const dow=dt.getDay();
  const ymd=ymdFromDate(dt);
  const parts=[];
  for(const w of STAFF_INTERVIEW_PREF_WINDOWS){
    if(w.dow!==dow) continue;
    for(const [a,b] of w.segs||[]){
      const st=calSegStyle(a,b);
      if(st) parts.push(`<div class="week-cal-col-pref" style="${st}"><span class="week-cal-col-pref-txt">可约面试</span></div>`);
    }
  }
  for(const b of STAFF_CURRICULUM_BLOCKS){
    if(b.dow!==dow) continue;
    const st=calSegStyle(b.s,b.e);
    if(!st) continue;
    const k=b.kind||'busy';
    const cls=k==='pe'?'week-cal-col-pe':k==='pioneer'?'week-cal-col-pioneer':'week-cal-col-busy';
    parts.push(`<div class="${cls}" style="${st}"><span class="week-cal-col-block-txt">${esc(b.tag)}</span></div>`);
  }
  for(const s of openSlots){
    if(String(s.slot_date)!==ymd) continue;
    const sm=parseSlotLocalMs(s.slot_date,s.slot_time);
    if(sm==null) continue;
    const d=new Date(sm);
    const stMin=d.getHours()*60+d.getMinutes();
    const enMin=stMin+28;
    const st=calSegStyle(stMin,enMin);
    if(st) parts.push(`<div class="week-cal-col-free" style="${st}" title="已开放 · 申请人可预约"><span>空档·开放预约</span></div>`);
  }
  for(const s of booked){
    if(String(s.slot_date)!==ymd) continue;
    const sm=parseSlotLocalMs(s.slot_date,s.slot_time);
    if(sm==null) continue;
    const d=new Date(sm);
    const stMin=d.getHours()*60+d.getMinutes();
    const enMin=stMin+32;
    const st=calSegStyle(stMin,enMin);
    if(st){
      const ap=A.allApplicants.find(a=>String(a.id)===String(s.applicant_id));
      const nm=ap?fullName(ap):'预约';
      const short=nm.length>12?nm.slice(0,12)+'…':nm;
      parts.push(`<div class="week-cal-col-iv" style="${st}" title="${esc(nm)} ${esc((s.slot_time||'').slice(0,5))}">${esc((s.slot_time||'').slice(0,5))} ${esc(short)}</div>`);
    }
  }
  return `<div class="week-cal-day-col">${parts.join('')}</div>`;
}
/** 单周 HTML（days = 周一至周六 共 6 天）：每列一条连续课表块 + 块内全文标签 */

const EXAM_OPEN_DAYS_WIB = [1,3,6]; // Mon/Wed/Sat (0=Sun)
const EXAM_WIB_START = '09:00';
const EXAM_WIB_END   = '11:30';
const EXAM_ZOOM_ID = '847 5014 4631';
const EXAM_ZOOM_PW = '156903';

function pad2(n){return String(n).padStart(2,'0');}
function parseHHMM(t){
  const m=String(t||'').match(/^(\d{2}):(\d{2})$/);
  if(!m) return null;
  return {hh:+m[1], mm:+m[2]};
}
function formatDateYMD(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
// Compute next exam start (WIB, UTC+7) as a UTC Date.
function nextExamStartUtc(){
  const now = new Date();
  // "now" in UTC minutes
  const nowUtcMs = now.getTime();
  const startParts = parseHHMM(EXAM_WIB_START) || {hh:9,mm:0};

  // iterate next 14 days, choose first day that matches and is in the future
  for(let add=0; add<14; add++){
    // candidate date in WIB by shifting UTC then taking Y/M/D in WIB
    const candUtc = new Date(nowUtcMs + add*86400000);
    // derive WIB date components by adding 7h then using UTC getters
    const wibMs = candUtc.getTime() + 7*3600000;
    const wib = new Date(wibMs);
    const y=wib.getUTCFullYear(), m=wib.getUTCMonth(), d=wib.getUTCDate();
    const day = wib.getUTCDay();
    if(!EXAM_OPEN_DAYS_WIB.includes(day)) continue;

    // build WIB start time, convert to UTC by subtracting 7h
    const startUtc = new Date(Date.UTC(y,m,d,startParts.hh,startParts.mm,0) - 7*3600000);
    if(startUtc.getTime() > nowUtcMs) return startUtc;
  }
  return null;
}

function getExamWindowUtc(){
  // 考试窗口固定：WIB 周一/周三/周六 09:00-11:30（150 分钟）
  const nowMs = Date.now();
  const startParts = parseHHMM(EXAM_WIB_START) || {hh:9,mm:0};
  const intervalMs = 150*60*1000;

  let bestFuture = null;
  for(let delta=-7; delta<=14; delta++){
    const candUtcMs = nowMs + delta*86400000;
    // derive WIB date components by adding 7h then using UTC getters
    const wibMs = candUtcMs + 7*3600000;
    const wib = new Date(wibMs);
    const y = wib.getUTCFullYear();
    const m = wib.getUTCMonth();
    const d = wib.getUTCDate();
    const day = wib.getUTCDay();
    if(!EXAM_OPEN_DAYS_WIB.includes(day)) continue;

    const startUtc = new Date(Date.UTC(y,m,d,startParts.hh,startParts.mm,0) - 7*3600000);
    const endUtc   = new Date(startUtc.getTime() + intervalMs);

    if(nowMs >= startUtc.getTime() && nowMs <= endUtc.getTime()){
      return {startUtc,endUtc,inWindow:true};
    }
    if(nowMs < startUtc.getTime()){
      if(!bestFuture || startUtc.getTime() < bestFuture.startUtc.getTime()){
        bestFuture = {startUtc,endUtc,inWindow:false};
      }
    }
  }
  return bestFuture; // may be null if something unexpected
}

function fmtRangeInTZ(startUtc, endUtc, timeZone){
  try{
    const fmt = new Intl.DateTimeFormat('zh-CN',{
      timeZone,
      year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:false
    });
    const a = fmt.format(startUtc).replace(/\//g,'-');
    const b = fmt.format(endUtc).replace(/\//g,'-');
    // keep only time part for end date if same day is nicer, but keep simple
    return `${a} – ${b}`;
  }catch(_){
    return null;
  }
}
function guessTimeZoneFromApplicant(ap){

  const hit = (arr)=>arr.some(s=>blob.includes(s));
  if(hit(['indonesia','indones','印尼','雅加达','jakarta','surabaya','bandung'])) return 'Asia/Jakarta';
  if(hit(['china','中国','beijing','北京','shanghai','上海','prc'])) return 'Asia/Shanghai';
  if(hit(['singapore','新加坡'])) return 'Asia/Singapore';
  if(hit(['malaysia','马来','吉隆坡','kuala lumpur'])) return 'Asia/Kuala_Lumpur';
  if(hit(['taiwan','台湾','台北'])) return 'Asia/Taipei';
  if(hit(['hong kong','香港'])) return 'Asia/Hong_Kong';
  if(hit(['japan','日本','tokyo','东京'])) return 'Asia/Tokyo';
  if(hit(['korea','韩国','seoul','首尔'])) return 'Asia/Seoul';
  if(hit(['uk','united kingdom','英国','london','伦敦'])) return 'Europe/London';
  if(hit(['australia','澳洲','悉尼','sydney'])) return 'Australia/Sydney';
  if(hit(['usa','united states','美国','new york','纽约','los angeles','洛杉矶'])) return 'America/New_York';
  if(hit(['canada','加拿大','toronto','多伦多'])) return 'America/Toronto';

}

function mergeStoredExamDraftIfExamStage(applicantRow){

  A.examStarted=true;
  A.examSubmitted=false;
  if(d.examAnswers&&typeof d.examAnswers==='object') A.examAnswers=d.examAnswers;
  if(d.essayText!=null) A.essayText=d.essayText;
  if(typeof d.examTime==='number'&&d.examTime>=0){
    const cap=A.examTotalTime||9000;
    A.examTime=Math.min(d.examTime,cap);
  }
  if(d.examLang) A.examLang=d.examLang;
}

    const {data:bsl}=await sb.from('interview_slots').select('*').eq('id',data.interview_slot_id).maybeSingle();
    if(bsl) A.applicantBookedInterviewSlot=bsl;
  }

    await loadPublicSlots();
  }
  try{ await ensureExamQuestionsLoaded(); }catch(_){}
  if(applicantStagePoller){ clearInterval(applicantStagePoller); applicantStagePoller=null; }
  applicantStagePoller=setInterval(async()=>{
    if(A.role!=='applicant'||!A.applicant?.id) return;
    try{
      const {data:latest}=await sb.from('applicants').select('*').eq('id',A.applicant.id).maybeSingle();
      if(latest&&latest.stage&&latest.stage!==A.applicant.stage){
        A.applicant=latest;
        A.applicantBookedInterviewSlot=null;
        if(latest.interview_slot_id){
          const {data:bsl2}=await sb.from('interview_slots').select('*').eq('id',latest.interview_slot_id).maybeSingle();
          if(bsl2) A.applicantBookedInterviewSlot=bsl2;
        }
        if((latest.stage||'')!=='exam') clearApplicantExamDraft(latest.id);
        A.examStarted=false;
        A.examSubmitted=false;
        A.examAnswers={};
        A.essayText='';
        A.appLang=latest.ui_lang||A.appLang||'zh';
        A.examLang=latest.exam_lang||A.examLang||'zh';
        if(latest.stage==='interview'&&!latest.interview_slot_id){
          await loadPublicSlots();
        }
        render();
      }
    }catch(_){}
  },6000);
  installApplicantDraftLifecycleHooks();
  render();
}

  let snap=null;

  if(String(data.phone_last4||'')!==String(snap.phone_last4||'')){ clearApplicantBrowserSession(); return false; }
  A.role='applicant';
  A.applicant=data;
  const postExamStages=['interview','result','materials','visa','complete','rejected','waitlist'];
  const postExam=postExamStages.includes(data.stage||'');
  A.appLang=snap.appLang||data.ui_lang||'zh';

  await finalizeApplicantHydration(data);
  return true;
}

async function loadPublicSlots(){
  if(A.role!=='applicant') A.ivSlotsRelaxed=false;
  const now = Date.now();
  const needLang = (A.applicant?.exam_lang || A.examLang || 'zh');
  const [{data: slotRows}, {data: bookedAps}, {data: tprof}] = await Promise.all([
    sb.from('interview_slots').select('*').order('slot_date').order('slot_time'),
    sb.from('applicants').select('interview_slot_id').not('interview_slot_id', 'is', null),
    sb.from('profiles').select('id,display_name,interview_langs,whatsapp').eq('role','teacher'),
  ]);
  const teacherList = tprof||[];
  const profileById = new Map(teacherList.map(p=>[String(p.id),p]));
  const takenByApplicant = new Set(
    (bookedAps || [])
      .map(r => r.interview_slot_id)
      .filter(Boolean)
      .map(x => String(x)),
  );
  const toMs = s=>{
    if(!s?.slot_date || !s?.slot_time) return null;
    const m = String(s.slot_date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    const t = String(s.slot_time).match(/^(\d{2}):(\d{2})/);
    if(!m||!t) return null;
    const y=+m[1], mo=+m[2]-1, d=+m[3];
    const hh=+t[1], mm=+t[2];
    return new Date(y,mo,d,hh,mm,0).getTime();
  };
  const freeAll = (slotRows || []).filter(s=>{
    const ms = toMs(s);
    if(!ms || ms <= now) return false;
    if(!isInterviewSlotRowVacant(s)) return false;
    if(takenByApplicant.has(String(s.id))) return false;
    return true;
  });
  const strict = freeAll.filter(s=>slotSupportsApplicantExamLang(s, needLang, profileById, teacherList));
  const relaxed = strict.length===0 && freeAll.length>0;
  let free = relaxed ? freeAll : strict;

}

/** 按日期区间为指定老师批量添加 interview_slots（教师本人或管理员代录） */
async function addInterviewSlotRange({teacherId, teacherDisplayName, dateInputId, startInputId, endInputId, intervalSelectId}){
  if(!teacherId){toast('请选择负责老师',false);return;}
  const date=document.getElementById(dateInputId)?.value;
  const start=document.getElementById(startInputId)?.value;
  const end=document.getElementById(endInputId)?.value;
  const interval=parseInt(document.getElementById(intervalSelectId)?.value||'30',10);
  if(!date||!start||!end){toast('请填写日期与开始/结束时间',false);return;}
  const toMin = t=>{
    const [h,m]=String(t).split(':').map(Number);
    return h*60+m;
  };
  const pad2 = n=>String(n).padStart(2,'0');
  const startMin=toMin(start);
  const endMin=toMin(end);
  if(!(interval===20||interval===30)) {toast('请选择 20 或 30 分钟间隔',false);return;}
  if(endMin<=startMin){toast('结束时间必须晚于开始时间',false);return;}
  const times=[];
  for(let m=startMin; m+interval<=endMin; m+=interval){
    const hh=Math.floor(m/60), mm=m%60;
    times.push(`${pad2(hh)}:${pad2(mm)}`);
  }
  if(times.length===0){toast('时间段内没有可生成的时间点',false);return;}
  const now=Date.now();
  const msOf = t=>{
    const dm = String(date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!dm) return null;
    const tt = String(t).match(/^(\d{2}):(\d{2})$/);
    if(!tt) return null;
    const y=+dm[1], mo=+dm[2]-1, d=+dm[3];
    const hh=+tt[1], mm=+tt[2];
    return new Date(y,mo,d,hh,mm,0).getTime();
  };
  const futureTimes=times.filter(t=>{const ms=msOf(t); return ms && ms>now;});
  if(futureTimes.length===0){toast('该时间段内没有未来可用时间点',false);return;}
  const {data:existing} = await sb.from('interview_slots')
    .select('slot_time')
    .eq('slot_date',date)
    .in('slot_time',futureTimes);
  const existSet=new Set((existing||[]).map(r=>r.slot_time));
  const payload=futureTimes.filter(t=>!existSet.has(t)).map(t=>({
    slot_date:date,
    slot_time:t,
    is_booked:false,
    teacher_id:teacherId,
    teacher_name:teacherDisplayName||null
  }));
  if(payload.length===0){toast('这些时间点已存在，无需重复添加',true);return;}
  const {error}=await sb.from('interview_slots').insert(payload);
  if(!error){
    toast(`已添加 ${payload.length} 个时间点`,true);
    await loadAdminData();
    render();
  } else toast('添加失败：'+(error.message||''),false);
}
async function teacherAddSlotRange(dateInputId, startInputId, endInputId, intervalSelectId){
  return addInterviewSlotRange({
    teacherId:A.user?.id,
    teacherDisplayName:A.profile?.display_name,
    dateInputId, startInputId, endInputId, intervalSelectId,
  });
}

function longestCommonSubsequenceLen(a, b){
  const m=a.length, n=b.length;
  if(!m||!n) return 0;
  const dp = Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
    }
  }
  return dp[m][n];
}

function longestCommonSubstringLen(a, b){
  const m=a.length, n=b.length;
  if(!m||!n) return 0;
  let best=0;
  let row=new Array(n+1).fill(0);
  for(let i=1;i<=m;i++){
    let prevDiag=0;
    for(let j=1;j<=n;j++){
      const tmp=row[j];
      if(a[i-1]===b[j-1]){
        row[j]=prevDiag+1;
        if(row[j]>best) best=row[j];
      } else row[j]=0;
      prevDiag=tmp;
    }
  }
  return best;
}

/** 默写题：按「经文重合度」阶梯给分（每题满分通常为 2）。短句摘抄也能拿到部分分。 */
function scoreDictationByCoverage(uNorm, eNorm, maxScore){
  const round05 = x=>Math.round(x*20)/20;
  const u = uNorm, e = eNorm;
  if(!u||!e||!maxScore) return {points:0, ratio:0};
  if(u===e) return {points:round05(maxScore), ratio:1};
  if(e.length>=12 && e.includes(u) && u.length>=6) return {points:round05(maxScore), ratio:1};
  if(u.length>=12 && u.includes(e)) return {points:round05(maxScore), ratio:1};
  const sub = longestCommonSubsequenceLen(u,e)/e.length;
  const subStr = longestCommonSubstringLen(u,e)/e.length;
  let ratio = Math.min(1, Math.max(sub, subStr));
  const uSet=new Set(u.split(''));
  let inter=0;
  e.split('').forEach(ch=>{ if(uSet.has(ch)) inter++; });
  const bagRatio = e.length ? inter/e.length : 0;
  if(bagRatio>=0.88) ratio = Math.max(ratio, 0.92);
  let frac;
  if(ratio>=0.92) frac=1;
  else if(ratio>=0.78) frac=0.82;
  else if(ratio>=0.60) frac=0.65;
  else if(ratio>=0.42) frac=0.48;
  else if(ratio>=0.26) frac=0.32;
  else if(ratio>=0.14) frac=0.21;
  else if(ratio>=0.08) frac=0.15;
  else if(ratio>=0.04) frac=0.10;
  else if(ratio>0) frac=0.05;
  else frac=0;
  return {points:round05(maxScore*frac), ratio};
}

async function submitExam(){
  stopTimer();
  const qs=(A.examQuestions&&A.examQuestions.length)?A.examQuestions:EXAM_Qs;
  const EA=A.examAnswers||{};
  const EL = A.examLang || 'zh';
  const norm = s=>String(s||'').trim().replace(/\s+/g,'');
  const normOrder = s=>String(s||'').toUpperCase().replace(/[^A-Z]/g,'');
  function normalizeDict(s, lang){
    const t = String(s||'').trim();
    if(!lang || lang==='zh'){
      return t.replace(/\s+/g,'').replace(/[，。！？、；：“”"']/g,'');
    }
    return t.toLowerCase().replace(/\s+/g,'').replace(/[^a-z0-9\u00c0-\u024f]/g,'');
  }

  let score=0;
  let otEarned=0, ntEarned=0;
  let otMax=0, ntMax=0;

  for(const q of qs){
    const qid=q.id;
    const maxQ = q.score||0;
    const sec = q.section;
    let earned=0;

    if(q.type==='fill'){
      const user = Array.isArray(EA[qid])?EA[qid]:[];
      const expected = (EL==='en' && q.answers_en && q.answers_en.length) ? q.answers_en
        : (EL==='id' && q.answers_id && q.answers_id.length) ? q.answers_id
        : (q.answers||[]);
      const per = expected.length ? (q.score/expected.length) : 0;
      let correct=0;
      for(let bi=0;bi<expected.length;bi++){
        if(norm(user[bi])===norm(expected[bi])) correct++;
      }
      earned = correct * per;
      score += earned;
    } else if(q.type==='single'){
      if(EA[qid]===q.answer_index) earned = q.score;
      score += earned;
    } else if(q.type==='truefalse'){
      if(EA[qid]===q.answer_bool) earned = q.score;
      score += earned;
    } else if(q.type==='match'){
      const user = Array.isArray(EA[qid])?EA[qid]:[];
      const expected = q.answer_map||[];
      const per = expected.length ? (q.score/expected.length) : 0;
      let correct=0;
      for(let li=0;li<expected.length;li++){
        if(user[li]===expected[li]) correct++;
      }
      earned = correct * per;
      score += earned;
    } else if(q.type==='order'){
      const userSeq = normOrder(EA[qid]||'');
      const expSeq = normOrder(q.correct_seq||'');
      if(userSeq===expSeq) earned = q.score;
      score += earned;
    } else if(q.type==='dictation'){
      const expRaw = (EL==='en' && q.expected_en) ? q.expected_en
        : (EL==='id' && q.expected_id) ? q.expected_id
        : (q.expected||'');
      const u = normalizeDict(EA[qid]||'', EL);
      const e = normalizeDict(expRaw, EL);
      if(!u||!e){
        earned=0;
      } else {
        const r = scoreDictationByCoverage(u,e,q.score);
        earned = r.points;
      }
      score += earned;
    }

    if(sec==='ot'){ otEarned+=earned; otMax+=maxQ; }
    else if(sec==='nt'){ ntEarned+=earned; ntMax+=maxQ; }
  }

  // 保险：把可能因题目解析/配分差异导致的“原始得分”线性缩放到满分 100
  const maxPossible = qs.reduce((s,q)=>s+(q.score||0),0);
  const scoreScaled = maxPossible ? Math.round((score/maxPossible)*100) : score;

  const fmt2 = n=>Number(n).toFixed(2);
  // 成绩备注仅保留分项与监考信息（默写原文与机评细节见 exam_answers JSON）
  const examEssayWithRemark = [
    `旧约总分：${fmt2(otEarned)} / ${fmt2(otMax)}`,
    `新约总分：${fmt2(ntEarned)} / ${fmt2(ntMax)}`,
    `切换屏幕次数：${A.proctorFlags||0} 次`,
  ].join('\n');

  const {error} = await sb.from('applicants').update({
    exam_score:scoreScaled,
    exam_essay:examEssayWithRemark,
    exam_answers:EA,
    exam_completed_at:new Date().toISOString(),
    stage:'interview',
    exam_lang: EL,
  }).eq('id',A.applicant.id);
  if(!error){
    A.applicant.exam_score=scoreScaled;
    A.applicant.exam_essay=examEssayWithRemark;
    A.applicant.exam_lang = EL;
    A.applicant.stage='interview';
    A.examSubmitted=true;
    clearApplicantExamDraft(A.applicant.id);
    toast(apLine('答卷已提交。教务将阅卷，分数由老师另行通知，请按提示预约面试。','Submitted. Staff will review your paper; scores are shared by the office — please book your interview as guided.','Terkirim. Staf akan menilai; nilai diberitahu kantor — lanjut pesan wawancara.'));
    await loadPublicSlots();
  } else toast(apLine('提交失败','Submit failed','Gagal mengirim'),false);
  render();
}

async function confirmInterview(){
  if(!A.ivSelected) return;
  if(!A.applicant?.id){
    toast(apLine('登录状态异常，请重新登录后再预约','Session error — please log in again to book.','Sesi tidak valid — masuk lagi untuk memesan.'), false);
    return;
  }
  if(!A.ivSelected.id){
    toast(apLine('请重新选择时段','Please pick a time slot again.','Pilih slot waktu lagi.'), false);
    return;
  }
  // 防止用户在时间已经过去后仍然能点到“确认预约”
  const toMs = s=>{
    if(!s?.slot_date || !s?.slot_time) return null;
    const m = String(s.slot_date).match(/^(\d{4})-(\d{2})-(\d{2})$/);
    const t = String(s.slot_time).match(/^(\d{2}):(\d{2})/);
    if(!m||!t) return null;
    const y=+m[1], mo=+m[2]-1, d=+m[3];
    const hh=+t[1], mm=+t[2];
    return new Date(y,mo,d,hh,mm,0).getTime();
  };
  const ms = toMs(A.ivSelected);
  if(ms && ms <= Date.now()){
    toast(apLine('该面试时间已过期，请刷新选择新的时间段','This slot has passed — refresh and pick another.','Slot sudah lewat — muat ulang dan pilih lain.'),false);
    return;
  }
  const aid = String(A.applicant.id);
  const {data: dupHold, error: dupErr} = await sb.from('applicants')
    .select('id')
    .eq('interview_slot_id', A.ivSelected.id)
    .not('id', 'eq', aid)
    .limit(1);
  if(dupErr){
    toast(apLine('无法校验时段冲突：','Could not verify conflicts: ','Tidak bisa memverifikasi bentrok: ')+(dupErr.message||''), false);
    return;
  }
  if(dupHold && dupHold.length > 0){
    toast(apLine('该时段已被其他同学预约，请刷新后另选','This slot was taken — refresh and choose another.','Slot sudah dipakai — muat ulang dan pilih lain.'), false);
    await loadPublicSlots();
    A.ivSelected = null;
    render();
    return;
  }
  const { data: rowFresh, error: snapErr } = await sb.from('interview_slots')
    .select('id,applicant_id,is_booked')
    .eq('id', A.ivSelected.id)
    .maybeSingle();
  if(snapErr){
    toast(apLine('无法校验时段：','Could not verify slot: ','Tidak bisa memverifikasi slot: ')+(snapErr.message||apLine('请稍后再试','try again.','coba lagi.')), false);
    return;
  }
  if(!rowFresh || !isInterviewSlotRowVacant(rowFresh)){
    toast(apLine('该时段已被其他同学预约，请刷新后另选','This slot was taken — refresh and choose another.','Slot sudah dipakai — muat ulang dan pilih lain.'), false);
    await loadPublicSlots();
    A.ivSelected = null;
    render();
    return;
  }
  // 库内原子预约：SECURITY DEFINER RPC，绕过 anon 对 interview_slots/applicants 的 UPDATE 策略未部署或被拦截的问题
  const { data: bookResult, error: rpcErr } = await sb.rpc('book_interview_slot_for_applicant', {
    p_slot_id: A.ivSelected.id,
    p_applicant_id: A.applicant.id,
  });
  if(rpcErr){
    const hint = (rpcErr.message||'').includes('function')||(rpcErr.code||'')==='42883'
      ? apLine('（请在 Supabase SQL Editor 执行仓库内迁移 20260411180000_book_interview_slot_rpc.sql）','(Run migration 20260411180000_book_interview_slot_rpc.sql in Supabase SQL Editor.)','(Jalankan migrasi 20260411180000_book_interview_slot_rpc.sql di Supabase.)')
      : '';
    toast(apLine('预约失败：','Booking failed: ','Gagal memesan: ')+(rpcErr.message||'')+hint, false);
    await loadPublicSlots();
    A.ivSelected = null;
    render();
    return;
  }
  const br = bookResult;
  if(!br || br.ok !== true){
    if(br && br.reason === 'applicant_not_found'){
      toast(apLine('找不到申请人记录，请重新登录后再试','Applicant record not found — log in again.','Data pelamar tidak ditemukan — masuk lagi.'), false);
    } else {
      toast(apLine('未能锁定该时段（可能刚被他人预约）。请刷新后另选。','Could not lock this slot — it may have been taken. Refresh and pick another.','Slot tidak terkunci — mungkin sudah diambil. Muat ulang.'), false);
    }
    await loadPublicSlots();
    A.ivSelected = null;
    render();
    return;
  }
  A.ivBooked=true;
  A.applicant.interview_slot_id=A.ivSelected.id;
  A.applicantBookedInterviewSlot = A.ivSelected;
  toast(apLine('面试预约成功！','Interview booked!','Wawancara berhasil dipesan!'));
  try{
    await sb.from('notification_log').insert([
      {applicant_id:A.applicant.id,type:'iv_scheduled',recipient:'applicant',content:`面试时间：${A.ivSelected.slot_date} ${A.ivSelected.slot_time}`},
      {applicant_id:A.applicant.id,type:'teacher_notified',recipient:A.ivSelected.teacher_name,content:`申请人：${fullName(A.applicant)}`},
    ]);
  }catch(_){}
  try{
    const { error: fnErr } = await sb.functions.invoke('interview-notify', {
      body: { applicant_id: A.applicant.id, interview_slot_id: A.ivSelected.id },
    });
    if (fnErr) console.warn('interview-notify:', fnErr.message || fnErr);
  }catch(e){
    console.warn('interview-notify invoke failed:', e);
  }
  render();
}

    ? apLine('确认已与家人沟通并可承担剩余费用？将进入「完成」环节（印尼语班无需签证材料）。','Confirm and proceed to the final step (Indonesian track has no visa upload)?','Konfirmasi lanjut ke tahap selesai (jalur Indonesia tanpa unggah visa)?')
    : apLine('确认已与家人沟通并可承担剩余费用？将进入「签证」环节。','Confirm you can cover remaining costs and proceed to Visa?','Konfirmasi lanjut ke visa?');
  if(!confirm(cmsg)) return;
  const {data:updRows,error}=await sb.from('applicants').update({stage:nextStage}).eq('id',ap.id).eq('stage','materials').select('id');
  if(error){
    toast(apLine('操作失败','Failed','Gagal')+(error.message?': '+error.message:''),false);
    return;
  }
  if(!updRows||!updRows.length){
    toast(apLine('未能推进阶段：数据库中当前不是「上传资料」环节，请刷新页面后再试。','Could not advance — your stage may have changed. Refresh and try again.','Gagal — muat ulang halaman.'),false);
    try{
      const {data:f}=await sb.from('applicants').select('stage').eq('id',ap.id).maybeSingle();
      if(f&&f.stage) A.applicant.stage=f.stage;
    }catch(_){}
    render();
    return;
  }
  A.applicant.stage=nextStage;
  toast(idPipe?apLine('已进入完成环节','Now on the final step','Masuk tahap selesai'):apLine('已进入签证环节','Now in Visa stage','Masuk tahap visa'));
  render();
}

/** 职员登录：把 Supabase 常见错误译成可操作的提示（避免一律显示「邮箱或密码错误」） */
function messageForStaffAuthError(err){
  if(!err) return '登录失败，请稍后再试';
  const raw=String(err.message||'');
  const low=raw.toLowerCase();
  const code=String(err.code||'');
  if(low.includes('email not confirmed')||code==='email_not_confirmed'||(low.includes('confirm')&&low.includes('email'))){
    return '该邮箱尚未完成验证：请查收确认邮件并点击链接；或由管理员在 Supabase → Authentication → 点开该用户 → 将邮箱标为已确认（Confirm）。';
  }
  if(low.includes('too many request')||code==='over_request_rate_limit'){
    return '尝试过于频繁，请几分钟后再试。';
  }
  if(low.includes('invalid login')||low.includes('invalid_grant')||low.includes('invalid credentials')){
    return '邮箱或密码不正确。若忘记密码：管理员可在招生系统「我的」里用「重置教师密码」；或在 Supabase 用户详情中发送重置邮件 / 设置新密码。';
  }
  return '登录失败：'+raw;
}

async function loginStaff(email,password){
  if(!sb){toast('未连接数据库，请检查网络后刷新',false);return;}
  const emailNorm=String(email||'').trim();
  const {data,error}=await sb.auth.signInWithPassword({email:emailNorm,password});
  if(error){
    console.warn('loginStaff', error.message, error);
    toast(messageForStaffAuthError(error),false);
    return;
  }
  A.user=data.user;
  const {data:prof}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
  A.profile=prof;
  A.role=prof?.role||'teacher';
  A.adminDataLoading=true;
  render();
  try{
    await loadAdminData();
  }catch(e){
    console.warn('loadAdminData', e);
  }finally{
    A.adminDataLoading=false;
    render();
  }
}

function renderSteps(cur, ap){
  const list=(A.role==='applicant'&&ap)?applicantPipelineStages(ap):STAGES;
  let idx=list.findIndex(s=>s.id===cur);
  if(idx<0){
    if(cur==='visa'&&ap&&getApplicantExamLang(ap)==='id')
      idx=list.findIndex(s=>s.id==='complete');
    else if(typeof STAGE_IDX[cur]==='number')
      idx=Math.min(STAGE_IDX[cur],list.length-1);
    else
      idx=0;
  }
  const stepLabel = (s)=>{
    if(A.role!=='applicant') return s.label;
    const enShort = {apply:'Apply', exam:'Exam', interview:'Interview', result:'Pre-admit', materials:'Documents', visa:'Visa', complete:'Done'};
    const idShort = {apply:'Lamaran', exam:'Ujian', interview:'Wawancara', result:'Pra-diterima', materials:'Unggah berkas', visa:'Visa', complete:'Selesai'};
    const zhShort = {apply:'报名', exam:'笔试', interview:'面试', result:'预录取', materials:'上传资料', visa:'签证', complete:'完成'};
    if(A.appLang==='en') return enShort[s.id] || (String(s.label||'').split(' · ').pop()||'').trim() || s.label;
    if(A.appLang==='id') return idShort[s.id] || s.label;
    return zhShort[s.id] || (String(s.label||'').split(' · ')[0] || s.label);
  };
  return `<div class="steps">${list.map((s,i)=>{
    const cls=i<idx?'done':i===idx?'active':'locked';
    const lc=i<idx?'c-indigo4':i===idx?'c-indigo6':'c-gray4';
    const conn=i<list.length-1?`<div class="step-conn ${i<idx?'done':'locked'}"></div>`:'';
    return `<div class="col" style="align-items:center"><div class="step-dot ${cls}">${i<idx?'✓':s.icon}</div><div class="step-label ${lc}">${esc(stepLabel(s))}</div></div>${conn}`;
  }).join('')}</div>`;
}

    if(EL==='en' && globalThis.__EXAM_EN_PARSED && globalThis.__EXAM_EN_PARSED[qi]) return globalThis.__EXAM_EN_PARSED[qi];

      const exp = EL==='en' && q.expected_en ? q.expected_en
        : EL==='id' && q.expected_id ? q.expected_id
        : (q.expected||'');
      if(EL==='zh'){
        const { ref } = extractZhDictationRef(exp);
        return '请默写：' + (ref || String(q.prompt||'').replace(/^请默写[：:]\s*/,'').trim() || '经文');
      }
      if(EL==='en'){
        const er = extractLatinDictRefFromExpected(exp);
        return er ? ('Write from memory: '+er) : (q.prompt_en||'');
      }
      if(EL==='id'){
        const ir = extractLatinDictRefFromExpected(exp);
        return ir ? ('Tuliskan dari hafalan: '+ir) : (q.prompt_id||'');
      }
      return q.prompt||'';
    }
    const L = locQ(qi);
    if(L && L.type===q.type && L.prompt) return L.prompt;
    if(EL==='en' && q.prompt_en) return q.prompt_en;
    if(EL==='id' && q.prompt_id) return q.prompt_id;
    if(EL==='en'){
      return 'This item is temporarily unavailable in English. Please switch paper language to 中文 or refresh and try again.';
    }
    if(EL==='id'){
      return 'Soal bahasa Indonesia belum tersedia. Silakan pilih bahasa lembar 中文 atau muat ulang halaman.';
    }
    return q.prompt||'';
  }
  function qOptions(q, qi){
    const L = locQ(qi);
    if(L && L.type==='single' && Array.isArray(L.options) && L.options.some(x=>String(x||'').trim())) return L.options;
    if(EL==='en' && q.options_en && q.options_en.length) return q.options_en;
    if(EL==='id' && q.options_id && q.options_id.length) return q.options_id;
    if(EL==='en' || EL==='id') return [];
    return q.options||[];
  }
  function qLeftItems(q, qi){
    const L = locQ(qi);
    if(L && L.type==='match' && L.left_items && q.left_items && L.left_items.length===q.left_items.length) return L.left_items;
    if(EL==='en' && q.left_items_en && q.left_items && q.left_items_en.length===q.left_items.length) return q.left_items_en;
    if(EL==='id' && q.left_items_id && q.left_items && q.left_items_id.length===q.left_items.length) return q.left_items_id;
    return q.left_items||[];
  }
  function qRightItems(q, qi){
    const L = locQ(qi);
    if(L && L.type==='match' && L.right_items && q.right_items && L.right_items.length===q.right_items.length) return L.right_items;
    if(EL==='en' && q.right_items_en && q.right_items && q.right_items_en.length===q.right_items.length) return q.right_items_en;
    if(EL==='id' && q.right_items_id && q.right_items && q.right_items_id.length===q.right_items.length) return q.right_items_id;

  function qOrderItems(q, qi){

  }
  function fillBlanksCount(q){
    if(EL==='en' && q.answers_en && q.answers_en.length) return q.answers_en.length;

  const examUi = EL==='en' ? {

    fillPh:(i)=>`空${i+1} · B${i+1}`,

    orderPh:'例如 · e.g. CABD',
    dictPh:'请在此输入文本… · Type your answer here…',
    tfT:'√ 对 · True',
    tfF:'× 错 · False',
    submit:'提交答卷 · Submit',
    remain:'剩余 · Left',
  };

  function renderOne(q,qi){

      <div class="shrink0" style="width:24px;height:24px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:2px">${qi+1}</div>
      <p class="c-gray8 fw5 t13 lh16 flex1">${esc(qPrompt(q, qi))}</p>

    if(q.type==='fill'){
      const blanks=fillBlanksCount(q);
      const cur=Array.isArray(EA[qid])?EA[qid]:[];
      return `<div class="card p5 mb3">

          <div class="row wrap g2">
            ${Array.from({length:blanks}).map((_,bi)=>{
              const val=cur[bi]||'';
              return `<input class="inp" style="min-width:140px;flex:1" data-kind="fill" data-qid="${qid}" data-blank="${bi}" placeholder="${esc(examUi.fillPh(bi))}" value="${esc(val)}">`;
            }).join('')}
          </div>
        </div>
      </div>`;
    }

    if(q.type==='single'){
      const opts=qOptions(q, qi);
      const optMissing = EL==='en'
        ? '<p class="t13" style="color:#b45309">Answer choices failed to load. Refresh the page or use http(s) hosting.</p>'
        : EL==='id'

      return `<div class="card p5 mb3">

    if(q.type==='truefalse'){

  return `<div id="exam-main" class="maxw-2xl mx-auto px4" style="padding-bottom:64px">
    <div id="timer-wrap" class="row g3 r12 p3 mb4" style="position:sticky;top:64px;z-index:10;background:#eef2ff;border:1px solid #e0e7ff">

    <div class="tc mt8"><button class="btn btn-primary" id="btn-submit-exam">${esc(examUi.submit)}</button></div>
  </div>`;
}

function parseApplicantJsonCol(v,def){
  if(v==null||v==='') return def;
  if(typeof v==='object'&&v!==null&&!Array.isArray(v)) return v;
  try{const o=JSON.parse(v);return typeof o==='object'&&o!==null?o:def;}catch(_){return def;}
}
function readFileAsBase64(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=()=>res(String(fr.result||''));
    fr.onerror=()=>rej(new Error('read'));
    fr.readAsDataURL(file);
  });
}
const VISA_FILE_MAX_BYTES=Math.floor(2.6*1024*1024);
function parseVisaFiles(ap){
  return parseApplicantJsonCol(ap&&ap.visa_files_json,{});
}
function visaFileDataOk(data){
  return data&&String(data).length>80;
}
function visaMaterialsSpecOk(vf){
  const issues=[];
  if(!visaFileDataOk(vf.passport_data)) issues.push(apLine('护照扫描件','Passport scan','Scan paspor'));
  if(!visaFileDataOk(vf.photo_data)) issues.push(apLine('红底证件照','Red-background photo','Foto latar merah'));
  if(!visaFileDataOk(vf.cv_data)) issues.push(apLine('学生 CV','Student CV','CV mahasiswa'));
  return {ok:!issues.length,issues};
}
function validateVisaPickFile(file,kind){
  if(!file) return {ok:false,msg:apLine('未选择文件','No file selected','Belum pilih berkas')};
  if(file.size>VISA_FILE_MAX_BYTES) return {ok:false,msg:apLine('单文件请勿超过约 2.5MB','Each file must be under ~2.5MB','Maks ~2.5MB per berkas')};
  const t=file.type||'';
  const name=(file.name||'').toLowerCase();
  if(kind==='passport'){
    if(t.startsWith('image/')||t==='application/pdf'||name.endsWith('.pdf')) return {ok:true};
    return {ok:false,msg:apLine('护照请上传 PDF 或图片','Passport: PDF or image','Paspor: PDF atau gambar')};
  }
  if(kind==='photo'){
    if(t.startsWith('image/')) return {ok:true};
    return {ok:false,msg:apLine('证件照请上传图片（JPG/PNG 等）','Photo: image file only','Foto: berkas gambar')};
  }

async function downloadVisaMaterialsZip(ap){

function ageFromDob(dobLike){
  if(!dobLike) return null;
  const s=String(dobLike).slice(0,10);
  const m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return null;
  const y=+m[1], mo=+m[2], d=+m[3];
  if(!y||mo<1||mo>12||d<1||d>31) return null;
  const now=new Date();
  let age=now.getFullYear()-y;
  const curM=now.getMonth()+1, curD=now.getDate();
  if(curM<mo || (curM===mo && curD<d)) age--;
  if(age<0||age>130) return null;
  return age;
}

function collectEnrollmentSurveyFromDom(prev,rootEl){
  const root=rootEl||document;
  const sur={...prev};
  root.querySelectorAll('input[type=radio][data-sv]').forEach(el=>{
    if(el.checked) sur[el.dataset.sv]=el.value;
  });
  root.querySelectorAll('[data-sv-inp]').forEach(el=>{const k=el.dataset.svInp;if(k) sur[k]=(el.value||'').trim();});
  root.querySelectorAll('[data-sv-ta]').forEach(el=>{const k=el.dataset.svTa;if(k) sur[k]=(el.value||'').trim();});
  root.querySelectorAll('input[type=checkbox][data-sv-chk]').forEach(el=>{const k=el.dataset.svChk;if(k) sur[k]=el.checked?'yes':'no';});
  if(sur.mental_hist!=null){ sur.mental_illness_history=sur.mental_hist; sur.mental_health=sur.mental_hist; }
  if((sur.mental_name||'').trim()) sur.mental_illness_name=sur.mental_name;
  if(sur.drug_hist!=null){ sur.drug_history=sur.drug_hist; sur.substance_history=sur.drug_hist; }
  if((sur.habit_substance_explain||'').trim()){ sur.drug_detail=sur.habit_substance_explain; sur.drug_detail_line=sur.habit_substance_explain; }
  else if((sur.drug_detail_line||'').trim()) sur.drug_detail=sur.drug_detail_line;
  if(sur.drug_history==null&&sur.substance_history!=null) sur.drug_history=sur.substance_history;
  if(sur.drug_detail==null&&sur.substance_detail) sur.drug_detail=sur.substance_detail;
  sur.substance_history=sur.drug_history||sur.substance_history||'no';
  sur.substance_detail=sur.drug_detail||sur.substance_detail||'';
  sur.mental_health=sur.mental_illness_history||sur.mental_health||'no';
  sur.mental_detail=sur.mental_illness_name||sur.mental_detail||'';
  if(sur.net_addict!=null) sur.internet_addiction=sur.net_addict;
  if(sur.net_affect!=null) sur.internet_affects_life=sur.net_affect;
  sur._saved_at=new Date().toISOString();
  return sur;
}

function renderScholarshipReview(){
  const stageOrder={materials:0,visa:1,complete:2};
  const list=(A.allApplicants||[]).filter(a=>['materials','visa','complete'].includes(a.stage)).sort((a,b)=>{
    const oa=stageOrder[a.stage]??9,ob=stageOrder[b.stage]??9;
    if(oa!==ob) return oa-ob;
    const ta=String(a.materials_submitted_at||a.created_at||''),tb=String(b.materials_submitted_at||b.created_at||'');
    if(ta!==tb) return ta.localeCompare(tb);
    return String(fullName(a)).localeCompare(String(fullName(b)),'zh');
  });
  const row=ap=>{
    const sch=parseApplicantJsonCol(ap.scholarship_form_json,{});
    const v=ap.scholarship_amount_approved!=null&&ap.scholarship_amount_approved!==''?String(ap.scholarship_amount_approved):'';
    const stLab=(STAGES.find(s=>s.id===ap.stage)||{}).label||ap.stage;
    return `<tr>
      <td><div class="row g1 wrap" style="align-items:center"><span class="fw6">${esc(fullName(ap))}</span>${ap.mat_survey_alert?mkTag('#fef3c7','#92400e','需留意'):''}</div>
        <div class="t11 c-gray4">${esc(ap.phone||'')}</div></td>
      <td class="t11 c-gray6" style="white-space:nowrap">${esc(stLab)}</td>
      <td>${ap.exam_score!=null?esc(String(ap.exam_score)):'—'}</td>
      <td class="t11 c-gray6" style="max-width:220px;word-break:break-word">${esc(String(sch.requested_amount||sch.amount_requested||sch.family_support||sch.total_self_funded||'—').slice(0,120))}</td>
      <td><input type="number" class="inp sch-amt-inp" data-apid="${ap.id}" style="width:110px" step="1" placeholder="额度" value="${esc(v)}"></td>
      <td><input type="text" class="inp sch-note-inp" data-apid="${ap.id}" style="width:140px" placeholder="批复备注" value="${esc(ap.scholarship_review_note||'')}"></td>
      <td class="row g1 wrap"><button type="button" class="btn btn-primary btn-sm btn-save-sch-amt" data-apid="${ap.id}">保存</button>
        <button type="button" class="btn btn-outline btn-sm" data-action="view-briefing" data-apid="${ap.id}">档案</button></td>
    </tr>`;
  };
  return `<div class="maxw-3xl col g4">
    <div class="fw7 c-gray8 t16">奖学金批复</div>
    <div class="t12 c-gray5 lh16">列表包含当前处于<strong>上传资料、签证、完成</strong>三个阶段的全部申请人（无需先点「提交审核」也会出现）。请结合笔试、面试与家庭经济情况填写<strong>批复额度</strong>（数字）后保存；保存后会在<strong>档案 · 基本资料</strong>与申请人端展示该金额。若入学调查表中披露物质使用/成瘾史等，姓名旁会标「需留意」。</div>
    <div class="card" style="overflow:auto">
      <table class="tbl"><thead><tr><th>申请人</th><th>当前阶段</th><th>笔试</th><th>申请额度</th><th>批复额度</th><th>备注</th><th>操作</th></tr></thead>
      <tbody>${list.length?list.map(row).join(''):`<tr><td colspan="7" class="t13 c-gray4 tc" style="padding:24px">暂无处于「上传资料 / 签证 / 完成」环节的申请人</td></tr>`}</tbody></table>
    </div>
  </div>`;
}

  const roleTag=isAd?mkTag('#eef2ff','#4f46e5',roleLabel):mkTag('#ede9fe','#6d28d9',roleLabel);

    {id:'pipeline',label:'申请人看板',icon:'📊'},
    {id:'exams',label:'笔试成绩',icon:'📝'},
    {id:'schedule',label:'面试排班',icon:'📅'},

    {id:'scholarship',label:'奖学金批复',icon:'💰'},

  ];
  const boot=A.adminDataLoading;
  const stats=[
    {label:'总申请人',value:boot?'—':A.allApplicants.length,color:'#4f46e5'},
    {label:'待笔试',value:boot?'—':A.allApplicants.filter(a=>a.stage==='exam').length,color:'#2563eb'},
    {label:'待面试',value:boot?'—':A.allApplicants.filter(a=>a.stage==='interview').length,color:'#7c3aed'},

      <div class="row g2">${mkAv(avLetter,'sm',isAd?'av-indigo':'av-violet')}<span class="t12 c-gray6">${esc(A.profile?.display_name||A.user?.email||'')}</span><button class="btn btn-ghost btn-sm" id="btn-logout">退出</button></div>
    </div>
    <div class="stats">${stats.map(s=>`<div class="stat-card"><div class="t28 fw8" style="color:${s.color}">${s.value}</div><div class="t11 c-gray4 mt1">${s.label}</div></div>`).join('')}</div>
    <div class="tabbar"${boot?' style="opacity:.55;pointer-events:none"':''}>${tabs.map(t=>`<button class="tab${A.adminTab===t.id?' active':''}" data-admin-tab="${t.id}">${t.icon} ${t.label}</button>`).join('')}</div>
