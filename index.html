<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>神学院招生系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#f4f5ff;color:#1e1e2e;font-size:14px}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#c5c8e0;border-radius:3px}

/* Layout */
.row{display:flex;align-items:center}.col{display:flex;flex-direction:column}.wrap{flex-wrap:wrap}.center{justify-content:center;align-items:center}
.g1{gap:4px}.g2{gap:8px}.g3{gap:12px}.g4{gap:16px}.g6{gap:24px}
.ml-auto{margin-left:auto}.flex1{flex:1}.shrink0{flex-shrink:0}.ovx{overflow-x:auto}.ovy{overflow-y:auto}

/* Spacing */
.p2{padding:8px}.p3{padding:12px}.p4{padding:16px}.p5{padding:20px}.p6{padding:24px}
.px3{padding-left:12px;padding-right:12px}.px4{padding-left:16px;padding-right:16px}.px6{padding-left:24px;padding-right:24px}
.py2{padding-top:8px;padding-bottom:8px}.py3{padding-top:12px;padding-bottom:12px}.py4{padding-top:16px;padding-bottom:16px}
.py6{padding-top:24px;padding-bottom:24px}.py10{padding-top:40px;padding-bottom:40px}.py12{padding-top:48px;padding-bottom:48px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mt5{margin-top:20px}.mt6{margin-top:24px}.mt8{margin-top:32px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}.mb5{margin-bottom:20px}.mb6{margin-bottom:24px}

/* Typography */
.t11{font-size:11px}.t12{font-size:12px}.t13{font-size:13px}.t14{font-size:14px}.t16{font-size:16px}.t18{font-size:18px}.t20{font-size:20px}.t22{font-size:22px}.t24{font-size:24px}.t48{font-size:48px}
.fw5{font-weight:500}.fw6{font-weight:600}.fw7{font-weight:700}.fw8{font-weight:800}
.tc{text-align:center}.tl{text-align:left}.nowrap{white-space:nowrap}.lh16{line-height:1.6}
.c-gray4{color:#9ca3af}.c-gray5{color:#6b7280}.c-gray6{color:#4b5563}.c-gray7{color:#374151}.c-gray8{color:#1f2937}
.c-indigo4{color:#818cf8}.c-indigo6{color:#4f46e5}.c-green6{color:#16a34a}.c-amber6{color:#d97706}.c-red6{color:#dc2626}.c-violet7{color:#6d28d9}.c-white{color:#fff}

/* Colors */
.bg-white{background:#fff}.bg-gray50{background:#f9fafb}.bg-gray100{background:#f3f4f6}
.bg-indigo50{background:#eef2ff}.bg-indigo100{background:#e0e7ff}
.bg-green50{background:#f0fdf4}.bg-green100{background:#dcfce7}
.bg-amber50{background:#fffbeb}.bg-red50{background:#fef2f2}
.bg-violet50{background:#f5f3ff}.bg-teal50{background:#f0fdfa}
.bg-login{background:linear-gradient(135deg,#e0e7ff,#f8f9ff 50%,#ede9fe)}
.bg-app{background:linear-gradient(135deg,#eef2ff,#fff 50%,#f5f3ff)}

/* Border */
.b1{border:1px solid}.b2{border:2px solid}.bb1{border-bottom:1px solid}
.bc-gray100{border-color:#f3f4f6}.bc-gray200{border-color:#e5e7eb}.bc-indigo100{border-color:#e0e7ff}
.bc-indigo200{border-color:#c7d2fe}.bc-green200{border-color:#bbf7d0}.bc-amber200{border-color:#fde68a}
.bc-red200{border-color:#fecaca}.bc-teal200{border-color:#99f6e4}

/* Radius / Shadow */
.r8{border-radius:8px}.r10{border-radius:10px}.r12{border-radius:12px}.r14{border-radius:14px}.r16{border-radius:16px}.r20{border-radius:20px}.rfull{border-radius:9999px}
.sh1{box-shadow:0 1px 3px rgba(0,0,0,.05)}.sh2{box-shadow:0 4px 10px rgba(0,0,0,.08)}.sh-xl{box-shadow:0 24px 48px rgba(0,0,0,.14)}

/* Sizing */
.w100{width:100%}.maxw-sm{max-width:380px}.maxw-md{max-width:440px}.maxw-lg{max-width:520px}.maxw-xl{max-width:580px}.maxw-2xl{max-width:700px}.mx-auto{margin-left:auto;margin-right:auto}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.av-sm{width:28px;height:28px;font-size:12px}.av-md{width:32px;height:32px;font-size:13px}.av-xl{width:44px;height:44px;font-size:16px}
.av-indigo{background:#eef2ff;color:#4f46e5}.av-violet{background:#ede9fe;color:#6d28d9}.av-teal{background:#ccfbf1;color:#0f766e}

/* Tag */
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500}

/* Inputs */
.inp{border:1px solid #e5e7eb;border-radius:10px;padding:8px 12px;width:100%;outline:none;transition:border-color .15s;background:#fff}
.inp:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.15)}
.sel{border:1px solid #e5e7eb;border-radius:10px;padding:8px 12px;width:100%;outline:none;background:#fff}
.textarea{border:1px solid #e5e7eb;border-radius:10px;padding:12px;width:100%;outline:none;line-height:1.6;resize:vertical;background:#fff}
.textarea:focus{border-color:#818cf8}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;padding:10px 20px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:#4f46e5;color:#fff}.btn-primary:hover{background:#4338ca;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#fef2f2;color:#dc2626}.btn-danger:hover{background:#fee2e2}
.btn-ghost{background:transparent;color:#6b7280;border:1px solid #e5e7eb}.btn-ghost:hover{background:#f9fafb}
.btn-outline{background:transparent;color:#4f46e5;border:1px solid #c7d2fe}.btn-outline:hover{background:#eef2ff}
.btn-sm{padding:5px 12px;border-radius:8px;font-size:12px}
.btn-xs{padding:3px 9px;border-radius:7px;font-size:11px;font-weight:600}
.btn-full{width:100%}.btn:disabled{background:#f3f4f6;color:#9ca3af;cursor:not-allowed;transform:none;box-shadow:none}

/* Header */
.header{background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid #f3f4f6;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}

/* Steps */
.steps{display:flex;align-items:center;justify-content:center;padding:20px 16px;overflow-x:auto}
.step-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid;transition:all .3s;flex-shrink:0}
.step-dot.done{background:#4f46e5;border-color:#4f46e5;color:#fff}
.step-dot.active{background:#fff;border-color:#4f46e5;color:#4f46e5;box-shadow:0 0 0 4px rgba(99,102,241,.12)}
.step-dot.locked{background:#f3f4f6;border-color:#d1d5db;color:#9ca3af}
.step-label{font-size:11px;font-weight:600;margin-top:4px;white-space:nowrap}
.step-conn{height:2px;width:40px;margin:0 4px;margin-bottom:16px;flex-shrink:0}
.step-conn.done{background:linear-gradient(90deg,#4f46e5,#818cf8)}.step-conn.locked{background:#e5e7eb}

/* Tabs */
.tabbar{display:flex;gap:4px;padding:10px 24px;border-bottom:1px solid #e5e7eb;background:#fff;overflow-x:auto}
.tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;border:none;background:transparent;color:#6b7280}
.tab:hover{background:#f3f4f6}.tab.active{background:#4f46e5;color:#fff}

/* Cards */
.card{background:#fff;border-radius:14px;border:1px solid #f3f4f6;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:16px;min-height:400px}
.kanban-col{flex-shrink:0;width:196px}
.kanban-card{background:#fff;border-radius:12px;border:1px solid #f3f4f6;padding:12px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:all .15s}
.kanban-card:hover{border-color:#c7d2fe;box-shadow:0 4px 10px rgba(79,70,229,.1);transform:translateY(-1px)}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:11px 16px;font-size:11px;font-weight:600;color:#6b7280;background:#f9fafb;border-bottom:1px solid #f3f4f6}
.tbl td{padding:11px 16px;border-bottom:1px solid #f9fafb}.tbl tr:hover td{background:#fafbff}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px 24px 0}
.stat-card{background:#fff;border-radius:14px;border:1px solid #f3f4f6;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-sm{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:400px;box-shadow:0 24px 50px rgba(0,0,0,.2)}
.modal-lg{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 50px rgba(0,0,0,.2)}

/* Login */
.login-card{background:#fff;border-radius:22px;padding:32px;box-shadow:0 20px 40px rgba(0,0,0,.1);width:100%;max-width:420px}
.login-btn{width:100%;display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;border:2px solid #e0e7ff;background:#fff;cursor:pointer;transition:all .2s;margin-bottom:10px;text-align:left}
.login-btn:hover{border-color:#818cf8;background:#fafbff;transform:translateY(-1px)}
.login-icon{width:44px;height:44px;background:#eef2ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}

/* Slot btn */
.slot-btn{padding:7px 14px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #e5e7eb;background:#f9fafb;color:#374151;transition:all .15s}
.slot-btn:hover{border-color:#c7d2fe;background:#eef2ff}.slot-btn.active{background:#4f46e5;border-color:#4f46e5;color:#fff}

/* Mat item */
.mat-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;cursor:pointer;border:1px solid #e5e7eb;background:#fff;transition:all .15s}
.mat-item:hover{border-color:#c7d2fe}.mat-item.done{background:#f0fdf4;border-color:#bbf7d0}
.mat-check{width:22px;height:22px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;transition:all .15s}
.mat-check.done{background:#22c55e;border-color:#22c55e}

/* Recommendation badge */
.rec-badge{padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600}

/* Timer */
.timer-bar-outer{flex:1;height:7px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.timer-bar-inner{height:100%;border-radius:999px;transition:width 1s linear}

/* Radio */
.radio-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;border:1px solid transparent;background:#f9fafb;transition:all .15s}
.radio-opt:hover{background:#eef2ff;border-color:#c7d2fe}.radio-opt.checked{background:#eef2ff;border-color:#a5b4fc}
.radio-opt input{accent-color:#4f46e5}

/* Loading spinner */
.spinner{width:32px;height:32px;border:3px solid #e0e7ff;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1f2937;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Notif preview */
.notif-preview{background:rgba(0,0,0,.03);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7;color:#374151;margin-top:8px;border-left:3px solid #c7d2fe;white-space:pre-line}

/* Briefing */
.section-title{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f3f4f6}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f9fafb;font-size:13px}
.info-row:last-child{border-bottom:none}

@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.header,.tabbar,.px6{padding-left:14px;padding-right:14px}}
</style>
</head>
<body>
<div id="root"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG — 你的 Supabase 凭据
// ══════════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://szjduusewnjxacrbbsdf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6amR1dXNld25qeGFjcmJic2RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjMxNjEsImV4cCI6MjA5MDQzOTE2MX0.7Cg_uOp2Q2wtKaZqVnYdMLvnZJEyh6GyE26xXb-UTBw';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ══════════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════════
const STAGES = [
  {id:'apply',     label:'报名',     icon:'📝'},
  {id:'exam',      label:'笔试',     icon:'📖'},
  {id:'interview', label:'面试',     icon:'💬'},
  {id:'result',    label:'录取结果', icon:'🎓'},
  {id:'materials', label:'提交材料', icon:'📄'},
  {id:'complete',  label:'完成',     icon:'✅'},
];
const STAGE_IDX = Object.fromEntries(STAGES.map((s,i)=>[s.id,i]));

const EXAM_Qs = [
  {id:1,type:'single',q:'旧约中，摩西带领以色列人出埃及经过的海是？',opts:['红海','地中海','死海','加利利海'],ans:0},
  {id:2,type:'single',q:'《约翰福音》中，"道成肉身"出自第几章？',opts:['第1章','第3章','第5章','第14章'],ans:0},
  {id:3,type:'single',q:'保罗"爱是恒久忍耐，又有恩慈"出自哪卷书？',opts:['罗马书','加拉太书','哥林多前书','以弗所书'],ans:2},
  {id:4,type:'single',q:'尼西亚信经确立于哪年？',opts:['325年','451年','590年','1054年'],ans:0},
  {id:5,type:'essay',q:'请简述你对"呼召"（Calling）的理解，以及申请本项目的动机（100-200字）。'},
];

const MAT_ITEMS = [
  {id:'acceptance_letter', label:'录取通知书（已签署）', req:true},
  {id:'scholarship_form',  label:'奖学金申请表',         req:true},
  {id:'survey',            label:'入学调查表',            req:true},
  {id:'guarantee',         label:'牧师担保信',            req:true},
  {id:'passport',          label:'护照扫描件',            req:true},
  {id:'photo',             label:'红底证件照（4x6）',     req:true},
  {id:'insurance',         label:'保险证明',              req:false},
];

const PROG_STYLE  = {'神学院':{bg:'#e0e7ff',color:'#4338ca'},'师范生':{bg:'#ccfbf1',color:'#0f766e'},'seminary':{bg:'#e0e7ff',color:'#4338ca'}};
const STAGE_STYLE = {apply:{bg:'#f1f5f9',color:'#475569'},exam:{bg:'#dbeafe',color:'#1d4ed8'},interview:{bg:'#ede9fe',color:'#6d28d9'},result:{bg:'#fef3c7',color:'#92400e'},materials:{bg:'#ffedd5',color:'#9a3412'},complete:{bg:'#dcfce7',color:'#15803d'},rejected:{bg:'#fee2e2',color:'#dc2626'},waitlist:{bg:'#fef9c3',color:'#854d0e'}};
const REC_STYLE   = {strongly_recommend:{bg:'#dcfce7',color:'#15803d',label:'强烈推荐'},recommend:{bg:'#dbeafe',color:'#1d4ed8',label:'推荐'},neutral:{bg:'#fef3c7',color:'#92400e',label:'中立'},not_recommend:{bg:'#fee2e2',color:'#dc2626',label:'不推荐'}};

// ══════════════════════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════════════════════
const A = {
  // Session
  role: null,        // 'applicant' | 'teacher' | 'admin'
  user: null,        // Supabase user (teacher/admin)
  profile: null,     // profiles row
  applicant: null,   // current applicant row

  // UI state
  adminTab: 'pipeline',
  teacherTab: 'interviews',
  selectedApId: null,
  briefingId: null,
  showRecordForm: false,
  showAddApModal: false,
  loginMode: null,   // 'applicant' | 'staff'

  // Applicant exam state
  examStarted: false,
  examSubmitted: false,
  examAnswers: {},
  essayText: '',
  examTime: 5400,
  ivSelected: null,
  ivBooked: false,
  uploads: {},

  // Data cache
  allApplicants: [],
  allSlots: [],
  mySlots: [],        // teacher's slots
  allRecords: [],
};
let examTimer = null;

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const mkTag = (bg,color,text) => `<span class="tag" style="background:${bg};color:${color}">${esc(text)}</span>`;
const mkAv  = (initials,size='md',cls='av-indigo') => `<div class="avatar av-${size} ${cls}">${esc(initials)}</div>`;
const initials = ap => ap ? ((ap.first_name||'')[0]||(ap.full_name||'?')[0]) : '?';
const fullName = ap => ap ? (ap.full_name || ap.first_name + ap.last_name || '未知') : '未知';
const progTag  = prog => {const s=PROG_STYLE[prog]||{bg:'#f3f4f6',color:'#6b7280'};return mkTag(s.bg,s.color,prog||'神学院');}
const stageTag = stage => {const s=STAGE_STYLE[stage]||{bg:'#f3f4f6',color:'#6b7280'};return mkTag(s.bg,s.color,(STAGES.find(x=>x.id===stage)||{}).label||stage);}

function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=(ok?'✓ ':'✕ ')+msg;
  t.style.background=ok?'#15803d':'#dc2626';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function stopTimer(){if(examTimer){clearInterval(examTimer);examTimer=null;}}
function startTimer(){
  stopTimer();
  examTimer=setInterval(()=>{
    A.examTime--;
    const d=document.getElementById('timer-disp');
    const b=document.getElementById('timer-bar');
    const w=document.getElementById('timer-wrap');
    const warn=A.examTime<600;
    const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    if(d) d.textContent=fmt(A.examTime);
    if(b){b.style.width=`${((5400-A.examTime)/5400)*100}%`;b.style.background=warn?'#ef4444':'linear-gradient(90deg,#4f46e5,#818cf8)';}
    if(w){w.style.background=warn?'#fef2f2':'#eef2ff';w.style.borderColor=warn?'#fecaca':'#e0e7ff';}
    if(A.examTime<=0)submitExam();
  },1000);
}

// ══════════════════════════════════════════════════════════════
// DATA LAYER
// ══════════════════════════════════════════════════════════════
async function loadAdminData(){
  const [{data:aps},{data:slots},{data:recs}] = await Promise.all([
    sb.from('applicants').select('*').order('created_at',{ascending:false}),
    sb.from('interview_slots').select('*').order('slot_date').order('slot_time'),
    sb.from('interview_records').select('*').order('created_at',{ascending:false}),
  ]);
  A.allApplicants = aps||[];
  A.allSlots      = slots||[];
  A.allRecords    = recs||[];
}

async function loadTeacherData(){
  const [{data:slots},{data:recs}] = await Promise.all([
    sb.from('interview_slots').select('*,applicants(*)').eq('teacher_id',A.user.id).order('slot_date').order('slot_time'),
    sb.from('interview_records').select('*,applicants(first_name,last_name,full_name)').eq('recorded_by_id',A.user.id).order('created_at',{ascending:false}),
  ]);
  A.mySlots   = slots||[];
  A.allRecords = recs||[];
  // Also load all applicants for briefing
  const {data:aps} = await sb.from('applicants').select('*').order('created_at',{ascending:false});
  A.allApplicants = aps||[];
}

async function loadPublicSlots(){
  const {data} = await sb.from('interview_slots').select('*').eq('is_booked',false).order('slot_date').order('slot_time');
  A.allSlots = data||[];
}

async function submitExam(){
  stopTimer();
  let score=0;
  EXAM_Qs.filter(q=>q.type==='single').forEach(q=>{if(A.examAnswers[q.id]===q.ans)score+=20;});
  score+=A.essayText.length>30?20:5;
  const {error} = await sb.from('applicants').update({
    exam_score:score,exam_essay:A.essayText,exam_answers:A.examAnswers,
    exam_completed_at:new Date().toISOString(),stage:'interview'
  }).eq('id',A.applicant.id);
  if(!error){
    A.applicant.exam_score=score;A.applicant.exam_essay=A.essayText;
    A.applicant.stage='interview';A.examSubmitted=true;
    toast('答卷已提交，成绩：'+score);
  } else toast('提交失败',false);
  render();
}

async function confirmInterview(){
  if(!A.ivSelected) return;
  const {error:e1} = await sb.from('interview_slots').update({is_booked:true,applicant_id:A.applicant.id}).eq('id',A.ivSelected.id);
  const {error:e2} = await sb.from('applicants').update({interview_slot_id:A.ivSelected.id}).eq('id',A.applicant.id);
  if(!e1&&!e2){
    A.ivBooked=true;A.applicant.interview_slot_id=A.ivSelected.id;
    toast('面试预约成功！');
    // Log notification
    await sb.from('notification_log').insert([
      {applicant_id:A.applicant.id,type:'iv_scheduled',recipient:'applicant',content:`面试时间：${A.ivSelected.slot_date} ${A.ivSelected.slot_time}`},
      {applicant_id:A.applicant.id,type:'teacher_notified',recipient:A.ivSelected.teacher_name,content:`申请人：${fullName(A.applicant)}`},
    ]);
  } else toast('预约失败',false);
  render();
}

async function loginApplicant(name,last4){

async function loginStaff(email,password){
  const {data,error}=await sb.auth.signInWithPassword({email,password});

  A.user=data.user;
  const {data:prof}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
  A.profile=prof;
  A.role=prof?.role||'teacher';
  if(A.role==='admin') await loadAdminData();
  else await loadTeacherData();
  render();
}

async function logout(){
  await sb.auth.signOut();
  Object.assign(A,{role:null,user:null,profile:null,applicant:null,adminTab:'pipeline',teacherTab:'interviews',selectedApId:null,briefingId:null,showAddApModal:false,allApplicants:[],allSlots:[],allRecords:[]});

}

function renderSteps(cur){
  const idx=STAGE_IDX[cur]||0;
  return `<div class="steps">${STAGES.map((s,i)=>{
    const cls=i<idx?'done':i===idx?'active':'locked';
    const lc=i<idx?'c-indigo4':i===idx?'c-indigo6':'c-gray4';
    const conn=i<STAGES.length-1?`<div class="step-conn ${i<idx?'done':'locked'}"></div>`:'';
    return `<div class="col" style="align-items:center"><div class="step-dot ${cls}">${i<idx?'✓':s.icon}</div><div class="step-label ${lc}">${s.label}</div></div>${conn}`;
  }).join('')}</div>`;
}

  </div>`;
}

// ══════════════════════════════════════════════════════════════
// MAIN RENDER + EVENTS
// ══════════════════════════════════════════════════════════════
function render(){
  stopTimer();
  const root=document.getElementById('root');
  if(!A.role) root.innerHTML=renderLogin();
  else if(A.role==='applicant') root.innerHTML=renderApplicant();
  else if(A.role==='teacher')   root.innerHTML=renderTeacher();
  else if(A.role==='admin')     root.innerHTML=renderAdmin();
  bind();
  if(A.role==='applicant'&&A.applicant?.stage==='exam'&&A.examStarted&&!A.examSubmitted) startTimer();
}

function bind(){
  const root=document.getElementById('root');

  // ── Login ──
  document.getElementById('btn-login-applicant')?.addEventListener('click',()=>{A.loginMode='applicant';render();});
  document.getElementById('btn-login-staff')?.addEventListener('click',()=>{A.loginMode='staff';render();});
  document.getElementById('btn-back-login')?.addEventListener('click',()=>{A.loginMode=null;render();});
  document.getElementById('btn-ap-login')?.addEventListener('click',async()=>{
    const name=document.getElementById('ap-name')?.value;
    const last4=document.getElementById('ap-phone4')?.value;
    if(!name||!last4){toast('请填写姓名和手机后四位',false);return;}
    await loginApplicant(name,last4);
  });
  document.getElementById('btn-staff-login')?.addEventListener('click',async()=>{
    const email=document.getElementById('staff-email')?.value;
    const pw=document.getElementById('staff-pw')?.value;
    if(!email||!pw){toast('请填写邮箱和密码',false);return;}
    await loginStaff(email,pw);
  });
  document.getElementById('btn-logout')?.addEventListener('click',logout);

  // ── Exam ──
  document.getElementById('btn-start-exam')?.addEventListener('click',()=>{A.examStarted=true;render();});
  document.getElementById('btn-submit-exam')?.addEventListener('click',()=>submitExam());
  document.getElementById('btn-go-interview')?.addEventListener('click',async()=>{await loadPublicSlots();render();});
  root.querySelectorAll('input[type=radio][name^=q]').forEach(r=>{
    r.addEventListener('change',e=>{
      const qid=+e.target.name.replace('q',''),oi=+e.target.value;
      A.examAnswers[qid]=oi;
      root.querySelectorAll(`[data-qid="${qid}"]`).forEach(l=>l.classList.toggle('checked',+l.dataset.oi===oi));
    });
  });
  const ta=document.getElementById('essay-ta');
  if(ta) ta.addEventListener('input',e=>{
    A.essayText=e.target.value;
    const cnt=document.getElementById('essay-count');
    if(cnt){const len=e.target.value.length;cnt.textContent=`${len} 字`;cnt.style.color=len<100?'#f59e0b':'#16a34a';}
  });

  // ── Interview booking ──
  document.getElementById('btn-confirm-iv')?.addEventListener('click',()=>confirmInterview());

  // ── Materials ──
  root.querySelectorAll('[data-action=toggle-mat]').forEach(el=>{
    el.addEventListener('click',()=>{const mid=el.dataset.mid;A.uploads[mid]=!A.uploads[mid];render();});
  });

  // ── Slot pick (applicant) ──
  root.querySelectorAll('[data-action=pick-slot]').forEach(el=>{
    el.addEventListener('click',()=>{
      const slotid=el.dataset.slotid;
      A.ivSelected=A.allSlots.find(s=>s.id===slotid)||null;
      render();
    });
  });

  // ── Admin tab ──
  root.querySelectorAll('[data-admin-tab]').forEach(el=>{
    el.addEventListener('click',()=>{A.adminTab=el.dataset.adminTab;A.selectedApId=null;render();});
  });

  // ── Teacher tab ──
  root.querySelectorAll('[data-teacher-tab]').forEach(el=>{
    el.addEventListener('click',()=>{A.teacherTab=el.dataset.teacherTab;render();});
  });

  // ── Select / close applicant ──
  root.querySelectorAll('[data-action=select-ap]').forEach(el=>{
    el.addEventListener('click',()=>{A.selectedApId=el.dataset.apid;render();});
  });
  root.querySelectorAll('[data-action=close-modal]').forEach(el=>{
    el.addEventListener('click',()=>{A.selectedApId=null;render();});
  });

  // ── Briefing ──
  root.querySelectorAll('[data-action=view-briefing]').forEach(el=>{
    el.addEventListener('click',()=>{A.briefingId=el.dataset.apid;A.selectedApId=null;render();});
  });
  root.querySelectorAll('[data-action=close-briefing]').forEach(el=>{
    el.addEventListener('click',()=>{A.briefingId=null;render();});
  });

  // ── Add applicant modal ──
  root.querySelectorAll('[data-action=show-add-ap-modal]').forEach(el=>{
    el.addEventListener('click',e=>{e.stopPropagation();A.showAddApModal=true;render();});
  });
  root.querySelectorAll('[data-action=close-add-ap-modal]').forEach(el=>{
    el.addEventListener('click',()=>{A.showAddApModal=false;render();});
  });
  document.getElementById('btn-save-add-ap')?.addEventListener('click',async()=>{
    const name=(document.getElementById('add-ap-name')?.value||'').trim();
    const phone=(document.getElementById('add-ap-phone')?.value||'').trim();
    const email=(document.getElementById('add-ap-email')?.value||'').trim();
    const program=document.getElementById('add-ap-program')?.value||'神学院';
    const stage=document.getElementById('add-ap-stage')?.value||'apply';
    if(!name){toast('请输入姓名',false);return;}
    const last4=phone.length>=4?phone.slice(-4):phone;
    const {data,error}=await sb.from('applicants').insert([{full_name:name,phone,phone_last4:last4,email:email||null,program,stage}]).select().single();
    if(!error&&data){A.allApplicants.unshift(data);A.showAddApModal=false;toast('已添加：'+name);render();}
    else toast('添加失败：'+(error?.message||'未知错误'),false);
  });

  // ── Delete applicant ──
  root.querySelectorAll('[data-action=delete-ap]').forEach(el=>{
    el.addEventListener('click',async e=>{
      e.stopPropagation();
      const apid=el.dataset.apid;
      const ap=A.allApplicants.find(a=>a.id===apid);
      if(!confirm('确认删除「'+(ap?fullName(ap):'该申请人')+'」？此操作不可撤销。'))return;
      const {error}=await sb.from('applicants').delete().eq('id',apid);
      if(!error){A.allApplicants=A.allApplicants.filter(a=>a.id!==apid);if(A.selectedApId===apid)A.selectedApId=null;toast('已删除');render();}
      else toast('删除失败',false);
    });
  });

  // ── Record form ──
  root.querySelectorAll('[data-action=write-record]').forEach(el=>{
    el.addEventListener('click',()=>{A.selectedApId=el.dataset.apid;A.showRecordForm=true;A.briefingId=null;render();});
  });
  root.querySelectorAll('[data-action=close-record-form]').forEach(el=>{
    el.addEventListener('click',()=>{A.showRecordForm=false;render();});
  });
  document.getElementById('btn-save-record')?.addEventListener('click',async()=>{
    const content=document.getElementById('rec-content')?.value;
    const spiritual=document.getElementById('rec-spiritual')?.value;
    const rec=document.querySelector('input[name=rec-recommendation]:checked')?.value;
    const note=document.getElementById('rec-note')?.value;
    const dateVal=document.getElementById('rec-date')?.value;
    const name=A.profile?.display_name||'管理员';
    const {error}=await sb.from('interview_records').insert([{
      applicant_id:A.selectedApId,recorded_by_id:A.user?.id,recorded_by_name:name,
      content,spiritual_assessment:spiritual,recommendation:rec,recommendation_note:note,
      interview_date:dateVal?new Date(dateVal).toISOString():new Date().toISOString()
    }]);
    if(!error){toast('面试记录已保存');A.showRecordForm=false;await loadAdminData();render();}
    else toast('保存失败',false);
  });

  // ── Advance / Reject ──
  root.querySelectorAll('[data-action=advance-ap]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const ap=A.allApplicants.find(a=>a.id===el.dataset.apid);
      if(!ap)return;
      const idx=STAGE_IDX[ap.stage]||0;
      if(idx>=STAGES.length-1)return;
      const nextStage=STAGES[idx+1].id;
      const {error}=await sb.from('applicants').update({stage:nextStage}).eq('id',ap.id);
      if(!error){ap.stage=nextStage;A.selectedApId=null;toast('已推进至：'+STAGES[idx+1].label);render();}
      else toast('操作失败',false);
    });
  });
  root.querySelectorAll('[data-action=reject-ap]').forEach(el=>{
    el.addEventListener('click',async()=>{
      if(!confirm('确认拒绝此申请人？'))return;
      const {error}=await sb.from('applicants').update({stage:'rejected'}).eq('id',el.dataset.apid);
      if(!error){A.allApplicants=A.allApplicants.map(a=>a.id===el.dataset.apid?{...a,stage:'rejected'}:a);A.selectedApId=null;toast('已标记拒绝');render();}
    });
  });

  // ── Admin: add slot ──
  document.getElementById('btn-add-admin-slot')?.addEventListener('click',async()=>{
    const date=document.getElementById('a-slot-date')?.value;
    const time=document.getElementById('a-slot-time')?.value;
    const teacher=document.getElementById('a-slot-teacher')?.value?.trim();
    if(!date||!time){toast('请填写日期和时间',false);return;}
    const {data,error}=await sb.from('interview_slots').insert([{slot_date:date,slot_time:time,teacher_name:teacher||null}]).select().single();
    if(!error&&data){A.allSlots.push(data);toast('时间段已添加');render();}
    else toast('添加失败',false);
  });
  root.querySelectorAll('[data-action=del-slot]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const {error}=await sb.from('interview_slots').delete().eq('id',el.dataset.slotid);
      if(!error){A.allSlots=A.allSlots.filter(s=>s.id!==el.dataset.slotid);toast('已删除');render();}
    });
  });

  // ── Teacher: add slot ──
  document.getElementById('btn-add-teacher-slot')?.addEventListener('click',async()=>{
    const date=document.getElementById('t-slot-date')?.value;
    const time=document.getElementById('t-slot-time')?.value;
    if(!date||!time){toast('请填写日期和时间',false);return;}
    const {data,error}=await sb.from('interview_slots').insert([{slot_date:date,slot_time:time,teacher_id:A.user.id,teacher_name:A.profile?.display_name}]).select().single();
    if(!error&&data){A.mySlots.push(data);toast('时间段已添加');render();}
    else toast('添加失败',false);
  });
  root.querySelectorAll('[data-action=del-teacher-slot]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const {error}=await sb.from('interview_slots').delete().eq('id',el.dataset.slotid);
      if(!error){A.mySlots=A.mySlots.filter(s=>s.id!==el.dataset.slotid);toast('已删除');render();}
    });
  });
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init(){
  // Check existing session
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    A.user=session.user;
    const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
    if(prof){
      A.profile=prof;A.role=prof.role;
      if(A.role==='admin') await loadAdminData();
      else await loadTeacherData();
    }
  }
  render();
}

init();
</script>
</body>
</html>
